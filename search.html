<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegiTile | Bill Language Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .leg-navy { background-color: #002e5d; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#002e5d">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

    <div id="sidebar-container" class="flex-shrink-0 w-full md:w-28 md:h-full z-50"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200">
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Language Search</h1>
            <p class="text-xs text-gray-500 font-bold mt-1">Search the full text of indexed bills.</p>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
            <div class="bg-white p-6 rounded-xl shadow-sm mb-6 border border-gray-100 max-w-4xl mx-auto">
                <div class="flex flex-col md:flex-row gap-3 w-full mb-4">
                    <select id="searchBiennium" class="bg-gray-50 border-2 border-gray-200 text-gray-800 font-black uppercase text-[10px] rounded-lg px-4 py-3 outline-none focus:border-[#002e5d] transition cursor-pointer md:w-40">
                        <option value="2025-26" selected>2025-26 Session</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="Enter keyword or exact phrase..." class="flex-1 border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700" onkeypress="if(event.key === 'Enter') runSearch()">
                    <button onclick="runSearch()" id="searchBtn" class="bg-[#002e5d] hover:bg-[#001f3f] text-white text-[12px] font-black uppercase px-8 py-3 rounded-lg shadow-sm transition">Search</button>
                </div>
            </div>

            <div class="max-w-4xl mx-auto">
                <div id="resultsGrid" class="flex flex-col gap-4">
                    <div class="text-gray-400 font-bold italic text-sm">Enter a search term above.</div>
                </div>
            </div>
        </main>
    </div>

<script>
    if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';

    // This specifically targets your scraper worker from your main site
    const searchApiUrl = "https://legitile-scraper.ewing-jacob.workers.dev";

    async function loadSidebar() {
        try {
            const response = await fetch('sidebar.html');
            if (response.ok) {
                document.getElementById('sidebar-container').innerHTML = await response.text();
                
                const path = window.location.pathname;
                document.querySelectorAll('.nav-item').forEach(item => {
                    if (path.includes(item.getAttribute('href'))) {
                        item.classList.add('bg-white/10', 'text-white');
                        item.classList.remove('text-blue-200');
                    }
                });
            }
        } catch (error) { console.error("Sidebar failed to load."); }
    }

    window.onload = async () => {
        await loadSidebar();
    };

    async function runSearch() {
        const query = document.getElementById('searchInput').value.trim();
        const biennium = document.getElementById('searchBiennium').value;
        const resultsGrid = document.getElementById('resultsGrid');
        const searchBtn = document.getElementById('searchBtn');

        if (!query) return;

        searchBtn.innerText = "Searching...";
        searchBtn.disabled = true;
        resultsGrid.innerHTML = '<div class="text-blue-500 font-bold text-sm italic">Querying database...</div>';

        try {
            const res = await fetch(`${searchApiUrl}/search?q=${encodeURIComponent(query)}&biennium=${encodeURIComponent(biennium)}`);
            const rawText = await res.text(); 
            
            let data;
            try {
                data = JSON.parse(rawText);
            } catch (parseError) {
                throw new Error(`Server Error: <br><br> <span class="text-gray-500 font-mono text-xs">${rawText}</span>`);
            }

            if (!res.ok || data.error) throw new Error(data.error || "Search API failed");

            if (data.length === 0) {
                resultsGrid.innerHTML = '<div class="text-gray-500 font-bold text-sm bg-white p-6 rounded-xl border border-gray-100">No matching bills found.</div>';
            } else {
                resultsGrid.innerHTML = data.map(item => `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-lg font-black text-[#002e5d] block leading-tight">${item.bill_number}</span>
                            <a href="https://app.leg.wa.gov/billsummary?BillNumber=${item.bill_number.replace(/\D/g, '')}&Year=${biennium.split('-')[0]}" target="_blank" class="text-[9px] font-black uppercase text-blue-600 hover:text-blue-800 bg-blue-50 px-3 py-1.5 rounded transition border border-blue-100">Read Full Bill ➔</a>
                        </div>
                        <div class="text-sm text-gray-600 leading-relaxed bg-gray-50 p-3 rounded-lg border border-gray-200">
                            ...${item.match_snippet}...
                        </div>
                    </div>
                `).join('');
            }
        } catch (e) {
            resultsGrid.innerHTML = `<div class="text-red-500 font-bold text-sm bg-white p-6 rounded-xl border border-red-100">${e.message}</div>`;
        }

        searchBtn.innerText = "Search";
        searchBtn.disabled = false;
    }
</script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>
</body>
</html>
