<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegiTile | Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .leg-navy { background-color: #002e5d; }
        .highlight { background-color: #fef08a; font-weight: 700; padding: 0 2px; border-radius: 2px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

    <aside class="leg-navy text-white w-full md:w-48 flex-shrink-0 flex flex-col shadow-2xl z-50 md:h-full">
        <div class="py-8 flex flex-col items-center border-b border-white/10">
            <div class="text-6xl font-serif italic font-black text-transparent bg-clip-text bg-gradient-to-br from-orange-400 to-white leading-none">L</div>
            <div class="text-[10px] uppercase tracking-[0.2em] text-blue-200 font-bold mt-2 opacity-80">LegiTile</div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="home.html" class="flex items-center gap-3 px-4 py-3 text-blue-200 hover:bg-white/5 hover:text-white rounded-lg transition font-black text-xs uppercase tracking-wider">🏠 Dashboard</a>
            <a href="tracker.html" class="flex items-center gap-3 px-4 py-3 text-blue-200 hover:bg-white/5 hover:text-white rounded-lg transition font-black text-xs uppercase tracking-wider">📑 Workspace</a>
            <a href="search.html" class="bg-white/10 flex items-center gap-3 px-4 py-3 text-white rounded-lg transition font-black text-xs uppercase tracking-wider font-bold">🔍 Search Text</a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 bg-gray-100 border-b border-gray-200">
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Full-Text Search</h1>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Search the actual content of your tracked bills</p>
        </header>

        <main class="flex-1 flex flex-col p-6 md:p-10 overflow-hidden">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-6 flex gap-3">
                <input type="text" id="searchInput" placeholder="Search keywords (e.g. 'housing', 'tax', 'education')..." 
                       class="flex-1 bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                <button onclick="performSearch()" class="leg-navy text-white px-8 py-3 rounded-lg font-black text-xs uppercase tracking-widest hover:bg-blue-900 transition">Search</button>
            </div>

            <div class="flex-1 overflow-y-auto pr-2 space-y-4" id="resultsArea">
                <div class="text-center py-20 text-gray-400">
                    <span class="text-4xl block mb-4">🔎</span>
                    <p class="text-xs font-bold uppercase tracking-widest">Enter a query to search your indexed bills</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = "https://misty-credit-9e6a.ewing-jacob.workers.dev/";

        async function performSearch() {
            const query = document.getElementById('searchInput').value;
            const resultsArea = document.getElementById('resultsArea');
            const token = localStorage.getItem('token');

            if (!query) return;

            resultsArea.innerHTML = '<div class="text-center py-10 text-xs font-bold text-blue-500 animate-pulse">SEARCHING DATABASE...</div>';

            try {
                const response = await fetch(`${API_BASE}/search-internal?q=${encodeURIComponent(query)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const results = await response.json();
                
                if (results.length === 0) {
                    resultsArea.innerHTML = '<div class="text-center py-10 text-gray-400 text-xs font-bold uppercase">No matches found in your tracked bills.</div>';
                    return;
                }

                resultsArea.innerHTML = results.map(res => `
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:border-blue-300 transition group">
                        <div class="flex justify-between items-start mb-3">
                            <span class="bg-blue-50 text-blue-700 text-[10px] font-black px-2 py-1 rounded border border-blue-100 uppercase tracking-tighter">Bill ${res.bill_id}</span>
                            <a href="https://app.leg.wa.gov/billinfo/default.aspx?BillNumber=${res.bill_id}&year=2025" target="_blank" class="text-[10px] font-bold text-gray-400 hover:text-blue-600 uppercase tracking-widest">View Official Site ➔</a>
                        </div>
                        <p class="text-sm text-gray-600 leading-relaxed italic">"...${res.match}..."</p>
                    </div>
                `).join('');

            } catch (err) {
                resultsArea.innerHTML = `<div class="text-red-500 text-xs font-bold">SEARCH ERROR: ${err.message}</div>`;
            }
        }

        // Allow 'Enter' key to search
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
