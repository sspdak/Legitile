<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Washington State Legislature Bill Explorer</title>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Washington State Bill Explorer</h1>
    
    <div class="card">
        <div class="form-row">
            <div class="input-group">
                <label for="biennium">Biennium</label>
                <input type="text" id="biennium" value="2025-26" placeholder="e.g., 2025-26">
            </div>
            <div class="input-group">
                <label for="billNumber">Bill Number</label>
                <input type="text" id="billNumber" value="1001" placeholder="e.g., 1001">
            </div>
        </div>
        <button onclick="fetchBillData()">Fetch Bill Data</button>
    </div>

    <div id="results"></div>

    <script src="app.js"></script>
</body>
</html>
