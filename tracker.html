        <div class="shrink-0 pb-6 px-4">
            <div class="bg-black/20 rounded-lg p-3 flex flex-col items-center text-center">
                <span class="text-[8px] uppercase tracking-widest text-gray-400 font-bold mb-1">Staff Member</span>
                <span id="userEmailDisplay" class="text-xs font-bold text-white truncate w-full mb-3"></span>
                <button onclick="logout()" class="w-full bg-red-500/20 hover:bg-red-500/40 text-red-200 text-[10px] font-black uppercase py-2 rounded transition border border-red-500/30">Log Out</button>
            </div>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200 flex justify-between items-center">
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Active Workspace</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
            <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border border-gray-100">
                <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-2 block">Lookup & Track a Bill</label>
                <div class="flex gap-3 w-full mb-4">
                    <input type="text" id="billNum" placeholder="Enter Bill Number (e.g. 1000)" class="flex-1 border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700">
                    <button onclick="fetchAPI()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 text-[12px] font-black uppercase px-6 py-3 rounded-lg shadow-sm transition">Search API</button>
                </div>
                <div id="apiResults"></div>
            </div>

            <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">My Tracked Bills</h2>
            <div id="workspaceGrid" class="flex flex-col gap-6 pb-20"></div>
        </main>
    </div>

<script>
    if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';
    document.getElementById('userEmailDisplay').innerText = localStorage.getItem('user_email') || 'Unknown';

    const workerBaseUrl = "https://misty-credit-9e6a.ewing-jacob.workers.dev";
    const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`, 'Content-Type': 'application/json' };
    
    let currentBillData = null; 
    let workspaceItems = [];
    let expandedCards = new Set();
    let activeTabs = {};

    const LIVE_STATUS_OPTIONS = ["Introduced", "Public Hearing", "Executive Action", "Fiscal", "Rules", "Floor", "House", "Concurrence", "Passed", "Dead"];
    const STATUS_TASKS = {
        "Introduced": ["Review bill", "Add summary to tracker", "Prep talking points"],
        "Public Hearing": ["Submit Bill Report", "Create Bill Presentation", "Submit Public Testimony"],
        "Executive Action": ["Briefing Notes", "Review Proposed Sub", "Update Bill Report"],
        "Fiscal": ["Review Fiscal Note", "Check In with Fiscal Staff"],
        "Rules": ["Review Bill Report", "Prep Floor Note"],
        "Floor": ["Submit Floor Note", "Review Floor Amendments"],
        "House": [], "Dead": [], "Default": ["Review Bill", "Monitor Testimony"]
    };

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    loadWorkspace();

    async function loadWorkspace() {
        try {
            const res = await fetch(`${workerBaseUrl}/my-workspace`, { headers: authHeaders });
            if (res.status === 401) return logout();
            const rawBills = await res.json();
            
            workspaceItems = rawBills.map(item => ({
                ...item,
                task_progress: JSON.parse(item.task_progress || '{}'),
                custom_tasks: JSON.parse(item.custom_tasks || '[]'),
                amendments: JSON.parse(item.amendments || '[]')
            }));

            renderGrid();
        } catch (e) { console.error(e); }
    }

    function renderGrid() {
        const grid = document.getElementById('workspaceGrid');
        grid.innerHTML = '';
        let processedIds = new Set();

        if (workspaceItems.length === 0) {
            grid.innerHTML = '<div class="text-gray-400 font-bold italic text-sm">No bills currently tracked. Search above to add one.</div>';
            return;
        }

        workspaceItems.forEach(item => {
            if (processedIds.has(item.id)) return;

            let compBillStr = item.companion ? item.companion.split(',')[0].trim() : "";
            let compItem = compBillStr ? workspaceItems.find(i => i.bill_number === compBillStr || i.companion.includes(item.bill_number)) : null;

            let group = [item];
            if (compItem && compItem.id !== item.id) {
                group.push(compItem);
                processedIds.add(compItem.id);
            }
            processedIds.add(item.id);

            let activeId = activeTabs[item.id] || item.id;
            let activeItem = group.find(i => i.id === activeId) || item;
            
            let isDead = activeItem.status === 'Dead';
            let status = LIVE_STATUS_OPTIONS.includes(activeItem.status) ? activeItem.status : "Default";
            let tasks = STATUS_TASKS[status] || STATUS_TASKS["Default"];
            let progress = activeItem.task_progress[status] || {};

            let tabsHtml = '';
            if (group.length > 1) {
                tabsHtml = `
                <div class="flex border-b border-gray-200 bg-gray-100 rounded-t-xl overflow-hidden">
                    ${group.map(g => `
                        <button onclick="switchTab(${item.id}, ${g.id})" class="px-6 py-3 text-xs font-black uppercase transition-all ${activeItem.id === g.id ? 'bg-white border-t-4 border-[#002e5d] text-[#002e5d] shadow-sm' : 'text-gray-500 hover:bg-gray-200 border-t-4 border-transparent'}">${g.bill_number}</button>
                    `).join('')}
                </div>`;
            } else if (compBillStr && compBillStr !== "None") {
                 tabsHtml = `
                 <div class="flex border-b border-gray-200 bg-gray-100 rounded-t-xl overflow-hidden">
                    <button class="px-6 py-3 text-xs font-black uppercase bg-white border-t-4 border-[#002e5d] text-[#002e5d] shadow-sm">${activeItem.bill_number}</button>
                    <button onclick="autoTrack('${compBillStr}')" class="px-6 py-3 text-xs font-black uppercase text-gray-400 hover:text-[#002e5d] hover:bg-gray-200 border-t-4 border-transparent flex items-center gap-2">
                        <span class="text-[14px] leading-none">+</span> Track Companion (${compBillStr})
                    </button>
                </div>`;
            }

            grid.innerHTML += `
                <div class="bg-white rounded-xl shadow-md ${isDead ? 'dead-border' : 'live-border'} border border-gray-100 overflow-hidden ${isDead ? 'grayscale-[0.5]' : ''}">
                    ${tabsHtml}
                    <div class="p-5 flex flex-col md:flex-row gap-4 items-start md:items-center cursor-pointer hover:bg-gray-50 transition" onclick="toggleCard(${item.id})">
                        <div class="w-48 flex-shrink-0">
                            <span class="text-xl font-black text-gray-800 leading-tight block">${activeItem.bill_number}</span>
                        </div>
                        <div class="md:border-l md:pl-6 flex-1">
                            <span class="text-[9px] font-black uppercase text-gray-400 block tracking-widest">Summary</span>
                            <span class="text-sm text-gray-700 font-bold line-clamp-2">${activeItem.short_desc}</span>
                        </div>
                        <div class="md:border-l md:pl-6 w-48 flex-shrink-0">
                            <span class="text-[9px] font-black uppercase text-gray-400 block tracking-widest mb-1">Status & Sponsor</span>
                            <div class="text-[10px] font-black uppercase text-[#002e5d]">${activeItem.status}</div>
                            <div class="text-[10px] font-bold text-gray-500 truncate mt-1">${activeItem.sponsor}</div>
                        </div>
                    </div>
                    
                    <div id="details_${activeItem.id}" class="px-6 pb-6 pt-2 border-t border-gray-50 ${expandedCards.has(item.id) ? '' : 'details-hidden'}">
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-4">
                            
                            <div class="space-y-4">
                                <div class="flex items-center justify-between">
                                    <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-400">Status & Tasks</h3>
                                    <select onchange="updateDB(${activeItem.id}, 'status', this.value)" class="text-[10px] font-black uppercase bg-gray-100 px-2 py-1 rounded outline-none cursor-pointer border border-gray-200">
                                        ${LIVE_STATUS_OPTIONS.map(opt => `<option value="${opt}" ${activeItem.status === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                                    </select>
                                </div>
                                
                                <div class="space-y-1 bg-yellow-50 p-3 rounded border border-yellow-100">
                                    ${tasks.length === 0 ? '<span class="text-xs font-bold text-gray-400">No default tasks for this stage.</span>' : ''}
                                    ${tasks.map(tName => {
                                        const done = progress[tName];
                                        return `
                                        <div class="flex items-center justify-between py-1">
                                            <label class="flex items-center gap-3 text-sm cursor-pointer w-full">
                                                <input type="checkbox" onchange="toggleTask(${activeItem.id}, '${tName}', '${status}')" ${done ? 'checked' : ''} class="h-4 w-4 rounded text-blue-900 border-gray-300">
                                                <span class="${done ? 'text-gray-400 line-through' : 'font-bold text-gray-700'}">${tName}</span>
                                            </label>
                                        </div>`;
                                    }).join('')}
                                </div>
                            </div>

                            <div class="space-y-4 flex flex-col h-full">
                                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 flex-1 flex flex-col">
                                    <div class="flex justify-between items-center mb-2">
                                        <label class="text-[10px] font-black text-gray-400 uppercase">Workspace Notes</label>
                                        <button onclick="insertTimestamp(${activeItem.id})" class="text-[9px] font-bold text-blue-600 bg-blue-100 px-2 py-1 rounded hover:bg-blue-200 uppercase">Timestamp</button>
                                    </div>
                                    <textarea id="notes_${activeItem.id}" onchange="updateDB(${activeItem.id}, 'live_notes', this.value)" class="w-full bg-transparent text-sm italic flex-1 focus:outline-none resize-none" placeholder="Draft talking points or staff notes...">${activeItem.live_notes || ""}</textarea>
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-between items-center mt-6 pt-4 border-t border-gray-200">
                            <span class="text-[9px] font-black uppercase tracking-widest text-gray-400">Workspace Controls</span>
                            <button onclick="deleteBill(${activeItem.id})" class="text-[10px] font-black uppercase text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-4 py-2 rounded transition border border-red-100">
                                Remove from Workspace
                            </button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function switchTab(groupId, targetId) {
        event.stopPropagation();
        activeTabs[groupId] = targetId;
        expandedCards.add(groupId); 
        renderGrid();
    }

    window.autoTrack = function(billNum) {
        document.getElementById('billNum').value = billNum;
        fetchAPI();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleCard(id) {
        if (expandedCards.has(id)) expandedCards.delete(id);
        else expandedCards.add(id);
        renderGrid();
    }

    function insertTimestamp(id) {
        const textarea = document.getElementById(`notes_${id}`);
        const now = new Date();
        const timeStr = `\n[${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}]: `;
        textarea.value = textarea.value + timeStr;
        textarea.focus();
        updateDB(id, 'live_notes', textarea.value);
    }

    function toggleTask(id, tName, status) {
        const item = workspaceItems.find(i => i.id === id);
        if (!item.task_progress[status]) item.task_progress[status] = {};
        
        if (item.task_progress[status][tName]) delete item.task_progress[status][tName];
        else item.task_progress[status][tName] = true;
        
        syncToServer(item);
    }

    function updateDB(id, field, value) {
        const item = workspaceItems.find(i => i.id === id);
        item[field] = value;
        syncToServer(item);
    }

    async function syncToServer(item) {
        renderGrid(); 
        const payload = {
            id: item.id,
            status: item.status,
            live_notes: item.live_notes || "",
            task_progress: JSON.stringify(item.task_progress),
            custom_tasks: JSON.stringify(item.custom_tasks),
            hearing_date: item.hearing_date || "",
            exec_date: item.exec_date || "",
            amendments: JSON.stringify(item.amendments)
        };

        try {
            await fetch(`${workerBaseUrl}/update-bill`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify(payload)
            });
        } catch (e) { console.error("Failed to sync to database."); }
    }

    async function deleteBill(id) {
        if (!confirm("Are you sure you want to remove this bill from your workspace?")) return;
        
        try {
            const res = await fetch(`${workerBaseUrl}/delete-bill`, {
                method: 'DELETE',
                headers: authHeaders,
                body: JSON.stringify({ id: id })
            });
            if (res.ok) {
                loadWorkspace();
            } else {
                alert("Failed to delete bill.");
            }
        } catch (e) {
            alert("Network error while deleting bill.");
        }
    }

    async function fetchAPI() {
        const rawBill = document.getElementById('billNum').value;
        const resDiv = document.getElementById('apiResults');
        if (!rawBill) return;
        
        // Smarter Bill Extraction
        const fourDigitMatches = rawBill.match(/\d{4}/g);
        let bill = "";
        
        if (fourDigitMatches) {
            const validBills = fourDigitMatches.filter(n => n !== "2025" && n !== "2026");
            bill = validBills.length > 0 ? validBills[validBills.length - 1] : fourDigitMatches[0];
        } else {
            bill = rawBill.replace(/\D/g, '');
        }

        if (!bill) {
            resDiv.innerHTML = `<span class="text-orange-500 font-bold text-sm">Please enter a valid numeric bill number.</span>`;
            return;
        }
        
        currentBillData = null;
        resDiv.innerHTML = `<span class="text-blue-500 font-bold text-sm">Querying WSL...</span>`;
        
        try {
            const res = await fetch(`${workerBaseUrl}/fetch-bill?bill=${bill}`, { headers: authHeaders });
            if (res.status === 401) return logout();
            
            const xmlText = await res.text();
            const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
            
            if (xmlDoc.getElementsByTagName("faultstring").length > 0) {
                resDiv.innerHTML = `<span class="text-red-500 font-bold text-sm">API Error: ${xmlDoc.getElementsByTagName("faultstring")[0].textContent}</span>`;
                return;
            }

            const getTagText = (tag) => {
                const nodes = xmlDoc.getElementsByTagNameNS("*", tag);
                return nodes.length > 0 ? nodes[0].textContent.trim() : (xmlDoc.getElementsByTagName(tag)[0]?.textContent.trim() || null);
            };

            const billNumber = getTagText("BillNumber") || bill;
            const shortDesc = getTagText("ShortDescription") || "No summary provided.";
            const currentStatus = getTagText("HistoryLine") || "Unknown Status";
            
            let primeSponsor = "None Listed";
            const sponsorNodes = Array.from(xmlDoc.getElementsByTagNameNS("*", "Sponsor")).concat(Array.from(xmlDoc.getElementsByTagName("Sponsor")));
            for (let s of sponsorNodes) {
                const nameNode = s.getElementsByTagNameNS("*", "Name")[0] || s.getElementsByTagName("Name")[0];
                const typeNode = s.getElementsByTagNameNS("*", "Type")[0] || s.getElementsByTagName("Type")[0];
                if (nameNode && typeNode && typeNode.textContent === "Primary") primeSponsor = nameNode.textContent;
            }

            let companions = [];
            for (let c of Array.from(xmlDoc.getElementsByTagNameNS("*", "Companion")).concat(Array.from(xmlDoc.getElementsByTagName("Companion")))) {
                if (c.textContent.trim()) companions.push(c.textContent.trim());
            }

            currentBillData = {
                billNumber, shortDesc, status: currentStatus, sponsor: primeSponsor, companion: companions.join(", ")
            };

            resDiv.innerHTML = `
                <div class="mt-4 p-4 bg-gray-50 border border-gray-200 rounded flex justify-between items-center">
                    <div>
                        <div class="text-sm font-black text-[#002e5d]">${billNumber}</div>
                        <div class="text-xs text-gray-600 font-bold truncate max-w-md">${shortDesc}</div>
                    </div>
                    <button onclick='saveToWorkspace()' class="bg-green-600 hover:bg-green-700 text-white text-[10px] font-black uppercase px-4 py-2 rounded shadow-sm transition">
                        Add to Workspace
                    </button>
                </div>
            `;
        } catch (e) { resDiv.innerHTML = `<span class="text-red-500 font-bold text-sm">Connection failed.</span>`; }
    }

    async function saveToWorkspace() {
        if (!currentBillData) return;
        try {
            const res = await fetch(`${workerBaseUrl}/save-bill`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify(currentBillData)
            });
            if (res.ok) {
                document.getElementById('apiResults').innerHTML = `<span class="text-green-600 font-bold text-sm">Added to workspace!</span>`;
                document.getElementById('billNum').value = ''; 
                loadWorkspace(); 
            } else {
                 const responseData = await res.json();
                 document.getElementById('apiResults').innerHTML = `<span class="text-orange-500 font-bold text-sm">${responseData.message || 'Failed to save.'}</span>`;
            }
        } catch (e) { alert("Failed to save bill."); }

        function updateNavHighlight() {
    const path = window.location.pathname;
    const navItems = document.querySelectorAll('.nav-item');
    
    navItems.forEach(item => {
        // Remove existing highlight
        item.classList.remove('bg-white/10', 'text-white');
        item.classList.add('text-blue-200');
        
        // If the link href matches the current file name, highlight it
        if (path.includes(item.getAttribute('href'))) {
            item.classList.add('bg-white/10', 'text-white');
            item.classList.remove('text-blue-200');
        }
    });
}

// Call this on page load
updateNavHighlight();
    }
</script>
