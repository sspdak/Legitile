<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegiTile | Workspace</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIiBmaWxsPSIjMDAyZTVkIi8+PGRlZnM+PGxpbmVhckdyYWRpZW50IGlkPSJnIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj48c3RvcCBvZmZzZXQ9IjAlIiBzdG9wLWNvbG9yPSIjZmI5MjNjIi8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdG9wLWNvbG9yPSIjZmZmZmZmIi8+PC9saW5lYXJHcmFkaWVudD48L2RlZnM+PHRleHQgeD0iNTAiIHk9Ijc1IiBmb250LWZhbWlseT0ic2VyaWYiIGZvbnQtc3R5bGU9Iml0YWxpYyIgZm9udC13ZWlnaHQ9IjkwMCIgZm9udC1zaXplPSI3NSIgZmlsbD0idXJsKCNnKSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+TDwvdGV4dD48L3N2Zz4=">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .leg-navy { background-color: #002e5d; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }

        .details-hidden { display: none; }

<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row relative">

    <div id="sidebar-container" class="flex-shrink-0 w-full md:w-28 md:h-full z-50"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Bill Tracker</h1>
            <button onclick="openTrash()" class="bg-gray-200 hover:bg-gray-300 text-gray-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition flex items-center gap-2 shadow-sm">
                🗑️ Recycle Bin
            </button>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
            <div class="bg-white p-6 rounded-xl shadow-sm mb-6 border border-gray-100">
                <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-2 block">Lookup & Track a Bill</label>
                <div class="flex gap-3 w-full mb-4">
                    <input type="text" id="billNum" placeholder="Enter Bill Number (e.g. 1000)" class="flex-1 border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700" onkeypress="if(event.key === 'Enter') fetchAPI()">
                    <button onclick="fetchAPI()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 text-[12px] font-black uppercase px-6 py-3 rounded-lg shadow-sm transition">Search</button>
                </div>
                <div id="apiResults"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm mb-8 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 border border-gray-100">
                
                <div class="flex flex-wrap gap-2 w-full xl:w-auto items-center">
                    <select onchange="setBiennium(this.value)" id="bienniumSelect" class="bg-gray-50 border border-gray-200 text-gray-800 font-black uppercase text-[10px] rounded-lg px-2 py-1.5 outline-none focus:border-blue-500 transition shadow-sm cursor-pointer">
                        <option value="2025-26" selected>2025-26 Session</option>
                        <option value="2023-24">2023-24 Archive</option>
                    </select>
                    <select onchange="setCommittee(this.value)" id="committeeSelect" class="bg-gray-50 border-2 border-gray-200 text-gray-700 font-black uppercase text-[10px] rounded-lg px-2 py-1.5 outline-none focus:border-gray-400 transition shadow-sm cursor-pointer">
                        <option value="All">All Committees</option>
                    </select>
                    <select onchange="setType(this.value)" id="typeSelect" class="bg-gray-50 text-[10px] font-black uppercase rounded-lg px-2 py-1.5 border-none outline-none text-gray-600 focus:text-blue-900 cursor-pointer hover:bg-gray-100 transition">
                        <option value="All">All Types</option>
                        <option value="draft">Drafts Only</option>
                        <option value="live">Live Bills</option>
                        <option value="dead">Dead Bills</option>
                    </select>
                    <select onchange="setStatusFilter(this.value)" id="statusFilter" class="bg-gray-50 text-[10px] font-black uppercase rounded-lg px-2 py-1.5 border-none outline-none text-gray-600 focus:text-blue-900 cursor-pointer hover:bg-gray-100 transition">
                        <option value="All">All Steps</option>
                    </select>
                    <select onchange="setSort(this.value)" class="bg-gray-50 text-[10px] font-black uppercase rounded-lg px-2 py-1.5 border-none outline-none text-gray-600 focus:text-blue-900 cursor-pointer hover:bg-gray-100 transition">
                        <option value="priority">Sort: Priority</option>
                        <option value="alpha">Sort: Bill #</option>
                    </select>
                </div>

                <div class="flex flex-wrap gap-2 w-full xl:w-auto items-center ml-auto">
                    <button id="newDraftBtn" onclick="showScreen('draftForm')" class="flex-1 md:flex-none bg-orange-500 hover:bg-orange-600 text-white text-[10px] font-black uppercase px-4 py-2 rounded-lg shadow-sm hover:shadow-md transition flex items-center justify-center gap-2">
                        <span>📝</span> New Draft
                    </button>
                    <button id="trackBillBtn" onclick="showScreen('existingForm')" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-black uppercase px-4 py-2 rounded-lg shadow-sm hover:shadow-md transition flex items-center justify-center gap-2">
                        <span>📑</span> Track Bill
                    </button>
                    <button onclick="syncAllBills()" id="syncAllBtn" class="flex-1 md:flex-none bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] font-black uppercase px-4 py-2 rounded-lg shadow-sm hover:shadow-md transition flex items-center justify-center gap-2">
                        <span id="syncAllIcon">🔄</span> Refresh
                    </button>
                </div>
            </div>

            <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">My Bill Drafts</h2>
            <div id="draftsGrid" class="flex flex-col gap-6 mb-8"></div>

            <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">My Tracked Bills</h2>
            <div id="workspaceGrid" class="flex flex-col gap-6 mb-12"></div>

            <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Dead Bills</h2>
            <div id="deadGrid" class="flex flex-col gap-6 pb-20 opacity-75"></div>
        </main>
    </div>

    <div id="undoToast" class="fixed bottom-6 right-6 bg-gray-900 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-6 transform translate-y-24 opacity-0 transition-all duration-300 z-[200]">
        <span id="undoMsg" class="text-sm font-bold">Item removed</span>
        <button id="undoBtn" class="text-orange-400 hover:text-orange-300 font-black uppercase text-xs tracking-wider border border-orange-400/30 px-3 py-1.5 rounded transition">Undo</button>
    </div>

    <div id="trashForm" style="display: none;" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-2xl w-full border-t-8 border-gray-600 flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800 uppercase">Recycle Bin</h2>
                <button onclick="emptyTrash()" class="text-[10px] font-black uppercase text-red-500 hover:text-red-700 bg-red-50 px-3 py-1.5 rounded transition border border-red-100">Empty Trash</button>
            </div>
            <div id="trashContents" class="flex-1 overflow-y-auto pr-2 space-y-3 mb-6">
                <span class="text-sm font-bold text-gray-400 italic">Loading...</span>
            </div>
            <button onclick="hideAllModals()" class="bg-gray-200 py-3 px-4 rounded-lg font-bold uppercase text-gray-600 hover:bg-gray-300 transition w-full">Close</button>
        </div>
    </div>

    <div id="draftForm" style="display: none;" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-2xl w-full border-t-8 border-orange-500">
            <h2 class="text-2xl font-bold mb-4 text-orange-600 uppercase">New Draft</h2>
            <div class="space-y-4">
                <div class="flex gap-4">
                    <input type="text" id="draftTitle" placeholder="Concept Name" class="w-2/3 border-2 p-3 rounded-lg outline-none focus:border-orange-500">
                    <input type="text" id="draftCompanion" placeholder="Comp. (Optional)" class="w-1/3 border-2 p-3 rounded-lg outline-none focus:border-orange-500">
                </div>
                <select id="draftCommittee" class="w-full border-2 p-3 rounded-lg font-bold">
                    <option value="Unknown">Assign Committee...</option>
                </select>
                <textarea id="draftBlurb" placeholder="Initial policy notes..." class="w-full border-2 p-3 rounded-lg h-32 outline-none focus:border-orange-500"></textarea>
                <div class="flex gap-2">
                    <button onclick="createDraft()" class="bg-orange-500 text-white font-bold px-6 py-3 rounded-lg flex-1 uppercase hover:bg-orange-600 transition">Create Workspace</button>
                    <button onclick="hideAllModals()" class="bg-gray-200 py-3 px-4 rounded-lg font-bold uppercase text-gray-600 hover:bg-gray-300 transition">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="existingForm" style="display: none;" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-2xl w-full border-t-8 border-[#002e5d]">
            <h2 class="text-2xl font-bold mb-4 text-[#002e5d] uppercase">Track Bill</h2>
            <div class="space-y-4">
                <div class="flex gap-4">
                    <input type="text" id="existingNum" placeholder="Bill # (e.g., 1234)" class="w-full border-2 p-3 rounded-lg">
                </div>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('billNum').value = document.getElementById('existingNum').value; fetchAPI(); hideAllModals();" class="bg-[#002e5d] text-white font-bold px-6 py-3 rounded-lg flex-1 uppercase hover:bg-[#001f3f] transition">Fetch from WSL API</button>
                    <button onclick="hideAllModals()" class="bg-gray-200 py-3 px-4 rounded-lg font-bold uppercase text-gray-600 hover:bg-gray-300 transition">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="promoteForm" style="display: none;" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full border-t-8 border-green-500">
            <h2 class="text-2xl font-bold mb-2 text-green-700 uppercase">Promote to Bill</h2>
            <p class="text-xs text-gray-500 mb-6 font-bold">Enter the official bill number assigned to this draft. The system will auto-fetch the sponsor, summary, and check for companions.</p>
            <div class="space-y-4">
                <input type="text" id="promoteBillNum" placeholder="Bill # (e.g., 1234)" class="w-full border-2 p-3 rounded-lg outline-none focus:border-green-500 font-bold text-gray-700">
                <div id="promoteStatus" class="text-xs font-bold text-blue-600 hidden">Checking WSL API...</div>
                <div class="flex gap-2 pt-2">
                    <button onclick="confirmPromote()" class="bg-green-600 text-white font-bold px-6 py-3 rounded-lg flex-1 uppercase hover:bg-green-700 transition">Promote Draft</button>
                    <button onclick="hideAllModals()" class="bg-gray-200 py-3 px-4 rounded-lg font-bold uppercase text-gray-600 hover:bg-gray-300 transition">Cancel</button>
                </div>
            </div>
        </div>
    </div>

<script>
    if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';

    const workerBaseUrl = "https://misty-credit-9e6a.ewing-jacob.workers.dev";
    const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`, 'Content-Type': 'application/json' };
    
    let currentBillData = null; 
    let workspaceItems = [];
    let userTemplates = [];
    let expandedCards = new Set();
    let activeTabs = {};
    let promoteItemId = null;
    let userProfileCommittees = []; 

    let currentBiennium = '2025-26';
    let currentCommittee = 'All';
    let currentType = 'All';
    let currentStatus = 'All';
    let currentSort = 'priority';

    let undoTimeout;
    let pendingUndoAction = null;

    const committeeColors = {
        "Agriculture & Natural Resources": "#15803d", "Appropriations": "#047857", 
        "Capital Budget": "#0f766e", "Civil Rights & Judiciary": "#4338ca", 
        "Community Safety": "#b91c1c", "Consumer Protection & Business": "#ea580c", 
        "Early Learning & Human Services": "#db2777", "Education": "#be185d", 
        "Environment & Energy": "#16a34a", "Finance": "#0369a1", 
        "Health Care & Wellness": "#0284c7", "Housing": "#7e22ce", 
        "Labor & Workplace Standards": "#b45309", "Local Government": "#6d28d9", 
        "Postsecondary Education & Workforce": "#1d4ed8", "Rules": "#334155", 
        "State Government & Tribal Relations": "#a21caf", "Technology, Economic Development, & Veterans": "#0f172a", 
        "Transportation": "#eab308", "Business, Trade & Economic Development": "#c2410c",
        "Early Learning & K-12 Education": "#be185d", "Environment, Energy & Technology": "#16a34a",
        "Health & Long-Term Care": "#0284c7", "Higher Education & Workforce Development": "#1d4ed8",
        "Human Services": "#db2777", "Labor & Commerce": "#b45309",
        "Law & Justice": "#4338ca", "State Government, Tribal Affairs & Elections": "#a21caf",
        "Ways & Means": "#047857", "Unknown": "#002e5d" 
    };

    const LIVE_STATUS_OPTIONS = ["Introduced", "Public Hearing", "Executive Action", "Fiscal", "Rules", "Floor", "House", "Concurrence", "Passed"];
    
    const DEFAULT_TASKS = {
        "Draft": ["Draft Approved", "Draft to CRO", "CRO Version Received", "Bill & Pink Sheet Sent"],
        "Introduced": ["Review bill", "Add summary to tracker", "Prep talking points"],
        "Public Hearing": ["Submit Bill Report", "Create Bill Presentation", "Submit Public Testimony"],
        "Executive Action": ["Briefing Notes", "Review Proposed Sub", "Update Bill Report"],
        "Fiscal": ["Review Fiscal Note", "Check In with Fiscal Staff"],
        "Rules": ["Review Bill Report", "Prep Floor Note"],
        "Floor": ["Submit Floor Note", "Review Floor Amendments"],
        "House": [], "Default": ["Review Bill", "Monitor Testimony"]
    };

    function safeJSONParse(str, fallback) {
        if (!str) return fallback;
        try { return JSON.parse(str); } catch(e) { return fallback; }
    }

    function showScreen(id) {
        hideAllModals();
        const form = document.getElementById(id);
        form.querySelectorAll('input, textarea, select').forEach(f => {
            if (f.tagName === 'SELECT' && f.id !== 'draftCommittee') f.selectedIndex = 0; else if (f.tagName !== 'SELECT') f.value = '';
        });
        if (id === 'draftForm' && userProfileCommittees.length === 1) {
            document.getElementById('draftCommittee').value = userProfileCommittees[0];
        }
        form.style.display = 'flex';
    }

    function hideAllModals() {
        ['draftForm', 'existingForm', 'promoteForm', 'trashForm'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.setProperty('display', 'none', 'important');
        });
    }

    function setBiennium(val) {
        currentBiennium = val;
        let isArchive = val !== '2025-26';
        document.getElementById('newDraftBtn').style.display = isArchive ? 'none' : 'flex';
        document.getElementById('trackBillBtn').style.display = isArchive ? 'none' : 'flex';
        loadWorkspace();
    }

    function setCommittee(val) { 
        currentCommittee = val; 
        const selectEl = document.getElementById('committeeSelect');
        if (val !== 'All' && committeeColors[val]) {
            const color = committeeColors[val];
            selectEl.style.backgroundColor = color + '1A';
            selectEl.style.color = color;
            selectEl.style.borderColor = color + '40';
        } else {
            selectEl.style.backgroundColor = '';
            selectEl.style.color = '';
            selectEl.style.borderColor = '';
        }
        renderGrid(); 
    }
    
    function setType(val) { currentType = val; renderGrid(); }
    function setStatusFilter(val) { currentStatus = val; renderGrid(); }
    function setSort(val) { currentSort = val; renderGrid(); }
    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    async function loadSidebar() {
        try {
            const response = await fetch('sidebar.html');
            if (!response.ok) throw new Error("Sidebar failed to load.");
            const html = await response.text();
            document.getElementById('sidebar-container').innerHTML = html;
            document.getElementById('userEmailDisplay').innerText = localStorage.getItem('user_email') || 'Unknown';
            const path = window.location.pathname;
            document.querySelectorAll('.nav-item').forEach(item => {
                if (path.includes(item.getAttribute('href'))) {
                    item.classList.add('bg-white/10', 'text-white');
                    item.classList.remove('text-blue-200');
                }
            });
        } catch (error) { console.error(error); }
    }

    async function fetchUserProfileAndTemplates() {
        try {
            const resMe = await fetch(`${workerBaseUrl}/me`, { headers: authHeaders });
            if (resMe.ok) {
                const userData = await resMe.json();
                userProfileCommittees = userData.committees || [];
                
                const filterSelect = document.getElementById('committeeSelect');
                filterSelect.innerHTML = '<option value="All">All Committees</option>';
                const draftSelect = document.getElementById('draftCommittee');
                draftSelect.innerHTML = '<option value="Unknown">Assign Committee...</option>';
                
                userProfileCommittees.forEach(c => {
                    const opt1 = document.createElement('option'); opt1.value = c; opt1.innerText = c;
                    const opt2 = document.createElement('option'); opt2.value = c; opt2.innerText = c;
                    filterSelect.appendChild(opt1);
                    draftSelect.appendChild(opt2);
                });

                if (userProfileCommittees.length === 1) draftSelect.value = userProfileCommittees[0];
            }

            const resTemp = await fetch(`${workerBaseUrl}/templates`, { headers: authHeaders });
            if (resTemp.ok) userTemplates = await resTemp.json();
        } catch (e) { console.error("Could not fetch profile/templates"); }
    }

    window.onload = async () => {
        await loadSidebar();
        await fetchUserProfileAndTemplates();
        await loadWorkspace();
        handleAutoSearch();
        
        const filterSelect = document.getElementById('statusFilter');
        LIVE_STATUS_OPTIONS.forEach(opt => {
            const option = document.createElement('option');
            option.value = opt;
            option.innerText = opt;
            filterSelect.appendChild(option);
        });
    };

    function handleAutoSearch() {
        const urlParams = new URLSearchParams(window.location.search);
        const autosearch = urlParams.get('autosearch');
        if (autosearch) { document.getElementById('billNum').value = autosearch; fetchAPI(); }
    }

    async function loadWorkspace() {
        try {
            const res = await fetch(`${workerBaseUrl}/my-workspace?biennium=${currentBiennium}&t=${Date.now()}`, { 
                headers: authHeaders, 
                cache: "no-store" 
            });
            if (res.status === 401) return logout();
            const rawBills = await res.json();
            
            workspaceItems = rawBills.map(item => ({
                ...item,
                tracking_status: item.tracking_status || "Introduced",
                task_progress: safeJSONParse(item.task_progress, {}),
                custom_tasks: safeJSONParse(item.custom_tasks, []),
                amendments: safeJSONParse(item.amendments, [])
            }));
            renderGrid();
        } catch (e) { console.error("Error loading workspace data.", e); }
    }

    function getTasksForStage(committee, stage) {
        let template = userTemplates.find(t => t.committee === committee && t.stage === stage);
        if (!template) template = userTemplates.find(t => t.committee === 'All' && t.stage === stage);
        if (template && template.tasks) {
            try { return JSON.parse(template.tasks); } catch(e) {}
        }
        return DEFAULT_TASKS[stage] || DEFAULT_TASKS["Default"];
    }

    function renderGrid() {
        const liveGrid = document.getElementById('workspaceGrid');
        const draftGrid = document.getElementById('draftsGrid');
        const deadGrid = document.getElementById('deadGrid');
        
        liveGrid.innerHTML = ''; draftGrid.innerHTML = ''; deadGrid.innerHTML = '';
        let processedIds = new Set();
        let liveCount = 0; let draftCount = 0; let deadCount = 0;
        let isArchive = currentBiennium !== '2025-26';

        let filteredItems = workspaceItems.filter(item => {
            if (currentStatus !== 'All' && item.tracking_status !== currentStatus) return false;
            if (currentCommittee !== 'All' && item.committee !== currentCommittee) return false;
            
            let officialStatus = item.status || "Unknown";
            let internalStatus = item.tracking_status || "Introduced";
            
            let isDead = internalStatus === 'Dead' || officialStatus === 'Dead';
            let isItemDraft = item.type === 'draft' || item.status === 'Draft';

            if (currentType === 'draft' && !isItemDraft) return false;
            if (currentType === 'live' && (isItemDraft || isDead)) return false;
            if (currentType === 'dead' && !isDead) return false;

            return true;
        });

        if (currentSort === 'alpha') filteredItems.sort((a, b) => (a.bill_number || "").localeCompare(b.bill_number || ""));

        filteredItems.forEach(item => {
            if (processedIds.has(item.id)) return;

            let myJustNum = item.bill_number ? item.bill_number.replace(/\D/g, '') : '';
            let myCompStr = item.companion ? item.companion.split(',')[0].replace(/\D/g, '') : '';

            let group = workspaceItems.filter(i => {
                let iJustNum = i.bill_number ? i.bill_number.replace(/\D/g, '') : '';
                let iCompStr = i.companion ? i.companion.split(',')[0].replace(/\D/g, '') : '';
                
                let match1 = myCompStr && iJustNum && myCompStr === iJustNum;
                let match2 = iCompStr && myJustNum && iCompStr === myJustNum;
                let match3 = myCompStr && iCompStr && myCompStr === iCompStr;

                return i.id === item.id || match1 || match2 || match3;
            });

            group.forEach(g => processedIds.add(g.id));

            let activeId = activeTabs[item.id] || item.id;
            let activeItem = group.find(i => i.id === activeId) || group[0];
            
            let officialStatus = activeItem.status || "Unknown";
            let internalStatus = activeItem.tracking_status || "Introduced";
            
            let isDead = internalStatus === 'Dead' || officialStatus === 'Dead';
            let isDraft = activeItem.type === 'draft' || activeItem.status === 'Draft';

            let progress = activeItem.task_progress[internalStatus] || {};
            if (isDraft) progress = activeItem.task_progress["Draft"] || {}; 

            let visualModifier = (isDead && !isDraft) ? 'grayscale-[0.5]' : '';
            const safeCommittee = activeItem.committee || "Unknown";
            const commColor = committeeColors[safeCommittee] || "#002e5d";

            let borderColor = commColor;
            if (isDraft) borderColor = '#f97316'; 
            if (isDead) borderColor = '#64748b'; 

            let groupIdsStr = group.map(g => g.id).join(',');
            let companionUI = '';
            
            let compBillStrRaw = activeItem.companion ? activeItem.companion.split(',')[0].trim() : "";
            if (group.length > 1) {
                companionUI = `<div class="flex bg-gray-100 rounded-lg p-0.5 mt-1 border border-gray-200 w-fit">${group.map(g => `<button onclick="switchTab(event, '${groupIdsStr}', ${g.id})" class="px-3 py-1 text-[10px] font-black uppercase rounded-md transition-all ${activeItem.id === g.id ? 'bg-white text-[#002e5d] shadow-sm' : 'text-gray-500 hover:text-gray-700'}">${g.bill_number}</button>`).join('')}</div>`;
            } else if (compBillStrRaw && compBillStrRaw !== "None" && !isArchive) {

    function triggerUndoToast(message, onUndo, onConfirm) {
        const toast = document.getElementById('undoToast');
        document.getElementById('undoMsg').innerText = message;
        
        if (pendingUndoAction) {
            clearTimeout(undoTimeout);
            pendingUndoAction.onConfirm();
        }

        pendingUndoAction = { onUndo, onConfirm };
        toast.classList.remove('translate-y-24', 'opacity-0');
        
        document.getElementById('undoBtn').onclick = () => {
            if (pendingUndoAction) pendingUndoAction.onUndo();
            closeUndoToast();
        };

        undoTimeout = setTimeout(() => {
            if (pendingUndoAction) pendingUndoAction.onConfirm();
            closeUndoToast();
        }, 5000);
    }

    function closeUndoToast() {
        const toast = document.getElementById('undoToast');
        toast.classList.add('translate-y-24', 'opacity-0');
        pendingUndoAction = null;
    }

    function removeTemplateTaskUI(id, tName) {
        const item = workspaceItems.find(i => i.id === id);
        if (!item.task_progress["Removed"]) item.task_progress["Removed"] = {};
        
        const backupProgress = JSON.parse(JSON.stringify(item.task_progress));
        item.task_progress["Removed"][tName] = true;
        renderGrid(); 

        triggerUndoToast(`Task "${tName}" hidden.`, 
            () => { 
                item.task_progress = backupProgress;
                renderGrid();
            },
            () => { syncToServer(item); }
        );
    }

    function deleteCustomTask(id, tName) {
        const item = workspaceItems.find(i => i.id === id);
        
        const backupTasks = [...item.custom_tasks];
        const backupProgress = JSON.parse(JSON.stringify(item.task_progress));

        item.custom_tasks = item.custom_tasks.filter(t => t !== tName);
        if (item.task_progress["Custom"] && item.task_progress["Custom"][tName]) delete item.task_progress["Custom"][tName];
        renderGrid(); 

        triggerUndoToast(`Task "${tName}" removed.`, 
            () => { 
                item.custom_tasks = backupTasks;
                item.task_progress = backupProgress;
                renderGrid();
            },
            () => { syncToServer(item); }
        );
    }

    async function addCustomTask(id) {
        const input = document.getElementById(`newTask_${id}`);
        const ruleSelect = document.getElementById(`saveRule_${id}`);
        const task = input.value.trim();
        const rule = ruleSelect.value;
        if (!task) return;

        const item = workspaceItems.find(i => i.id === id);
        
        if (rule === 'none') {
            if (!item.custom_tasks) item.custom_tasks = [];
            if (!item.custom_tasks.includes(task)) {
                item.custom_tasks.push(task);
                await syncToServer(item);
            }
        } else {
            const targetCommittee = rule === 'committee' ? (item.committee || 'Unknown') : 'All';
            const currentStage = (item.type === 'draft' || item.status === 'Draft') ? 'Draft' : (item.tracking_status || 'Introduced');
            
            let existingTasks = getTasksForStage(targetCommittee, currentStage);
            if (!existingTasks.includes(task)) {
                existingTasks.push(task);
                try {
                    await fetch(`${workerBaseUrl}/save-template`, {
                        method: 'POST', headers: authHeaders,
                        body: JSON.stringify({ committee: targetCommittee, stage: currentStage, tasks: existingTasks })
                    });
                    await fetchUserProfileAndTemplates(); 
                } catch (e) { console.error("Failed to save template rule."); }
            }

            if (item.custom_tasks && item.custom_tasks.includes(task)) {
                item.custom_tasks = item.custom_tasks.filter(t => t !== task);
                await syncToServer(item); 
            } else {
                renderGrid(); 
            }
        }
        
        input.value = ''; ruleSelect.selectedIndex = 0;
    }

    async function quickAddCompanion(event, compBillStr) {
        event.stopPropagation();
        const btn = event.currentTarget;
        const originalHTML = btn.innerHTML;
        
        btn.innerHTML = `<span class="animate-spin text-lg leading-none mt-[-2px]">↻</span> Adding...`;
        btn.disabled = true;

        const fourDigitMatches = compBillStr.match(/\d{4}/g);
        let bill = fourDigitMatches ? (fourDigitMatches.filter(n => n !== "2025" && n !== "2026")[0] || fourDigitMatches[0]) : compBillStr.replace(/\D/g, '');

        if (!bill) {
            alert("Could not extract a valid companion bill number.");
            btn.innerHTML = originalHTML;
            btn.disabled = false;
            return;
        }

        try {
            const res = await fetch(`${workerBaseUrl}/fetch-bill?bill=${bill}`, { headers: authHeaders });
            const xmlText = await res.text();
            const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
            
            const getTagText = (tag) => {
                let els = xmlDoc.getElementsByTagNameNS("*", tag);
                if (!els || els.length === 0) els = xmlDoc.getElementsByTagName(tag);
                return els.length > 0 ? els[0].textContent.trim() : null;
            };

            const getTagTexts = (tag) => {
                let els = xmlDoc.getElementsByTagNameNS("*", tag);
                if (!els || els.length === 0) els = xmlDoc.getElementsByTagName(tag);
                return Array.from(els).map(e => e.textContent.trim());
            };

            const billNumber = getTagText("BillNumber") || bill;
            const shortDesc = getTagText("ShortDescription") || "No summary provided.";
            const currentStatus = getTagText("HistoryLine") || "Unknown Status";
            const sponsor = getTagText("Name") || "None Listed";
            const companions = getTagTexts("Companion");

            let defaultCommittee = "Unknown";
            if (userProfileCommittees && userProfileCommittees.length === 1) {
                defaultCommittee = userProfileCommittees[0];
            }

            const payload = {
                billNumber: billNumber, shortDesc: shortDesc, status: currentStatus, sponsor: sponsor,
                companion: companions.join(", "), tracking_status: "Introduced", committee: defaultCommittee, type: "live",
                biennium: currentBiennium
            };

            const saveRes = await fetch(`${workerBaseUrl}/save-bill`, { method: 'POST', headers: authHeaders, body: JSON.stringify(payload) });
            if (saveRes.ok) {
                await loadWorkspace(); 
            } else {
                alert("Database failed to save the companion bill."); 
                btn.innerHTML = originalHTML; 
                btn.disabled = false; 
            }
        } catch (e) { 
            alert("Error fetching companion from the API."); 
            btn.innerHTML = originalHTML; 
            btn.disabled = false; 
        }
    }

    async function confirmPromote() {
        if (!promoteItemId) return;
        const rawBill = document.getElementById('promoteBillNum').value.trim();
        if (!rawBill) return alert("Please enter a bill number.");

        const statusDiv = document.getElementById('promoteStatus');
        statusDiv.classList.remove('hidden');
        statusDiv.innerText = "Checking WSL API for data...";

        const fourDigitMatches = rawBill.match(/\d{4}/g);
        let bill = fourDigitMatches ? (fourDigitMatches.filter(n => n !== "2025" && n !== "2026")[0] || fourDigitMatches[0]) : rawBill.replace(/\D/g, '');

        let fetchedCompanion = "", fetchedDesc = "", fetchedSponsor = "", fetchedStatus = "Introduced";

        if (bill) {
            try {
                const res = await fetch(`${workerBaseUrl}/fetch-bill?bill=${bill}`, { headers: authHeaders });
                const xmlText = await res.text();
                const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
                
                const getTagText = (tag) => {
                    let els = xmlDoc.getElementsByTagNameNS("*", tag);
                    if (!els || els.length === 0) els = xmlDoc.getElementsByTagName(tag);
                    return els.length > 0 ? els[0].textContent.trim() : null;
                };

                const getTagTexts = (tag) => {
                    let els = xmlDoc.getElementsByTagNameNS("*", tag);
                    if (!els || els.length === 0) els = xmlDoc.getElementsByTagName(tag);
                    return Array.from(els).map(e => e.textContent.trim());
                };
                
                fetchedDesc = getTagText("ShortDescription") || "";
                fetchedSponsor = getTagText("Name") || "";
                fetchedStatus = getTagText("HistoryLine") || "Introduced";
                fetchedCompanion = getTagTexts("Companion").join(", ");

            } catch (e) { console.error("Failed to fetch bill data."); }
        }

        const oldItem = workspaceItems.find(i => i.id === promoteItemId);
        const payload = {
            billNumber: bill || rawBill, bill_number: bill || rawBill, shortDesc: fetchedDesc || oldItem.short_desc,
            short_desc: fetchedDesc || oldItem.short_desc, status: fetchedStatus, tracking_status: 'Introduced',
            sponsor: fetchedSponsor || oldItem.sponsor, companion: fetchedCompanion || oldItem.companion || "",
            committee: oldItem.committee || "Unknown", type: 'live', live_notes: oldItem.live_notes || "",
            task_progress: JSON.stringify(oldItem.task_progress || {}), custom_tasks: JSON.stringify(oldItem.custom_tasks || []),
            hearing_date: oldItem.hearing_date || "", exec_date: oldItem.exec_date || "", amendments: JSON.stringify(oldItem.amendments || []),
            biennium: currentBiennium
        };

        try {
            const saveRes = await fetch(`${workerBaseUrl}/save-bill`, { method: 'POST', headers: authHeaders, body: JSON.stringify(payload) });
            if (saveRes.ok) await fetch(`${workerBaseUrl}/delete-bill`, { method: 'DELETE', headers: authHeaders, body: JSON.stringify({ id: oldItem.id }) });
        } catch (e) { alert("Error promoting bill."); }

        hideAllModals();
        statusDiv.classList.add('hidden');
        await loadWorkspace();
    }

    function toggleCustomTask(id, tName) {
        const item = workspaceItems.find(i => i.id === id);

        if (item.task_progress["Custom"][tName]) delete item.task_progress["Custom"][tName];
        else item.task_progress["Custom"][tName] = true;
        syncToServer(item);
    }

    async function syncAllBills() {
        const btn = document.getElementById('syncAllBtn');
        const icon = document.getElementById('syncAllIcon');
        const originalText = btn.innerHTML;
        
        btn.disabled = true;
        btn.classList.add('opacity-50');
        icon.classList.add('animate-spin');
        btn.innerHTML = `<span>🔄</span> Syncing...`;
        
        await loadWorkspace(); 
        
        btn.disabled = false;
        btn.classList.remove('opacity-50');
        btn.innerHTML = originalText;
        icon.classList.remove('animate-spin');
    }

    function switchTab(event, groupIdsStr, targetId) {
        event.stopPropagation();
        let ids = groupIdsStr.split(',');
        ids.forEach(id => activeTabs[id] = targetId);
        expandedCards.add(targetId); 
        renderGrid();
    }

    function toggleCard(id) {
        if (expandedCards.has(id)) expandedCards.delete(id);
        else expandedCards.add(id);
        renderGrid();
    }

    function insertTimestamp(id) {
        const textarea = document.getElementById(`notes_${id}`);
        const now = new Date();
        const timeStr = `\n[${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}]: `;
        textarea.value = textarea.value + timeStr;
        textarea.focus();
        updateDB(id, 'live_notes', textarea.value);
    }

    function toggleTask(id, tName, status) {
        const item = workspaceItems.find(i => i.id === id);
        if (!item.task_progress[status]) item.task_progress[status] = {};
        if (item.task_progress[status][tName]) delete item.task_progress[status][tName];
        else item.task_progress[status][tName] = true;
        syncToServer(item);
    }

    function updateDB(id, field, value) {
        const item = workspaceItems.find(i => i.id === id);
        item[field] = value;
        syncToServer(item);
    }
    
    async function syncToServer(item) {
        renderGrid(); 
        const payload = {
            id: item.id, status: item.status, tracking_status: item.tracking_status, type: item.type,
            bill_number: item.bill_number, billNumber: item.bill_number, short_desc: item.short_desc, shortDesc: item.short_desc,   
            sponsor: item.sponsor, companion: item.companion, committee: item.committee || "Unknown",
            live_notes: item.live_notes || "", task_progress: JSON.stringify(item.task_progress || {}),
            custom_tasks: JSON.stringify(item.custom_tasks || []), hearing_date: item.hearing_date || "",
            exec_date: item.exec_date || "", amendments: JSON.stringify(item.amendments || [])
        };
        try { await fetch(`${workerBaseUrl}/update-bill`, { method: 'POST', headers: authHeaders, body: JSON.stringify(payload) }); } 
        catch (e) { console.error("Database sync failed"); }
    }
    
    async function fetchAPI() {
        const rawBill = document.getElementById('billNum').value;
        const resDiv = document.getElementById('apiResults');
        if (!rawBill) return;
        
        const fourDigitMatches = rawBill.match(/\d{4}/g);
        let bill = fourDigitMatches ? (fourDigitMatches.filter(n => n !== "2025" && n !== "2026")[0] || fourDigitMatches[0]) : rawBill.replace(/\D/g, '');

        if (!bill) return resDiv.innerHTML = `<span class="text-orange-500 font-bold text-sm">Invalid bill number.</span>`;
        
        currentBillData = null;
        resDiv.innerHTML = `<span class="text-blue-500 font-bold text-sm">Querying WSL...</span>`;
        
        try {
            const res = await fetch(`${workerBaseUrl}/fetch-bill?bill=${bill}`, { headers: authHeaders });
            const xmlText = await res.text();
            const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
            
            const getTagText = (tag) => {
                let els = xmlDoc.getElementsByTagNameNS("*", tag);
                if (!els || els.length === 0) els = xmlDoc.getElementsByTagName(tag);
                return els.length > 0 ? els[0].textContent.trim() : null;
            };

            const getTagTexts = (tag) => {
                let els = xmlDoc.getElementsByTagNameNS("*", tag);
                if (!els || els.length === 0) els = xmlDoc.getElementsByTagName(tag);
                return Array.from(els).map(e => e.textContent.trim());
            };

            const billNumber = getTagText("BillNumber") || bill;
            const shortDesc = getTagText("ShortDescription") || "No summary provided.";
            const currentStatus = getTagText("HistoryLine") || "Unknown Status";
            const sponsor = getTagText("Name") || "None Listed";
            const companions = getTagTexts("Companion");

            let defaultCommittee = "Unknown";
            if (userProfileCommittees && userProfileCommittees.length === 1) {
                defaultCommittee = userProfileCommittees[0];
            }

            currentBillData = { billNumber, shortDesc, status: currentStatus, sponsor, companion: companions.join(", ") };

            resDiv.innerHTML = `
                <div class="mt-4 p-4 bg-gray-50 border border-gray-200 rounded flex justify-between items-center">
                    <div>
                        <div class="text-sm font-black text-[#002e5d]">${billNumber}</div>
                        <div class="text-xs text-gray-600 font-bold truncate max-w-md">${shortDesc}</div>
                    </div>
                    <button onclick='saveToWorkspace()' class="bg-green-600 hover:bg-green-700 text-white text-[10px] font-black uppercase px-4 py-2 rounded shadow-sm transition">
                        Add to Workspace
                    </button>
                </div>`;
        } catch (e) { resDiv.innerHTML = `<span class="text-red-500 font-bold text-sm">API offline.</span>`; }
    }

    async function saveToWorkspace() {
        if (!currentBillData) return;
        
        let defaultCommittee = "Unknown";
        if (userProfileCommittees && userProfileCommittees.length === 1) {
            defaultCommittee = userProfileCommittees[0];
        }

        const payload = {
            ...currentBillData,
            tracking_status: "Introduced",
            committee: defaultCommittee,
            type: "live",
            biennium: currentBiennium
        };

        try {
            const res = await fetch(`${workerBaseUrl}/save-bill`, { method: 'POST', headers: authHeaders, body: JSON.stringify(payload) });
            if (res.ok) {
                document.getElementById('apiResults').innerHTML = `<span class="text-green-600 font-bold text-sm">Added!</span>`;
                document.getElementById('billNum').value = ''; 
                loadWorkspace(); 
            }
        } catch (e) { alert("Save failed."); }
    }
</script>
