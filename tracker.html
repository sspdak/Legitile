<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegiTile | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .leg-navy { background-color: #002e5d; }
        .live-border { border-left: 8px solid #002e5d; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

    <aside class="leg-navy text-white w-full md:w-48 flex-shrink-0 flex flex-col shadow-2xl z-50 md:h-full">
        <div class="py-8 flex flex-col items-center border-b border-white/10 shrink-0">
            <div class="text-6xl font-serif italic font-black text-transparent bg-clip-text bg-gradient-to-br from-orange-400 to-white drop-shadow-2xl leading-none">L</div>
            <div class="text-[10px] uppercase tracking-[0.2em] text-blue-200 font-bold mt-2 opacity-80">LegiTile</div>
        </div>
        <div class="flex-1 flex flex-col justify-end pb-6 px-4">
            <div class="bg-black/20 rounded-lg p-3 flex flex-col items-center text-center">
                <span class="text-[8px] uppercase tracking-widest text-gray-400 font-bold mb-1">Staff Member</span>
                <span id="userEmailDisplay" class="text-xs font-bold text-white truncate w-full mb-3"></span>
                <button onclick="logout()" class="w-full bg-red-500/20 hover:bg-red-500/40 text-red-200 text-[10px] font-black uppercase py-2 rounded transition border border-red-500/30">Log Out</button>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200 flex justify-between items-center">
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Active Workspace</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
            
            <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border border-gray-100">
                <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-2 block">Lookup & Track a Bill</label>
                <div class="flex gap-3 w-full mb-4">
                    <input type="text" id="billNum" placeholder="Enter Bill Number (e.g. 1000)" class="flex-1 border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700">
                    <button onclick="fetchAPI()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 text-[12px] font-black uppercase px-6 py-3 rounded-lg shadow-sm transition">Search API</button>
                </div>
                <div id="apiResults"></div>
            </div>

            <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">My Tracked Bills</h2>
            <div id="workspaceGrid" class="flex flex-col gap-4 pb-20">
                </div>

        </main>
    </div>

<script>
    if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';
    document.getElementById('userEmailDisplay').innerText = localStorage.getItem('user_email') || 'Unknown';

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    const workerBaseUrl = "https://misty-credit-9e6a.ewing-jacob.workers.dev";
    const authHeaders = { 
        'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`,
        'Content-Type': 'application/json' 
    };

    let currentBillData = null; // Global variable to store fetched bill data safely

    // Load Workspace on boot
    loadWorkspace();

    async function loadWorkspace() {
        try {
            const res = await fetch(`${workerBaseUrl}/my-workspace`, { headers: authHeaders });
            if (res.status === 401) return logout();
            const bills = await res.json();
            
            const grid = document.getElementById('workspaceGrid');
            grid.innerHTML = '';

            if (bills.length === 0) {
                grid.innerHTML = '<div class="text-gray-400 font-bold italic text-sm">No bills currently tracked. Search above to add one.</div>';
                return;
            }

            bills.forEach(item => {
                grid.innerHTML += `
                    <div class="bg-white rounded-xl shadow-md live-border border border-gray-100 overflow-hidden">
                        <div class="p-5 flex flex-col md:flex-row gap-4 items-start md:items-center">
                            <div class="w-48 flex-shrink-0">
                                <span class="text-xl font-black text-gray-800 leading-tight block">${item.bill_number}</span>
                                <span class="text-[10px] font-bold px-1.5 py-0.5 bg-gray-100 rounded border inline-block mt-1">Comp: ${item.companion || 'None'}</span>
                            </div>
                            <div class="md:border-l md:pl-6 flex-1">
                                <span class="text-[9px] font-black uppercase text-gray-400 block tracking-widest">Summary</span>
                                <span class="text-sm text-gray-700 font-bold line-clamp-2">${item.short_desc}</span>
                            </div>
                            <div class="md:border-l md:pl-6 w-48 flex-shrink-0">
                                <span class="text-[9px] font-black uppercase text-gray-400 block tracking-widest mb-1">Status & Sponsor</span>
                                <div class="text-[10px] font-black uppercase text-[#002e5d]">${item.status}</div>
                                <div class="text-[10px] font-bold text-gray-500 truncate mt-1">${item.sponsor}</div>
                            </div>
                        </div>
                    </div>`;
            });
        } catch (e) { console.error(e); }
    }

    async function fetchAPI() {
        const bill = document.getElementById('billNum').value;
        const resDiv = document.getElementById('apiResults');
        if (!bill) return;
        
        currentBillData = null; // Reset previous search data
        resDiv.innerHTML = `<span class="text-blue-500 font-bold text-sm">Querying WSL...</span>`;
        
        try {
            const res = await fetch(`${workerBaseUrl}/fetch-bill?bill=${bill}`, { headers: authHeaders });
            if (res.status === 401) return logout();
            
            const xmlText = await res.text();
            const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
            
            if (xmlDoc.getElementsByTagName("faultstring").length > 0) {
                resDiv.innerHTML = `<span class="text-red-500 font-bold text-sm">API Error: ${xmlDoc.getElementsByTagName("faultstring")[0].textContent}</span>`;
                return;
            }

            const getTagText = (tag) => {
                const nodes = xmlDoc.getElementsByTagNameNS("*", tag);
                return nodes.length > 0 ? nodes[0].textContent.trim() : (xmlDoc.getElementsByTagName(tag)[0]?.textContent.trim() || null);
            };

            const billNumber = getTagText("BillNumber") || bill;
            const shortDesc = getTagText("ShortDescription") || "No short description provided.";
            const longDesc = getTagText("LongDescription") || "No long description provided.";
            const currentStatus = getTagText("HistoryLine") || "Unknown Status";
            
            let primeSponsor = "None Listed";
            const sponsorNodes = Array.from(xmlDoc.getElementsByTagNameNS("*", "Sponsor")).concat(Array.from(xmlDoc.getElementsByTagName("Sponsor")));
            let allSponsors = [];
            
            for (let s of sponsorNodes) {
                const nameNode = s.getElementsByTagNameNS("*", "Name")[0] || s.getElementsByTagName("Name")[0];
                const typeNode = s.getElementsByTagNameNS("*", "Type")[0] || s.getElementsByTagName("Type")[0];
                if (nameNode) {
                    allSponsors.push(nameNode.textContent);
                    if (typeNode && typeNode.textContent === "Primary") {
                        primeSponsor = nameNode.textContent;
                    }
                }
            }
            const sponsorDisplay = allSponsors.length > 0 ? `<strong>Prime:</strong> ${primeSponsor} <br> <strong>All:</strong> ${allSponsors.join(', ')}` : "None Listed";

            let companions = [];
            for (let c of Array.from(xmlDoc.getElementsByTagNameNS("*", "Companion")).concat(Array.from(xmlDoc.getElementsByTagName("Companion")))) {
                if (c.textContent.trim()) companions.push(c.textContent.trim());
            }
            const companionDisplay = companions.length > 0 ? companions.join(", ") : "None";

            // Store data in global variable for saving
            currentBillData = {
                billNumber,
                shortDesc,
                status: currentStatus,
                sponsor: primeSponsor,
                companion: companionDisplay
            };

            resDiv.innerHTML = `
                <div class="mt-4 p-6 bg-gray-50 border border-gray-200 rounded-xl">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div>
                            <span class="text-[10px] font-black uppercase text-gray-400 block tracking-widest mb-1">Bill Number</span>
                            <div class="text-lg font-black text-[#002e5d]">${billNumber}</div>
                        </div>
                        <div>
                            <span class="text-[10px] font-black uppercase text-gray-400 block tracking-widest mb-1">Status</span>
                            <div class="text-sm font-bold text-gray-800">${currentStatus}</div>
                        </div>
                        <div>
                            <span class="text-[10px] font-black uppercase text-gray-400 block tracking-widest mb-1">Sponsor(s)</span>
                            <div class="text-sm font-bold text-gray-800">${sponsorDisplay}</div>
                        </div>
                        <div>
                            <span class="text-[10px] font-black uppercase text-gray-400 block tracking-widest mb-1">Companion</span>
                            <div class="text-sm font-bold text-gray-800">${companionDisplay}</div>
                        </div>
                        <div class="col-span-1 md:col-span-2">
                            <span class="text-[10px] font-black uppercase text-gray-400 block tracking-widest mb-1">Short Description</span>
                            <div class="text-sm font-bold text-gray-800">${shortDesc}</div>
                        </div>
                        <div class="col-span-1 md:col-span-2">
                            <span class="text-[10px] font-black uppercase text-gray-400 block tracking-widest mb-1">Long Description</span>
                            <div class="text-xs font-bold text-gray-500">${longDesc}</div>
                        </div>
                    </div>
                    <button onclick="saveToWorkspace()" class="w-full md:w-auto bg-green-600 hover:bg-green-700 text-white text-[12px] font-black uppercase px-6 py-3 rounded-lg shadow-sm transition">
                        Add to Workspace
                    </button>
                </div>
            `;
        } catch (e) {
            resDiv.innerHTML = `<span class="text-red-500 font-bold text-sm">Connection failed.</span>`;
        }
    }

    async function saveToWorkspace() {
        if (!currentBillData) return;
        
        try {
            const res = await fetch(`${workerBaseUrl}/save-bill`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify(currentBillData)
            });
            
            if (res.ok) {
                const responseData = await res.json();
                if (responseData.message === "Already tracking this bill") {
                    document.getElementById('apiResults').innerHTML = `<span class="text-orange-500 font-bold text-sm">Bill is already in your workspace.</span>`;
                } else {
                    document.getElementById('apiResults').innerHTML = `<span class="text-green-600 font-bold text-sm">Successfully added to workspace!</span>`;
                    document.getElementById('billNum').value = ''; // clear input
                    loadWorkspace(); // Refresh the grid
                }
                currentBillData = null; // Clear the stored data
            } else {
                alert("Failed to save bill.");
            }
        } catch (e) { alert("Failed to save bill."); }
    }
</script>

</body>
</html>
