<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegiTile | Workspace</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIiBmaWxsPSIjMDAyZTVkIi8+PGRlZnM+PGxpbmVhckdyYWRpZW50IGlkPSJnIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj48c3RvcCBvZmZzZXQ9IjAlIiBzdG9wLWNvbG9yPSIjZmI5MjNjIi8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdG9wLWNvbG9yPSIjZmZmZmZmIi8+PC9saW5lYXJHcmFkaWVudD48L2RlZnM+PHRleHQgeD0iNTAiIHk9Ijc1IiBmb250LWZhbWlseT0ic2VyaWYiIGZvbnQtc3R5bGU9Iml0YWxpYyIgZm9udC13ZWlnaHQ9IjkwMCIgZm9udC1zaXplPSI3NSIgZmlsbD0idXJsKCNnKSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+TDwvdGV4dD48L3N2Zz4=">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .leg-navy { background-color: #002e5d; }
        .live-border { border-left: 4px solid #002e5d !important; }
        .dead-border { border-left: 4px solid #64748b !important; opacity: 0.8; }
        .draft-border { border-left: 4px solid #f97316 !important; } 
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .details-hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

    <div id="sidebar-container" class="flex-shrink-0 w-full md:w-28 md:h-full z-50"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Bill Tracker</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
            <div class="bg-white p-6 rounded-xl shadow-sm mb-6 border border-gray-100">
                <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-2 block">Lookup & Track a Bill</label>
                <div class="flex gap-3 w-full mb-4">
                    <input type="text" id="billNum" placeholder="Enter Bill Number (e.g. 1000)" class="flex-1 border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700" onkeypress="if(event.key === 'Enter') fetchAPI()">
                    <button onclick="fetchAPI()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 text-[12px] font-black uppercase px-6 py-3 rounded-lg shadow-sm transition">Search</button>
                </div>
                <div id="apiResults"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm mb-8 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 border border-gray-100">
                
                <div class="flex flex-wrap gap-2 w-full xl:w-auto items-center">
                    <select onchange="setCommittee(this.value)" id="committeeSelect" class="bg-gray-50 border-2 border-gray-200 text-gray-700 font-black uppercase text-[10px] rounded-lg px-2 py-1.5 outline-none focus:border-gray-400 transition shadow-sm cursor-pointer">
                        <option value="All">All Committees</option>
                    </select>
                    <select onchange="setType(this.value)" id="typeSelect" class="bg-gray-50 text-[10px] font-black uppercase rounded-lg px-2 py-1.5 border-none outline-none text-gray-600 focus:text-blue-900 cursor-pointer hover:bg-gray-100 transition">
                        <option value="All">All Types</option>
                        <option value="draft">Drafts Only</option>
                        <option value="live">Live Bills</option>
                    </select>
                    <select onchange="setStatusFilter(this.value)" id="statusFilter" class="bg-gray-50 text-[10px] font-black uppercase rounded-lg px-2 py-1.5 border-none outline-none text-gray-600 focus:text-blue-900 cursor-pointer hover:bg-gray-100 transition">
                        <option value="All">All Steps</option>
                    </select>
                    <select onchange="setSort(this.value)" class="bg-gray-50 text-[10px] font-black uppercase rounded-lg px-2 py-1.5 border-none outline-none text-gray-600 focus:text-blue-900 cursor-pointer hover:bg-gray-100 transition">
                        <option value="priority">Sort: Priority</option>
                        <option value="alpha">Sort: Bill #</option>
                    </select>
                </div>

                <div class="flex flex-wrap gap-2 w-full xl:w-auto items-center ml-auto">
                    <button onclick="showScreen('draftForm')" class="flex-1 md:flex-none bg-orange-500 hover:bg-orange-600 text-white text-[10px] font-black uppercase px-4 py-2 rounded-lg shadow-sm hover:shadow-md transition flex items-center justify-center gap-2">
                        <span>📝</span> New Draft
                    </button>
                    <button onclick="showScreen('existingForm')" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-black uppercase px-4 py-2 rounded-lg shadow-sm hover:shadow-md transition flex items-center justify-center gap-2">
                        <span>📑</span> Track Bill
                    </button>
                    <button onclick="syncAllBills()" id="syncAllBtn" class="flex-1 md:flex-none bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] font-black uppercase px-4 py-2 rounded-lg shadow-sm hover:shadow-md transition flex items-center justify-center gap-2">
                        <span id="syncAllIcon">🔄</span> Refresh
                    </button>
                </div>
            </div>

            <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">My Bill Drafts</h2>
            <div id="draftsGrid" class="flex flex-col gap-6 mb-8"></div>

            <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">My Tracked Bills</h2>
            <div id="workspaceGrid" class="flex flex-col gap-6 pb-20"></div>
        </main>
    </div>

    <div id="draftForm" style="display: none;" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-2xl w-full border-t-8 border-orange-500">
            <h2 class="text-2xl font-bold mb-4 text-orange-600 uppercase">New Draft</h2>
            <div class="space-y-4">
                <div class="flex gap-4">
                    <input type="text" id="draftTitle" placeholder="Concept Name" class="w-2/3 border-2 p-3 rounded-lg outline-none focus:border-orange-500">
                    <input type="text" id="draftCompanion" placeholder="Comp. (Optional)" class="w-1/3 border-2 p-3 rounded-lg outline-none focus:border-orange-500">
                </div>
                <select id="draftCommittee" class="w-full border-2 p-3 rounded-lg font-bold">
                    <option value="Unknown">Assign Committee...</option>
                </select>
                <textarea id="draftBlurb" placeholder="Initial policy notes..." class="w-full border-2 p-3 rounded-lg h-32 outline-none focus:border-orange-500"></textarea>
                <div class="flex gap-2">
                    <button onclick="createDraft()" class="bg-orange-500 text-white font-bold px-6 py-3 rounded-lg flex-1 uppercase hover:bg-orange-600 transition">Create Workspace</button>
                    <button onclick="hideAllModals()" class="bg-gray-200 py-3 px-4 rounded-lg font-bold uppercase text-gray-600 hover:bg-gray-300 transition">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="existingForm" style="display: none;" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-2xl w-full border-t-8 border-[#002e5d]">
            <h2 class="text-2xl font-bold mb-4 text-[#002e5d] uppercase">Track Bill</h2>
            <div class="space-y-4">
                <div class="flex gap-4">
                    <input type="text" id="existingNum" placeholder="Bill # (e.g., 1234)" class="w-full border-2 p-3 rounded-lg">
                </div>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('billNum').value = document.getElementById('existingNum').value; fetchAPI(); hideAllModals();" class="bg-[#002e5d] text-white font-bold px-6 py-3 rounded-lg flex-1 uppercase hover:bg-[#001f3f] transition">Fetch from WSL API</button>
                    <button onclick="hideAllModals()" class="bg-gray-200 py-3 px-4 rounded-lg font-bold uppercase text-gray-600 hover:bg-gray-300 transition">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="editForm" style="display: none;" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-2xl w-full border-t-8 border-gray-600">
            <h2 class="text-2xl font-bold mb-4 text-gray-800 uppercase">Edit Details</h2>
            <div class="space-y-4">
                <div class="flex gap-4">
                    <input type="text" id="editBillNum" placeholder="Bill / Concept Name" class="w-2/3 border-2 p-3 rounded-lg outline-none focus:border-gray-500">
                    <input type="text" id="editCompanion" placeholder="Comp. (Optional)" class="w-1/3 border-2 p-3 rounded-lg outline-none focus:border-gray-500">
                </div>
                <input type="text" id="editSponsor" placeholder="Sponsor" class="w-full border-2 p-3 rounded-lg outline-none focus:border-gray-500">
                <textarea id="editShortDesc" placeholder="Summary or Description..." class="w-full border-2 p-3 rounded-lg h-24 outline-none focus:border-gray-500"></textarea>
                <div class="flex gap-2">
                    <button onclick="saveEdit()" class="bg-gray-600 text-white font-bold px-6 py-3 rounded-lg flex-1 uppercase hover:bg-gray-700 transition">Save Changes</button>
                    <button onclick="hideAllModals()" class="bg-gray-200 py-3 px-4 rounded-lg font-bold uppercase text-gray-600 hover:bg-gray-300 transition">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="promoteForm" style="display: none;" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full border-t-8 border-green-500">
            <h2 class="text-2xl font-bold mb-2 text-green-700 uppercase">Promote to Bill</h2>
            <p class="text-xs text-gray-500 mb-6 font-bold">Enter the official bill number assigned to this draft. The system will auto-fetch the sponsor, summary, and check for companions.</p>
            <div class="space-y-4">
                <input type="text" id="promoteBillNum" placeholder="Bill # (e.g., 1234)" class="w-full border-2 p-3 rounded-lg outline-none focus:border-green-500 font-bold text-gray-700">
                <div id="promoteStatus" class="text-xs font-bold text-blue-600 hidden">Checking WSL API...</div>
                <div class="flex gap-2 pt-2">
                    <button onclick="confirmPromote()" class="bg-green-600 text-white font-bold px-6 py-3 rounded-lg flex-1 uppercase hover:bg-green-700 transition">Promote Draft</button>
                    <button onclick="hideAllModals()" class="bg-gray-200 py-3 px-4 rounded-lg font-bold uppercase text-gray-600 hover:bg-gray-300 transition">Cancel</button>
                </div>
            </div>
        </div>
    </div>

<script>
    if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';

    const workerBaseUrl = "https://misty-credit-9e6a.ewing-jacob.workers.dev";
    const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`, 'Content-Type': 'application/json' };
    
    let currentBillData = null; 
    let workspaceItems = [];
    let userTemplates = []; // Stores the custom workflow rules
    let expandedCards = new Set();
    let activeTabs = {};
    let editItemId = null; 
    let promoteItemId = null;
    let userProfileCommittees = []; 

    let currentCommittee = 'All';
    let currentType = 'All';
    let currentStatus = 'All';
    let currentSort = 'priority';

    const committeeColors = {
        "Agriculture & Natural Resources": "#15803d", "Appropriations": "#047857", 
        "Capital Budget": "#0f766e", "Civil Rights & Judiciary": "#4338ca", 
        "Community Safety": "#b91c1c", "Consumer Protection & Business": "#ea580c", 
        "Early Learning & Human Services": "#db2777", "Education": "#be185d", 
        "Environment & Energy": "#16a34a", "Finance": "#0369a1", 
        "Health Care & Wellness": "#0284c7", "Housing": "#7e22ce", 
        "Labor & Workplace Standards": "#b45309", "Local Government": "#6d28d9", 
        "Postsecondary Education & Workforce": "#1d4ed8", "Rules": "#334155", 
        "State Government & Tribal Relations": "#a21caf", "Technology, Economic Development, & Veterans": "#0f172a", 
        "Transportation": "#eab308", "Business, Trade & Economic Development": "#c2410c",
        "Early Learning & K-12 Education": "#be185d", "Environment, Energy & Technology": "#16a34a",
        "Health & Long-Term Care": "#0284c7", "Higher Education & Workforce Development": "#1d4ed8",
        "Human Services": "#db2777", "Labor & Commerce": "#b45309",
        "Law & Justice": "#4338ca", "State Government, Tribal Affairs & Elections": "#a21caf",
        "Ways & Means": "#047857", "Unknown": "#002e5d" 
    };

    const LIVE_STATUS_OPTIONS = ["Introduced", "Public Hearing", "Executive Action", "Fiscal", "Rules", "Floor", "House", "Concurrence", "Passed", "Dead"];
    
    // Default hardcoded fallbacks if the user has no custom templates
    const DEFAULT_TASKS = {
        "Draft": ["Draft Approved", "Draft to CRO", "CRO Version Received", "Bill & Pink Sheet Sent"],
        "Introduced": ["Review bill", "Add summary to tracker", "Prep talking points"],
        "Public Hearing": ["Submit Bill Report", "Create Bill Presentation", "Submit Public Testimony"],
        "Executive Action": ["Briefing Notes", "Review Proposed Sub", "Update Bill Report"],
        "Fiscal": ["Review Fiscal Note", "Check In with Fiscal Staff"],
        "Rules": ["Review Bill Report", "Prep Floor Note"],
        "Floor": ["Submit Floor Note", "Review Floor Amendments"],
        "House": [], "Dead": [], "Default": ["Review Bill", "Monitor Testimony"]
    };

    function showScreen(id) {
        hideAllModals();
        const form = document.getElementById(id);
        form.querySelectorAll('input, textarea, select').forEach(f => {
            if (f.tagName === 'SELECT' && f.id !== 'draftCommittee') f.selectedIndex = 0; else if (f.tagName !== 'SELECT') f.value = '';
        });
        if (id === 'draftForm' && userProfileCommittees.length === 1) {
            document.getElementById('draftCommittee').value = userProfileCommittees[0];
        }
        form.style.display = 'flex';
    }

    function hideAllModals() {
        ['draftForm', 'existingForm', 'editForm', 'promoteForm'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.setProperty('display', 'none', 'important');
        });
    }

    function setCommittee(val) { 
        currentCommittee = val; 
        const selectEl = document.getElementById('committeeSelect');
        if (val !== 'All' && committeeColors[val]) {
            const color = committeeColors[val];
            selectEl.style.backgroundColor = color + '1A';
            selectEl.style.color = color;
            selectEl.style.borderColor = color + '40';
        } else {
            selectEl.style.backgroundColor = '';
            selectEl.style.color = '';
            selectEl.style.borderColor = '';
        }
        renderGrid(); 
    }
    
    function setType(val) { currentType = val; renderGrid(); }
    function setStatusFilter(val) { currentStatus = val; renderGrid(); }
    function setSort(val) { currentSort = val; renderGrid(); }
    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    async function loadSidebar() {
        try {
            const response = await fetch('sidebar.html');
            if (!response.ok) throw new Error("Sidebar failed to load.");
            const html = await response.text();
            document.getElementById('sidebar-container').innerHTML = html;
            document.getElementById('userEmailDisplay').innerText = localStorage.getItem('user_email') || 'Unknown';
            const path = window.location.pathname;
            document.querySelectorAll('.nav-item').forEach(item => {
                if (path.includes(item.getAttribute('href'))) {
                    item.classList.add('bg-white/10', 'text-white');
                    item.classList.remove('text-blue-200');
                }
            });
        } catch (error) { console.error(error); }
    }

    async function fetchUserProfileAndTemplates() {
        try {
            const resMe = await fetch(`${workerBaseUrl}/me`, { headers: authHeaders });
            if (resMe.ok) {
                const userData = await resMe.json();
                userProfileCommittees = userData.committees || [];
                
                const filterSelect = document.getElementById('committeeSelect');
                filterSelect.innerHTML = '<option value="All">All Committees</option>';
                const draftSelect = document.getElementById('draftCommittee');
                draftSelect.innerHTML = '<option value="Unknown">Assign Committee...</option>';
                
                userProfileCommittees.forEach(c => {
                    const opt1 = document.createElement('option'); opt1.value = c; opt1.innerText = c;
                    const opt2 = document.createElement('option'); opt2.value = c; opt2.innerText = c;
                    filterSelect.appendChild(opt1);
                    draftSelect.appendChild(opt2);
                });

                if (userProfileCommittees.length === 1) draftSelect.value = userProfileCommittees[0];
            }

            // Fetch custom rules
            const resTemp = await fetch(`${workerBaseUrl}/templates`, { headers: authHeaders });
            if (resTemp.ok) {
                userTemplates = await resTemp.json();
            }
        } catch (e) { console.error("Could not fetch profile/templates"); }
    }

    window.onload = async () => {
        await loadSidebar();
        await fetchUserProfileAndTemplates();
        await loadWorkspace();
        handleAutoSearch();
        
        const filterSelect = document.getElementById('statusFilter');
        LIVE_STATUS_OPTIONS.forEach(opt => {
            const option = document.createElement('option');
            option.value = opt;
            option.innerText = opt;
            filterSelect.appendChild(option);
        });
    };

    function handleAutoSearch() {
        const urlParams = new URLSearchParams(window.location.search);
        const autosearch = urlParams.get('autosearch');
        if (autosearch) { document.getElementById('billNum').value = autosearch; fetchAPI(); }
    }

    async function loadWorkspace() {
        try {
            const res = await fetch(`${workerBaseUrl}/my-workspace`, { headers: authHeaders });
            if (res.status === 401) return logout();
            const rawBills = await res.json();
            
            workspaceItems = rawBills.map(item => ({
                ...item,
                tracking_status: item.tracking_status || "Introduced",
                task_progress: JSON.parse(item.task_progress || '{}'),
                custom_tasks: JSON.parse(item.custom_tasks || '[]'),
                amendments: JSON.parse(item.amendments || '[]')
            }));
            renderGrid();
        } catch (e) { console.error(e); }
    }

    // Engine: Determine which tasks to load based on templates hierarchy
    function getTasksForStage(committee, stage) {
        let template = userTemplates.find(t => t.committee === committee && t.stage === stage);
        if (!template) template = userTemplates.find(t => t.committee === 'All' && t.stage === stage);
        
        if (template && template.tasks) {
            try { return JSON.parse(template.tasks); } catch(e) {}
        }
        return DEFAULT_TASKS[stage] || DEFAULT_TASKS["Default"];
    }

    function renderGrid() {
        const liveGrid = document.getElementById('workspaceGrid');
        const draftGrid = document.getElementById('draftsGrid');
        liveGrid.innerHTML = ''; draftGrid.innerHTML = '';
        let processedIds = new Set();
        let liveCount = 0; let draftCount = 0;

        let filteredItems = workspaceItems.filter(item => {
            if (currentStatus !== 'All' && item.tracking_status !== currentStatus) return false;
            if (currentCommittee !== 'All' && item.committee !== currentCommittee) return false;
            let isItemDraft = item.type === 'draft' || item.status === 'Draft';
            if (currentType === 'draft' && !isItemDraft) return false;
            if (currentType === 'live' && isItemDraft) return false;
            return true;
        });

        if (currentSort === 'alpha') filteredItems.sort((a, b) => (a.bill_number || "").localeCompare(b.bill_number || ""));

        filteredItems.forEach(item => {
            if (processedIds.has(item.id)) return;

            let compBillStr = item.companion ? item.companion.split(',')[0].trim() : "";
            let compItem = compBillStr ? workspaceItems.find(i => i.bill_number === compBillStr || i.companion.includes(item.bill_number)) : null;

            let group = [item];
            if (compItem && compItem.id !== item.id) { group.push(compItem); processedIds.add(compItem.id); }
            processedIds.add(item.id);

            let activeId = activeTabs[item.id] || item.id;
            let activeItem = group.find(i => i.id === activeId) || item;
            
            let officialStatus = activeItem.status || "Unknown";
            let internalStatus = activeItem.tracking_status || "Introduced";
            
            let isDead = officialStatus === 'Dead';
            let isDraft = activeItem.type === 'draft' || activeItem.status === 'Draft';

            let progress = activeItem.task_progress[internalStatus] || {};
            if (isDraft) progress = activeItem.task_progress["Draft"] || {}; 

            let visualModifier = (isDead && !isDraft) ? 'grayscale-[0.5]' : '';
            const safeCommittee = activeItem.committee || "Unknown";
            const commColor = committeeColors[safeCommittee] || "#002e5d";

            let borderColor = commColor;
            if (isDraft) borderColor = '#f97316'; 
            if (isDead) borderColor = '#64748b'; 

            let companionUI = '';
            if (group.length > 1) {
                companionUI = `<div class="flex bg-gray-100 rounded-lg p-0.5 mt-1 border border-gray-200 w-fit">${group.map(g => `<button onclick="switchTab(event, ${item.id}, ${g.id})" class="px-3 py-1 text-[10px] font-black uppercase rounded-md transition-all ${activeItem.id === g.id ? 'bg-white text-[#002e5d] shadow-sm' : 'text-gray-500 hover:text-gray-700'}">${g.bill_number}</button>`).join('')}</div>`;
            } else if (compBillStr && compBillStr !== "None") {
                companionUI = `<button onclick="quickAddCompanion(event, '${compBillStr}')" class="mt-1 px-3 py-1 text-[9px] font-black uppercase rounded-lg border border-dashed border-gray-300 text-gray-500 hover:border-[#002e5d] hover:text-[#002e5d] transition flex items-center gap-1 bg-gray-50 hover:bg-blue-50 w-fit"><span class="text-lg leading-none mt-[-2px]">+</span> Companion: ${compBillStr}</button>`;
            }

            // Pull Custom/Default rules from Rule Engine
            let stageForTasks = isDraft ? "Draft" : internalStatus;
            let resolvedTasks = getTasksForStage(safeCommittee, stageForTasks);

            let coreTasksHtml = resolvedTasks.length === 0 ? '<span class="text-xs font-bold text-gray-400">No tasks for this stage.</span>' : resolvedTasks.map(tName => {
                const done = progress[tName];
                const safeName = tName.replace(/"/g, '&quot;').replace(/'/g, "\\'");
                const accentColor = isDraft ? 'text-orange-500' : 'text-[#002e5d]';
                return `
                <div class="flex items-center justify-between py-1">
                    <label class="flex items-center gap-3 text-sm cursor-pointer w-full">
                        <input type="checkbox" onchange="toggleTask(${activeItem.id}, '${safeName}', '${stageForTasks}')" ${done ? 'checked' : ''} class="h-4 w-4 rounded ${accentColor} border-gray-300 outline-none">
                        <span class="${done ? 'text-gray-400 line-through' : 'font-bold text-gray-700'}">${tName}</span>
                    </label>
                </div>`;
            }).join('');

            let statusSectionHtml = `
                <div class="flex items-center justify-between mb-2">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-400">${isDraft ? 'Draft Steps' : 'Status & Tasks'}</h3>
                    ${!isDraft ? `<select onchange="updateDB(${activeItem.id}, 'tracking_status', this.value)" class="text-[10px] font-black uppercase bg-gray-100 px-2 py-1 rounded outline-none cursor-pointer border border-gray-200">${LIVE_STATUS_OPTIONS.map(opt => `<option value="${opt}" ${internalStatus === opt ? 'selected' : ''}>${opt}</option>`).join('')}</select>` : ''}
                </div>
                <div class="space-y-1 ${isDraft ? 'bg-orange-50 border-orange-100' : 'bg-blue-50/50 border-blue-100/50'} p-3 rounded border">
                    ${coreTasksHtml}
                </div>
            `;

            let customTasksHtml = (activeItem.custom_tasks || []).map(tName => {
                let customProg = activeItem.task_progress["Custom"] || {};
                const done = customProg[tName];
                const safeName = tName.replace(/"/g, '&quot;').replace(/'/g, "\\'");
                return `
                <div class="flex items-center justify-between py-1 group">
                    <label class="flex items-center gap-3 text-sm cursor-pointer w-full">
                        <input type="checkbox" onchange="toggleCustomTask(${activeItem.id}, '${safeName}')" ${done ? 'checked' : ''} class="h-4 w-4 rounded text-purple-600 border-gray-300 outline-none">
                        <span class="${done ? 'text-gray-400 line-through' : 'font-bold text-gray-700'}">${tName}</span>
                    </label>
                    <button onclick="deleteCustomTask(${activeItem.id}, '${safeName}')" class="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition px-2 focus:opacity-100" title="Delete Task">×</button>
                </div>`;
            }).join('');

            // Organic Capture UI dropdown
            let addTaskHtml = `
                <div class="mt-2 flex gap-2">
                    <input type="text" id="newTask_${activeItem.id}" placeholder="Add custom to-do..." class="text-xs font-bold text-gray-600 p-2 border border-gray-200 rounded flex-1 outline-none focus:border-gray-400" onkeypress="if(event.key === 'Enter') addCustomTask(${activeItem.id})">
                    <select id="saveRule_${activeItem.id}" class="text-[9px] font-black uppercase tracking-widest bg-gray-50 border border-gray-200 text-gray-500 rounded outline-none cursor-pointer hover:bg-gray-100 max-w-[120px] px-1">
                        <option value="none">Just this bill</option>
                        <option value="committee">Save for ${safeCommittee}</option>
                        <option value="all">Save for All</option>
                    </select>
                    <button onclick="addCustomTask(${activeItem.id})" class="bg-gray-100 hover:bg-gray-200 border border-gray-200 text-gray-600 px-3 py-1 rounded text-lg font-bold transition outline-none focus:border-gray-400">+</button>
                </div>
            `;

            statusSectionHtml += `
                <div class="mt-4 pt-4 border-t border-gray-100">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Custom To-Dos</h3>
                    <div class="space-y-1">${customTasksHtml}</div>
                    ${addTaskHtml}
                </div>
            `;

            let promoteBtn = isDraft ? `<button onclick="openPromoteModal(${activeItem.id})" class="text-[10px] font-black uppercase text-green-600 hover:text-green-800 bg-green-50 hover:bg-green-100 px-4 py-2 rounded transition border border-green-200">Promote to Bill</button>` : '';

            let commOptions = `<option value="Unknown" ${safeCommittee === 'Unknown' ? 'selected' : ''}>Assign Comm...</option>`;
            userProfileCommittees.forEach(c => { commOptions += `<option value="${c}" ${safeCommittee === c ? 'selected' : ''}>${c}</option>`; });
            if (safeCommittee !== 'Unknown' && !userProfileCommittees.includes(safeCommittee)) { commOptions += `<option value="${safeCommittee}" selected>${safeCommittee}</option>`; }

            let cardHtml = `
                <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden ${visualModifier}" style="border-left: 5px solid ${borderColor};">
                    <div class="p-5 flex flex-col md:flex-row gap-4 items-start cursor-pointer hover:bg-gray-50 transition" onclick="toggleCard(${item.id})">
                        <div class="w-auto flex-shrink-0 md:w-32 pt-1"><span class="text-xl font-black text-gray-800 leading-tight block">${activeItem.bill_number}</span>${companionUI}</div>
                        <div class="md:border-l md:pl-6 flex-1"><span class="text-[9px] font-black uppercase text-gray-400 block tracking-widest mb-1">Summary</span><span class="text-sm text-gray-700 font-bold line-clamp-2">${activeItem.short_desc}</span>
                            <div class="mt-3 flex flex-wrap items-center gap-2"><div class="bg-gray-100 border border-gray-200 text-gray-600 text-[9px] font-black uppercase px-2 py-1 rounded" title="${officialStatus}">${officialStatus}</div><div class="text-[10px] font-bold text-gray-500 border-l border-gray-300 pl-2 ml-1" title="${activeItem.sponsor}">Sponsor: ${activeItem.sponsor}</div></div>
                        </div>
                        <div class="md:border-l md:pl-6 w-48 flex-shrink-0 flex flex-col pt-1"><span class="text-[9px] font-black uppercase text-gray-400 block tracking-widest mb-2 text-center">Committee</span>
                            <div class="w-full hover:opacity-80 transition-opacity"><select onchange="updateDB(${activeItem.id}, 'committee', this.value); event.stopPropagation();" onclick="event.stopPropagation()" class="w-full text-[9px] font-black uppercase tracking-widest rounded px-1.5 py-1.5 outline-none cursor-pointer transition appearance-none text-center shadow-sm border" style="background-color: ${commColor}1A; color: ${commColor}; border-color: ${commColor}40;">${commOptions}</select></div>
                        </div>
                    </div>
                    <div id="details_${activeItem.id}" class="px-6 pb-6 pt-2 border-t border-gray-50 ${expandedCards.has(item.id) ? '' : 'details-hidden'}">
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-4"><div class="space-y-4">${statusSectionHtml}</div>
                            <div class="space-y-4 flex flex-col h-full"><div class="bg-gray-50 p-4 rounded-lg border border-gray-200 flex-1 flex flex-col"><div class="flex justify-between items-center mb-2"><label class="text-[10px] font-black text-gray-400 uppercase">Workspace Notes</label><button onclick="insertTimestamp(${activeItem.id})" class="text-[9px] font-bold text-blue-600 bg-blue-100 px-2 py-1 rounded hover:bg-blue-200 uppercase">Timestamp</button></div><textarea id="notes_${activeItem.id}" onchange="updateDB(${activeItem.id}, 'live_notes', this.value)" class="w-full bg-transparent text-sm italic flex-1 focus:outline-none resize-none" placeholder="Draft talking points or staff notes...">${activeItem.live_notes || ""}</textarea></div></div>
                        </div>
                        <div class="flex justify-between items-center mt-6 pt-4 border-t border-gray-200"><span class="text-[9px] font-black uppercase tracking-widest text-gray-400">Workspace Controls</span><div class="flex flex-wrap gap-2">${promoteBtn}<button onclick="openEdit(${activeItem.id})" class="text-[10px] font-black uppercase text-gray-600 hover:text-gray-800 bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded transition border border-gray-200">Edit Core Info</button><button onclick="deleteBill(${activeItem.id})" class="text-[10px] font-black uppercase text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-4 py-2 rounded transition border border-red-100">Remove</button></div></div>
                    </div>
                </div>`;

            if (isDraft) { draftGrid.innerHTML += cardHtml; draftCount++; } else { liveGrid.innerHTML += cardHtml; liveCount++; }
        });

        if (draftCount === 0) draftGrid.innerHTML = '<div class="text-gray-400 font-bold italic text-sm">No drafts to display.</div>';
        if (liveCount === 0) liveGrid.innerHTML = '<div class="text-gray-400 font-bold italic text-sm">No tracked bills to display.</div>';
    }

    // Updated addCustomTask to handle organic template saving
    async function addCustomTask(id) {
        const input = document.getElementById(`newTask_${id}`);
        const ruleSelect = document.getElementById(`saveRule_${id}`);
        const task = input.value.trim();
        const rule = ruleSelect.value;
        if (!task) return;

        const item = workspaceItems.find(i => i.id === id);
        
        // 1. Save locally to this specific bill
        if (!item.custom_tasks) item.custom_tasks = [];
        if (!item.custom_tasks.includes(task)) {
            item.custom_tasks.push(task);
            await syncToServer(item);
        }

        // 2. If a rule was selected, push to the template database
        if (rule !== 'none') {
            const targetCommittee = rule === 'committee' ? (item.committee || 'Unknown') : 'All';
            const currentStage = (item.type === 'draft' || item.status === 'Draft') ? 'Draft' : (item.tracking_status || 'Introduced');
            
            let existingTasks = getTasksForStage(targetCommittee, currentStage);
            if (!existingTasks.includes(task)) {
                existingTasks.push(task);
                
                try {
                    await fetch(`${workerBaseUrl}/save-template`, {
                        method: 'POST',
                        headers: authHeaders,
                        body: JSON.stringify({
                            committee: targetCommittee,
                            stage: currentStage,
                            tasks: existingTasks
                        })
                    });
                    // Refresh templates so the UI knows about the new rule
                    await fetchUserProfileAndTemplates(); 
                } catch (e) { console.error("Failed to save template rule."); }
            }
        }
        
        input.value = '';
        ruleSelect.selectedIndex = 0;
    }
