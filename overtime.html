<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegiTile | Overtime Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .leg-navy { background-color: #002e5d; }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#002e5d">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

    <div id="sidebar-container" class="flex-shrink-0 w-full md:w-28 md:h-full z-50"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
            <div>
                <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Overtime Tracker</h1>
                <p class="text-xs text-gray-500 font-bold mt-1 mb-3">Log and monitor your extra session hours.</p>
                <select onchange="setYear(this.value)" id="yearSelect" class="bg-white border border-gray-200 text-gray-700 font-black uppercase text-[10px] rounded-lg px-3 py-2 outline-none focus:border-blue-500 transition shadow-sm cursor-pointer hover:bg-gray-50">
                    </select>
            </div>
            <div class="text-left sm:text-right">
                <div class="text-[10px] uppercase font-black text-gray-400 tracking-wider">Session Total</div>
                <div id="totalHoursDisplay" class="text-3xl font-black text-[#002e5d]">0.0 <span class="text-sm text-gray-500">hrs</span></div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
            <div class="max-w-4xl mx-auto">
                
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 mb-8 flex flex-col sm:flex-row gap-3 items-end">
                    <div class="flex-1 w-full">
                        <label class="block text-[10px] font-black uppercase text-gray-400 mb-1">Date</label>
                        <input type="date" id="otDate" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] transition font-bold text-gray-700 cursor-pointer">
                    </div>
                    <div class="w-full sm:w-24">
                        <label class="block text-[10px] font-black uppercase text-gray-400 mb-1">Hours</label>
                        <input type="number" step="0.25" min="0" id="otHours" placeholder="0.0" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] transition font-bold text-gray-700">
                    </div>
                    <div class="flex-1 w-full">
                        <label class="block text-[10px] font-black uppercase text-gray-400 mb-1">Description</label>
                        <input type="text" id="otDesc" placeholder="e.g., Committee prep, floor debate..." class="w-full bg-gray-50 border border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] transition font-bold text-gray-700" onkeypress="if(event.key === 'Enter') addOvertime()">
                    </div>
                    <button onclick="addOvertime()" class="w-full sm:w-auto bg-[#002e5d] hover:bg-[#001f3f] text-white text-[12px] font-black uppercase px-8 py-3 rounded-lg shadow-sm transition">
                        Log
                    </button>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 text-[10px] uppercase tracking-wider font-black border-b border-gray-200">
                                <th class="p-4 w-32">Date</th>
                                <th class="p-4 w-24">Hours</th>
                                <th class="p-4">Description</th>
                                <th class="p-4 w-16 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="overtimeGrid" class="text-sm divide-y divide-gray-100">
                            <tr>
                                <td colspan="4" class="p-8 text-center text-gray-400 font-bold italic animate-pulse">Loading records...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

    <script>
        if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';

        const workerBaseUrl = "https://misty-credit-9e6a.ewing-jacob.workers.dev";
        const authHeaders = { 
            'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`, 
            'Content-Type': 'application/json' 
        };
        
        let otRecords = [];
        let currentYear = getSessionYear(new Date().toISOString().split('T')[0]);

        // Helper to determine the session year based on Q4 start
        function getSessionYear(dateString) {
            const parts = dateString.split('-');
            const year = parseInt(parts[0]);
            const month = parseInt(parts[1]);
            // If Oct, Nov, Dec, it counts toward next year's session
            return month >= 10 ? (year + 1).toString() : year.toString();
        }

        async function loadSidebar() {
            try {
                const response = await fetch('sidebar.html');
                if (response.ok) {
                    document.getElementById('sidebar-container').innerHTML = await response.text();
                    
                    const emailDisplay = document.getElementById('userEmailDisplay');
                    if (emailDisplay) {
                        emailDisplay.innerText = localStorage.getItem('user_email') || 'Unknown User';
                    }

                    const path = window.location.pathname;
                    document.querySelectorAll('.nav-item').forEach(item => {
                        if (path.includes(item.getAttribute('href'))) {
                            item.classList.add('bg-white/10', 'text-white');
                            item.classList.remove('text-blue-200');
                        }
                    });
                }
            } catch (error) { console.error("Sidebar failed to load."); }
        }

        function populateYears() {
            const select = document.getElementById('yearSelect');
            const startYear = 2025; 
            const maxYear = Math.max(parseInt(getSessionYear(new Date().toISOString().split('T')[0])), parseInt(currentYear)) + 1;
            
            let html = '';
            for(let y = maxYear; y >= startYear; y--) {
                html += `<option value="${y}" ${y.toString() === currentYear ? 'selected' : ''}>${y} Session</option>`;
            }
            select.innerHTML = html;
        }

        function setYear(val) {
            currentYear = val;
            fetchOvertime(); 
        }

        document.getElementById('otDate').valueAsDate = new Date();

        async function fetchOvertime() {
            try {
                // Changed parameter to 'session_year' to distinguish backend logic
                const res = await fetch(`${workerBaseUrl}/overtime?session_year=${currentYear}`, { headers: authHeaders });
                if (!res.ok) throw new Error("Failed to fetch data.");
                otRecords = await res.json();
                renderOvertime();
            } catch (e) {
                document.getElementById('overtimeGrid').innerHTML = `<tr><td colspan="4" class="text-center text-red-500 text-sm font-bold py-10">Error loading records: ${e.message}</td></tr>`;
            }
        }

        function renderOvertime() {
            const grid = document.getElementById('overtimeGrid');
            const totalDisplay = document.getElementById('totalHoursDisplay');
            grid.innerHTML = '';

            let totalHours = 0;

            if (otRecords.length === 0) {
                grid.innerHTML = `<tr><td colspan="4" class="text-center text-gray-400 text-sm font-bold italic py-10">No overtime logged for the ${currentYear} session.</td></tr>`;
                totalDisplay.innerHTML = `0.0 <span class="text-sm text-gray-500">hrs</span>`;
                return;
            }

            otRecords.forEach(record => {
                totalHours += parseFloat(record.hours || 0);

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition";
                
                let formattedDate = record.work_date;
                if (record.work_date) {
                    const dateParts = record.work_date.split('-');
                    const dateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]); 
                    formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                }

                tr.innerHTML = `
                    <td class="p-4 font-bold text-gray-700 whitespace-nowrap">${formattedDate}</td>
                    <td class="p-4 font-black text-[#002e5d] text-base">${parseFloat(record.hours).toFixed(2)}</td>
                    <td class="p-4 text-gray-600">${record.description || '<span class="italic text-gray-400">No description</span>'}</td>
                    <td class="p-4 text-right">
                        <button onclick="deleteOvertime('${record.id}')" class="text-gray-300 hover:text-red-500 p-1.5 rounded transition-colors" title="Delete record">
                            <svg class="w-5 h-5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </td>
                `;
                grid.appendChild(tr);
            });

            totalDisplay.innerHTML = `${totalHours.toFixed(2)} <span class="text-sm text-gray-500">hrs</span>`;
        }

        async function addOvertime() {
            const dateInput = document.getElementById('otDate').value;
            const hoursInput = document.getElementById('otHours').value;
            const descInput = document.getElementById('otDesc').value.trim();
            
            if (!dateInput || !hoursInput || hoursInput <= 0) {
                alert("Please enter a valid date and hours.");
                return;
            }
            
            const now = new Date();
            const recordId = Date.now().toString();

            const newRecord = {
                id: recordId,
                work_date: dateInput,
                hours: parseFloat(hoursInput),
                description: descInput,
                created_at: now.toISOString()
            };

            const recordSession = getSessionYear(dateInput);
            if (recordSession === currentYear) {
                otRecords.unshift(newRecord);
                otRecords.sort((a, b) => new Date(b.work_date) - new Date(a.work_date));
                renderOvertime();
            } else {
                setYear(recordSession);
                document.getElementById('yearSelect').value = recordSession;
            }

            document.getElementById('otHours').value = '';
            document.getElementById('otDesc').value = '';
            document.getElementById('otDate').focus();

            await fetch(`${workerBaseUrl}/overtime`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({ 
                    action: 'add', 
                    id: recordId, 
                    work_date: newRecord.work_date, 
                    hours: newRecord.hours, 
                    description: newRecord.description, 
                    created_at: newRecord.created_at
                })
            });
        }

        async function deleteOvertime(id) {
            if (!confirm("Are you sure you want to delete this log?")) return;

            otRecords = otRecords.filter(r => r.id !== id);
            renderOvertime();

            await fetch(`${workerBaseUrl}/overtime`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({ action: 'delete', id: id })
            });
        }

        window.onload = async () => {
            loadSidebar();
            populateYears();
            fetchOvertime();
        };
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>
</body>
</html>
