<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegiTile | Phrase Report</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .leg-navy { background-color: #002e5d; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

    <div id="sidebar-container" class="flex-shrink-0 w-full md:w-28 md:h-full z-50"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Phrase Report Generator</h1>
                <p class="text-xs text-gray-500 font-bold mt-1">Search multiple phrases (comma separated) and track bill language.</p>
            </div>
            <button id="exportBtn" onclick="exportToCSV()" class="hidden bg-green-600 hover:bg-green-700 text-white text-[10px] font-black uppercase px-4 py-2 rounded shadow-sm transition">
                Download CSV
            </button>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
            <div class="bg-white p-6 rounded-xl shadow-sm mb-6 border border-gray-100 max-w-7xl mx-auto">
                
                <div class="flex flex-col md:flex-row gap-3 w-full mb-3">
                    <select id="reportBiennium" class="bg-gray-50 border-2 border-gray-200 text-gray-800 font-black uppercase text-[10px] rounded-lg px-4 py-3 outline-none focus:border-[#002e5d] transition cursor-pointer md:w-40">
                        <option value="2025-26" selected>2025-26 Session</option>
                    </select>
                    
                    <input type="text" id="reportInput" placeholder="Enter phrases separated by commas (e.g. housing, tax, emergency)" class="flex-1 border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700" onkeypress="if(event.key === 'Enter') generateReport()">
                    
                    <button onclick="saveCurrentQuery()" class="bg-blue-50 text-blue-600 hover:bg-blue-100 border border-blue-200 text-[12px] font-black uppercase px-4 py-3 rounded-lg shadow-sm transition" title="Save this search">💾 Save</button>
                    
                    <button onclick="generateReport()" id="generateBtn" class="bg-[#002e5d] hover:bg-[#001f3f] text-white text-[12px] font-black uppercase px-8 py-3 rounded-lg shadow-sm transition">Generate</button>
                </div>

                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-black uppercase text-gray-400">Saved Searches:</span>
                    <select id="savedQueriesDropdown" onchange="loadSavedQuery()" class="bg-gray-50 border border-gray-200 text-gray-600 text-xs rounded px-3 py-1 outline-none cursor-pointer">
                        <option value="">-- Loading... --</option>
                    </select>
                    <button onclick="clearSavedQueries()" class="text-[9px] font-bold text-red-400 hover:text-red-600 uppercase transition">Clear All</button>
                </div>
            </div>

            <div class="max-w-7xl mx-auto">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    
                    <div id="reportStats" class="px-6 py-4 text-sm font-bold text-gray-700 bg-gray-50 border-b border-gray-200 hidden"></div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse" id="reportTable">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-[10px] uppercase tracking-wider font-black border-b border-gray-200">
                                    <th class="p-4">Bill</th>
                                    <th class="p-4">Title</th>
                                    <th class="p-4">Sponsor</th>
                                    <th class="p-4">Version</th>
                                    <th class="p-4">Location</th>
                                    <th class="p-4 w-1/3">Context Snippet</th>
                                    <th class="p-4">Current Status</th>
                                </tr>
                            </thead>
                            <tbody id="reportGrid" class="text-sm divide-y divide-gray-100">
                                <tr>
                                    <td colspan="7" class="p-8 text-center text-gray-400 font-bold italic">Enter phrases above to generate the report.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

<script>
    if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';

    const searchApiUrl = "https://legitile-scraper.ewing-jacob.workers.dev";
    let currentReportData = [];

    async function loadSidebar() {
        try {
            const response = await fetch('sidebar.html');
            if (response.ok) {
                document.getElementById('sidebar-container').innerHTML = await response.text();
                const path = window.location.pathname;
                document.querySelectorAll('.nav-item').forEach(item => {
                    if (path.includes(item.getAttribute('href'))) {
                        item.classList.add('bg-white/10', 'text-white');
                        item.classList.remove('text-blue-200');
                    }
                });
            }
        } catch (error) { console.error("Sidebar failed to load."); }
    }

    async function updateSavedQueriesDropdown() {
        const dropdown = document.getElementById('savedQueriesDropdown');
        dropdown.innerHTML = '<option value="">-- Loading... --</option>';
        try {
            const res = await fetch(`${searchApiUrl}/saved-queries`);
            const saved = await res.json();
            dropdown.innerHTML = '<option value="">-- Select a saved search --</option>';
            if (Array.isArray(saved)) {
                saved.forEach(q => {
                    const opt = document.createElement('option');
                    opt.value = q;
                    opt.innerText = q.length > 50 ? q.substring(0, 50) + '...' : q;
                    dropdown.appendChild(opt);
                });
            }
        } catch (error) {
            dropdown.innerHTML = '<option value="">-- Error loading --</option>';
        }
    }

    async function saveCurrentQuery() {
        const query = document.getElementById('reportInput').value.trim();
        if (!query) return;
        const saveBtn = document.querySelector('button[title="Save this search"]');
        const originalText = saveBtn.innerText;
        saveBtn.innerText = "Saving...";
        try {
            await fetch(`${searchApiUrl}/saved-queries`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "save", query: query })
            });
            await updateSavedQueriesDropdown();
        } catch (error) { console.error("Failed to save query:", error); }
        saveBtn.innerText = originalText;
    }

    function loadSavedQuery() {
        const dropdown = document.getElementById('savedQueriesDropdown');
        if (dropdown.value) document.getElementById('reportInput').value = dropdown.value;
    }

    async function clearSavedQueries() {
        if (!confirm("Are you sure you want to delete all saved searches?")) return;
        try {
            await fetch(`${searchApiUrl}/saved-queries`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "clear" })
            });
            await updateSavedQueriesDropdown();
        } catch (error) { console.error("Failed to clear queries:", error); }
    }

    window.onload = () => {
        loadSidebar();
        updateSavedQueriesDropdown();
    };

    function getBillVersion(url) {
        if (!url) return "Original";
        const fileName = url.split('/').pop().toUpperCase();
        
        if (fileName.includes("-S.E")) return "Engrossed Substitute";
        if (fileName.includes("-S2.E")) return "Engrossed 2nd Substitute";
        if (fileName.includes("-S3.E")) return "Engrossed 3rd Substitute";
        if (fileName.includes("-S2")) return "2nd Substitute";
        if (fileName.includes("-S3")) return "3rd Substitute";
        if (fileName.includes("-S")) return "Substitute";
        if (fileName.includes(".E")) return "Engrossed";
        if (fileName.includes(".PL")) return "Passed Legislature";
        if (fileName.includes(".SL")) return "Session Law";
        
        return "Original";
    }

    function extractLocation(fullText, phrase) {
        const lowerText = fullText.toLowerCase();
        const lowerPhrase = phrase.toLowerCase();
        const index = lowerText.indexOf(lowerPhrase);
        if (index === -1) return { section: "Not Found", snippet: "" };

        const textBefore = fullText.substring(0, index);
        const sectionRegex = /(?:NEW SECTION\.\s*)?(?:Sec\.|Section)\s*\d+/gi;
        const matches = [...textBefore.matchAll(sectionRegex)];
        const section = matches.length > 0 ? matches[matches.length - 1][0] : "Intro/Preamble";
        
        const start = Math.max(0, index - 40);
        const end = Math.min(fullText.length, index + phrase.length + 40);
        const snippet = "..." + fullText.substring(start, end).replace(/\n/g, ' ').trim() + "...";

        const regex = new RegExp(`(${phrase})`, "gi");
        const highlightedSnippet = snippet.replace(regex, '<mark class="bg-yellow-200 font-bold px-1 rounded">$1</mark>');

        return { section, snippet: highlightedSnippet, rawSnippet: snippet };
    }

    async function fetchBillDetails(billNumber, biennium) {
        try {
            const res = await fetch(`${searchApiUrl}/get-bill-status?billNumber=${encodeURIComponent(billNumber)}&biennium=${encodeURIComponent(biennium)}`);
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            return { 
                sponsor: data.sponsor || "Unknown", 
                status: data.status || "Unknown",
                title: data.short_desc || data.title || ""
            };
        } catch (e) {
            return { sponsor: "Error", status: "Error", title: "Error fetching title" };
        }
    }

    async function generateReport() {
        const rawQuery = document.getElementById('reportInput').value.trim();
        const biennium = document.getElementById('reportBiennium').value;
        const reportGrid = document.getElementById('reportGrid');
        const generateBtn = document.getElementById('generateBtn');
        const exportBtn = document.getElementById('exportBtn');
        const statsDiv = document.getElementById('reportStats');

        if (!rawQuery) return;

        const phrases = rawQuery.split(',').map(p => p.trim()).filter(p => p.length > 0);

        generateBtn.innerText = "Processing...";
        generateBtn.disabled = true;
        exportBtn.classList.add('hidden');
        statsDiv.classList.add('hidden');
        reportGrid.innerHTML = '<tr><td colspan="7" class="p-8 text-center text-blue-500 font-bold animate-pulse">Scanning database and retrieving live status...</td></tr>';
        
        currentReportData = [];
        let foundAnyMatches = false;
        let totalBillsSearched = "all";

        try {
            try {
                const statsRes = await fetch(`${searchApiUrl}/db-stats?biennium=${encodeURIComponent(biennium)}`);
                if (statsRes.ok) {
                    const statsData = await statsRes.json();
                    if (statsData.total_bills) totalBillsSearched = statsData.total_bills.toLocaleString();
                }
            } catch (e) { console.warn("Stats API not reachable."); }

            for (const phrase of phrases) {
                const res = await fetch(`${searchApiUrl}/generate-report?q=${encodeURIComponent(phrase)}&biennium=${encodeURIComponent(biennium)}`);
                const data = await res.json();

                if (data.error) throw new Error(data.error);
                
                if (data.length > 0) {
                    foundAnyMatches = true;
                    for (const item of data) {
                        const { section, snippet, rawSnippet } = extractLocation(item.full_text, phrase);
                        const { sponsor, status, title } = await fetchBillDetails(item.bill_number, biennium);
                        const version = getBillVersion(item.url);

                        currentReportData.push({
                            bill_number: item.bill_number,
                            url: item.url, // Added to pass to HTML and CSV
                            title: title,
                            version: version,
                            phrase: phrase,
                            section: section,
                            snippet: rawSnippet,          
                            highlightedSnippet: snippet,  
                            sponsor: sponsor,
                            status: status
                        });
                    }
                }
            }

            if (!foundAnyMatches) {
                reportGrid.innerHTML = '<tr><td colspan="7" class="p-8 text-center text-gray-500 font-bold">No bills contain the requested phrases.</td></tr>';
            } else {
                currentReportData.sort((a, b) => {
                    const numA = parseInt(a.bill_number.replace(/\D/g, ''), 10) || 0;
                    const numB = parseInt(b.bill_number.replace(/\D/g, ''), 10) || 0;
                    return numA - numB;
                });

                const uniqueBills = new Set(currentReportData.map(item => item.bill_number)).size;
                
                statsDiv.innerHTML = `Searched <strong>${totalBillsSearched}</strong> total bills. Found <span class="text-[#002e5d] font-black">${currentReportData.length}</span> matches across <span class="text-[#002e5d] font-black">${uniqueBills}</span> unique bills.`;
                statsDiv.classList.remove('hidden');

                // Generated HTML now wraps the bill_number in an anchor tag linked to item.url
                reportGrid.innerHTML = currentReportData.map(item => `
                    <tr class="hover:bg-gray-50 transition border-b border-gray-100 last:border-0">
                        <td class="p-4 font-black text-[#002e5d] whitespace-nowrap"><a href="${item.url}" target="_blank" class="hover:underline hover:text-blue-700 cursor-pointer" title="View Bill Document">${item.bill_number}</a></td>
                        <td class="p-4 text-xs font-bold text-gray-700 min-w-[150px]"><span class="line-clamp-2" title="${item.title}">${item.title}</span></td>
                        <td class="p-4 text-xs font-medium text-gray-800">${item.sponsor}</td>
                        <td class="p-4 text-[10px] font-black uppercase text-gray-500 tracking-wider">${item.version}</td>
                        <td class="p-4 text-xs font-bold text-gray-600 bg-gray-50 border-r border-gray-200">${item.section}</td>
                        <td class="p-4 text-xs text-gray-600 italic leading-relaxed">${item.highlightedSnippet}</td>
                        <td class="p-4"><span class="bg-blue-50 text-blue-700 text-[10px] font-bold px-2 py-1 rounded border border-blue-100">${item.status}</span></td>
                    </tr>
                `).join('');
                
                exportBtn.classList.remove('hidden');
            }

        } catch (e) {
            reportGrid.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-red-500 font-bold">Error: ${e.message}</td></tr>`;
        }

        generateBtn.innerText = "Generate";
        generateBtn.disabled = false;
    }

    function exportToCSV() {
        if (currentReportData.length === 0) return;
        
        const headers = ["Bill Number", "Title", "Sponsor", "Version", "Location", "Context Snippet", "Current Status"];
        
        // Export replaces plain text with the HYPERLINK formula
        const rows = currentReportData.map(row => [
            `"=HYPERLINK(""${row.url}"", ""${row.bill_number}"")"`,
            `"${row.title.replace(/"/g, '""')}"`,
            `"${row.sponsor}"`,
            `"${row.version}"`,
            `"${row.section}"`,
            `"${row.snippet.replace(/"/g, '""')}"`,
            `"${row.status}"`
        ]);
        
        const csvContent = "data:text/csv;charset=utf-8," 
            + headers.join(",") + "\n" 
            + rows.map(e => e.join(",")).join("\n");
            
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "legitile_phrase_report.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
