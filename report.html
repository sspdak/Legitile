<html lang="en">
<head>

        ::-webkit-scrollbar { width: 6px; height: 6px; }

<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

    <div id="sidebar-container" class="flex-shrink-0 w-full md:w-28 md:h-full z-50"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Phrase Report Generator</h1>
            </div>
            <button id="exportBtn" onclick="exportToCSV()" class="hidden bg-green-600 hover:bg-green-700 text-white text-[10px] font-black uppercase px-4 py-2 rounded shadow-sm transition">
                Download CSV
            </button>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
            <div class="bg-white p-6 rounded-xl shadow-sm mb-6 border border-gray-100 max-w-7xl mx-auto">
                
                <div class="flex flex-col md:flex-row gap-3 w-full mb-3">
                    
                    <div class="flex items-center gap-2 md:w-56">
                        <select id="reportBiennium" class="bg-gray-50 border-2 border-gray-200 text-gray-800 font-black uppercase text-[10px] rounded-lg px-4 py-3 outline-none focus:border-[#002e5d] transition cursor-pointer flex-1">
                            <option value="2025-26">Loading...</option>
                        </select>
                        <button onclick="addNewSession()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-black text-lg h-full px-4 rounded-lg transition shadow-sm" title="Add a historical session">+</button>
                    </div>
                    
                    <input type="text" id="reportInput" placeholder="Enter phrases separated by commas (e.g. housing, tax, emergency)" class="flex-1 border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700" onkeypress="if(event.key === 'Enter') generateReport()">
                    
                    <button onclick="saveCurrentQuery()" class="bg-blue-50 text-blue-600 hover:bg-blue-100 border border-blue-200 text-[12px] font-black uppercase px-4 py-3 rounded-lg shadow-sm transition" title="Save this search">💾 Save</button>
                    
                    <button onclick="generateReport()" id="generateBtn" class="bg-[#002e5d] hover:bg-[#001f3f] text-white text-[12px] font-black uppercase px-8 py-3 rounded-lg shadow-sm transition">Generate</button>
                </div>

                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-black uppercase text-gray-400">Saved Searches:</span>
                    <select id="savedQueriesDropdown" onchange="loadSavedQuery()" class="bg-gray-50 border border-gray-200 text-gray-600 text-xs rounded px-3 py-1 outline-none cursor-pointer">
                        <option value="">-- Loading... --</option>
                    </select>
                    <button onclick="clearSavedQueries()" class="text-[9px] font-bold text-red-400 hover:text-red-600 uppercase transition">Clear All</button>
                </div>
            </div>

            <div class="max-w-7xl mx-auto">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    
                    <div id="reportStats" class="px-6 py-4 text-sm font-bold text-gray-700 bg-gray-50 border-b border-gray-200 hidden"></div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse" id="reportTable">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-[10px] uppercase tracking-wider font-black border-b border-gray-200">
                                    <th class="p-4">Bill</th>
                                    <th class="p-4">Title & Info</th>
                                    <th class="p-4">Match Status</th>
                                    <th class="p-4">Stage(s) with Phrase</th>
                                    <th class="p-4">Location</th>
                                    <th class="p-4 w-1/3">Context Snippet</th>
                                </tr>
                            </thead>
                            <tbody id="reportGrid" class="text-sm divide-y divide-gray-100">
                                <tr>
                                    <td colspan="6" class="p-8 text-center text-gray-400 font-bold italic">Enter phrases above to generate the report.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

<script>
    if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';

    const searchApiUrl = "https://legitile-scraper.ewing-jacob.workers.dev";
    let currentReportData = [];

    async function loadSidebar() {
        try {
            const response = await fetch('sidebar.html');
            if (response.ok) {
                document.getElementById('sidebar-container').innerHTML = await response.text();
                const path = window.location.pathname;
                document.querySelectorAll('.nav-item').forEach(item => {
                    if (path.includes(item.getAttribute('href'))) {
                        item.classList.add('bg-white/10', 'text-white');
                        item.classList.remove('text-blue-200');
                    }
                });
            }
        } catch (error) { console.error("Sidebar failed to load."); }
    }

    async function updateSavedQueriesDropdown() {
        const dropdown = document.getElementById('savedQueriesDropdown');
        dropdown.innerHTML = '<option value="">-- Loading... --</option>';
        try {
            const res = await fetch(`${searchApiUrl}/saved-queries`);
            const saved = await res.json();
            dropdown.innerHTML = '<option value="">-- Select a saved search --</option>';
            if (Array.isArray(saved)) {
                saved.forEach(q => {
                    const opt = document.createElement('option');
                    opt.value = q;
                    opt.innerText = q.length > 50 ? q.substring(0, 50) + '...' : q;
                    dropdown.appendChild(opt);
                });
            }
        } catch (error) {
            dropdown.innerHTML = '<option value="">-- Error loading --</option>';
        }
    }

    async function loadBienniums() {
        const dropdown = document.getElementById('reportBiennium');
        try {
            const res = await fetch(`${searchApiUrl}/get-bienniums`);
            const sessions = await res.json();
            if (Array.isArray(sessions) && sessions.length > 0) {
                dropdown.innerHTML = sessions.map(s => `<option value="${s}">${s} Session</option>`).join('');
            }
        } catch (e) { console.error("Failed to load sessions:", e); }
    }

    async function addNewSession() {
        const newSession = prompt("Enter the biennium to track (e.g., 2019-20, 2021-22):");
        if (!newSession) return;
        
        if (!/^\d{4}-\d{2}$/.test(newSession.trim())) {
            alert("Invalid format. Please use YYYY-YY (e.g., 2019-20).");
            return;
        }

        const sessionClean = newSession.trim();
        const btn = document.querySelector('button[title="Add a historical session"]');
        const originalText = btn.innerText;
        btn.innerText = "⏳";
        btn.disabled = true;

        try {
            const res = await fetch(`${searchApiUrl}/build-database`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ biennium: sessionClean })
            });
            const data = await res.json();
            
            if (data.success) {
                alert(`Successfully queued ${data.total_files_queued} files for the ${sessionClean} session.`);
                await loadBienniums(); 
                document.getElementById('reportBiennium').value = sessionClean; 
            } else { alert(`Error: ${data.error}`); }
        } catch (e) { alert(`Network error: ${e.message}`); }
        
        btn.innerText = originalText;
        btn.disabled = false;
    }

    async function saveCurrentQuery() {
        const query = document.getElementById('reportInput').value.trim();
        if (!query) return;
        const saveBtn = document.querySelector('button[title="Save this search"]');
        const originalText = saveBtn.innerText;
        saveBtn.innerText = "Saving...";
        try {
            await fetch(`${searchApiUrl}/saved-queries`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "save", query: query })
            });
            await updateSavedQueriesDropdown();
        } catch (error) { console.error("Failed to save query:", error); }
        saveBtn.innerText = originalText;
    }

    function loadSavedQuery() {
        const dropdown = document.getElementById('savedQueriesDropdown');
        if (dropdown.value) document.getElementById('reportInput').value = dropdown.value;
    }

    async function clearSavedQueries() {
        if (!confirm("Are you sure you want to delete all saved searches?")) return;
        try {
            await fetch(`${searchApiUrl}/saved-queries`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "clear" })
            });
            await updateSavedQueriesDropdown();
        } catch (error) { console.error("Failed to clear queries:", error); }
    }

    window.onload = () => {
        loadSidebar();
        updateSavedQueriesDropdown();
        loadBienniums();
    };

    // --- VERSION RANKING AND TRANSLATION LOGIC ---
    function getBillStage(url) {
        if (!url) return "Unknown";
        const fileName = url.split('/').pop().toUpperCase();
        
        if (fileName.includes(".PL") || fileName.includes(".SL")) return "Passed Legislature";
        if (fileName.includes(".E")) {
            if (fileName.includes("-S")) return "Engrossed Substitute";
            return "Engrossed";
        }
        if (fileName.includes("-S")) {
            if (fileName.includes("2")) return "2nd Substitute";
            if (fileName.includes("3")) return "3rd Substitute";
            return "Substitute";
        }
        return "Introduced";
    }

    function getStageRank(url) {
        const stage = getBillStage(url);
        if (stage === "Passed Legislature") return 4;
        if (stage.includes("Engrossed")) return 3;
        if (stage.includes("Substitute")) return 2;
        return 1;
    }

    function extractLocation(fullText, phrase) {
        const lowerText = fullText.toLowerCase();
        const lowerPhrase = phrase.toLowerCase();
        const index = lowerText.indexOf(lowerPhrase);
        if (index === -1) return { section: "Not Found", snippet: "" };

        const textBefore = fullText.substring(0, index);
        const sectionRegex = /(?:NEW SECTION\.\s*)?(?:Sec\.|Section)\s*\d+/gi;
        const matches = [...textBefore.matchAll(sectionRegex)];
        const section = matches.length > 0 ? matches[matches.length - 1][0] : "Intro/Preamble";
        
        const start = Math.max(0, index - 40);
        const end = Math.min(fullText.length, index + phrase.length + 40);
        const snippet = "..." + fullText.substring(start, end).replace(/\n/g, ' ').trim() + "...";

        const regex = new RegExp(`(${phrase})`, "gi");
        const highlightedSnippet = snippet.replace(regex, '<mark class="bg-yellow-200 font-bold px-1 rounded">$1</mark>');

        return { section, snippet: highlightedSnippet, rawSnippet: snippet };
    }

    async function fetchBillDetails(billNumber, biennium) {
        try {
            const res = await fetch(`${searchApiUrl}/get-bill-status?billNumber=${encodeURIComponent(billNumber)}&biennium=${encodeURIComponent(biennium)}`);
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            return { 
                sponsor: data.sponsor || "Unknown", 
                status: data.status || "Unknown",
                title: data.short_desc || data.title || "",
                introDate: data.intro_date || "Unknown",
                lastUpdated: data.last_updated || "Unknown"
            };
        } catch (e) {
            return { sponsor: "Error", status: "Error", title: "Error fetching", introDate: "Error", lastUpdated: "Error" };
        }
    }

    async function generateReport() {
        const rawQuery = document.getElementById('reportInput').value.trim();
        const biennium = document.getElementById('reportBiennium').value;
        const reportGrid = document.getElementById('reportGrid');
        const generateBtn = document.getElementById('generateBtn');
        const exportBtn = document.getElementById('exportBtn');
        const statsDiv = document.getElementById('reportStats');

        if (!rawQuery) return;

        const phrases = rawQuery.split(',').map(p => p.trim()).filter(p => p.length > 0);

        generateBtn.innerText = "Processing...";
        generateBtn.disabled = true;
        exportBtn.classList.add('hidden');
        statsDiv.classList.add('hidden');
        reportGrid.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-blue-500 font-bold animate-pulse">Scanning database and rolling up history...</td></tr>';
        
        currentReportData = [];
        let groupedBills = {};
        let allDatabaseUrls = {};
        let totalBillsSearched = "all";

        try {
            // 1. Fetch the master list of all URLs so we can calculate "Ghost Phrases"
            try {
                const urlRes = await fetch(`${searchApiUrl}/all-urls?biennium=${encodeURIComponent(biennium)}`);
                if (urlRes.ok) allDatabaseUrls = await urlRes.json();
                totalBillsSearched = Object.keys(allDatabaseUrls).length.toLocaleString();
            } catch (e) { console.warn("Could not fetch global URL directory."); }

            // 2. Fetch the matches
            for (const phrase of phrases) {
                const res = await fetch(`${searchApiUrl}/generate-report?q=${encodeURIComponent(phrase)}&biennium=${encodeURIComponent(biennium)}`);
                const data = await res.json();

                if (data.error) throw new Error(data.error);
                
                // 3. Roll up the data locally
                if (data.length > 0) {
                    for (const item of data) {
                        if (!groupedBills[item.bill_number]) {
                            groupedBills[item.bill_number] = {
                                bill_number: item.bill_number,
                                phrase: phrase,
                                stagesFound: new Set(),
                                highestRankFound: 0,
                                latestSnippet: null,
                                latestRawSnippet: null,
                                latestLocation: null
                            };
                        }

                        const stage = getBillStage(item.url);
                        const rank = getStageRank(item.url);

                        groupedBills[item.bill_number].stagesFound.add(stage);

                        // If this is the newest version containing the phrase, save the snippet
                        if (rank >= groupedBills[item.bill_number].highestRankFound) {
                            groupedBills[item.bill_number].highestRankFound = rank;
                            const locInfo = extractLocation(item.full_text, phrase);
                            groupedBills[item.bill_number].latestSnippet = locInfo.snippet;
                            groupedBills[item.bill_number].latestRawSnippet = locInfo.rawSnippet;
                            groupedBills[item.bill_number].latestLocation = locInfo.section;
                        }
                    }
                }
            }

            const uniqueBillNumbers = Object.keys(groupedBills);

            if (uniqueBillNumbers.length === 0) {
                reportGrid.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-gray-500 font-bold">No bills contain the requested phrases.</td></tr>';
            } else {
                
                // 4. Fetch official API data and calculate Match Status for each rolled-up bill
                for (const billNum of uniqueBillNumbers) {
                    const rollup = groupedBills[billNum];
                    const details = await fetchBillDetails(billNum, biennium);
                    
                    // Determine Active vs Historical
                    let maxOverallRank = 0;
                    if (allDatabaseUrls[billNum]) {
                        allDatabaseUrls[billNum].forEach(url => {
                            const rank = getStageRank(url);
                            if (rank > maxOverallRank) maxOverallRank = rank;
                        });
                    }
                    
                    const isHistoricalOnly = maxOverallRank > rollup.highestRankFound;
                    const matchStatusText = isHistoricalOnly ? "Historical Only" : "Active";
                    const matchStatusBadge = isHistoricalOnly 
                        ? `<span class="bg-orange-50 text-orange-700 text-[10px] font-black uppercase px-2 py-1 rounded border border-orange-200 whitespace-nowrap">🟠 Historical Only</span>`
                        : `<span class="bg-green-50 text-green-700 text-[10px] font-black uppercase px-2 py-1 rounded border border-green-200 whitespace-nowrap">🟢 Active Match</span>`;

                    const stageString = Array.from(rollup.stagesFound).join(', ');
                    
                    const year = biennium.split('-')[0];
                    const cleanBillNum = billNum.replace(/\D/g, '');
                    const summaryUrl = `https://app.leg.wa.gov/billsummary/?BillNumber=${cleanBillNum}&Year=${year}&Initiative=false`;

                    currentReportData.push({
                        bill_number: billNum,
                        summaryUrl: summaryUrl,
                        title: details.title,
                        matchStatusText: matchStatusText,
                        matchStatusBadge: matchStatusBadge,
                        stagesFound: stageString,
                        section: rollup.latestLocation,
                        snippet: rollup.latestRawSnippet,          
                        highlightedSnippet: rollup.latestSnippet,  
                        sponsor: details.sponsor,
                        status: details.status,
                        lastUpdated: details.lastUpdated
                    });
                }

                currentReportData.sort((a, b) => {
                    const numA = parseInt(a.bill_number.replace(/\D/g, ''), 10) || 0;
                    const numB = parseInt(b.bill_number.replace(/\D/g, ''), 10) || 0;
                    return numA - numB;
                });

                statsDiv.innerHTML = `Searched <strong>${totalBillsSearched}</strong> total bills. Found <span class="text-[#002e5d] font-black">${currentReportData.length}</span> matching bills (with all versions rolled up).`;
                statsDiv.classList.remove('hidden');

                reportGrid.innerHTML = currentReportData.map(item => `
                    <tr class="hover:bg-gray-50 transition border-b border-gray-100 last:border-0">
                        <td class="p-4 font-black text-[#002e5d] whitespace-nowrap align-top pt-5"><a href="${item.summaryUrl}" target="_blank" class="hover:underline hover:text-blue-700 cursor-pointer text-base" title="View Bill Summary">${item.bill_number}</a></td>
                        <td class="p-4 align-top">
                            <div class="text-xs font-bold text-gray-800 line-clamp-2 mb-2" title="${item.title}">${item.title}</div>
                            <div class="flex flex-wrap gap-2 text-[10px] font-bold text-gray-500">
                                <span class="bg-gray-100 px-2 py-0.5 rounded text-gray-700 border border-gray-200">${item.status}</span>
                                <span>Sponsor: ${item.sponsor}</span>
                                <span>Updated: ${item.lastUpdated}</span>
                            </div>
                        </td>
                        <td class="p-4 align-top pt-5">${item.matchStatusBadge}</td>
                        <td class="p-4 align-top pt-5"><span class="text-[10px] font-black uppercase text-gray-600 tracking-wider">${item.stagesFound}</span></td>
                        <td class="p-4 text-xs font-bold text-gray-600 bg-gray-50 border-r border-gray-200 align-top pt-5">${item.section}</td>
                        <td class="p-4 text-xs text-gray-600 italic leading-relaxed align-top">${item.highlightedSnippet}</td>
                    </tr>
                `).join('');
                
                exportBtn.classList.remove('hidden');
            }

        } catch (e) {
            reportGrid.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500 font-bold">Error: ${e.message}</td></tr>`;
        }

        generateBtn.innerText = "Generate";
        generateBtn.disabled = false;
    }

    function exportToCSV() {
        if (currentReportData.length === 0) return;
        
        const headers = ["Bill Number", "Title", "Match Status", "Stage(s) with Phrase", "Location", "Context Snippet", "Current Status", "Sponsor"];
        
        const rows = currentReportData.map(row => [
            `"=HYPERLINK(""${row.summaryUrl}"", ""${row.bill_number}"")"`,
            `"${row.title.replace(/"/g, '""')}"`,
            `"${row.matchStatusText}"`,
            `"${row.stagesFound}"`,
            `"${row.section}"`,
            `"${row.snippet.replace(/"/g, '""')}"`,
            `"${row.status}"`,
            `"${row.sponsor}"`
        ]);
        
        const csvContent = "data:text/csv;charset=utf-8," 
            + headers.join(",") + "\n" 
            + rows.map(e => e.join(",")).join("\n");
            
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "legitile_historical_phrase_report.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
