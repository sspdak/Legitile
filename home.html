<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

    <aside class="leg-navy text-white w-full md:w-48 flex-shrink-0 flex flex-col shadow-2xl z-50 md:h-full">
        <div class="py-8 flex flex-col items-center border-b border-white/10 shrink-0">
            <div class="text-6xl font-serif italic font-black text-transparent bg-clip-text bg-gradient-to-br from-orange-400 to-white drop-shadow-2xl leading-none">L</div>
            <div class="text-[10px] uppercase tracking-[0.2em] text-blue-200 font-bold mt-2 opacity-80">LegiTile</div>
        </div>
        
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="home.html" class="flex items-center gap-3 px-4 py-3 bg-white/10 text-white rounded-lg transition font-black text-xs uppercase tracking-wider">
                <span>🏠</span> Dashboard
            </a>
            <a href="tracker.html" class="flex items-center gap-3 px-4 py-3 text-blue-200 hover:bg-white/5 hover:text-white rounded-lg transition font-black text-xs uppercase tracking-wider">
                <span>📑</span> Workspace
            </a>
        </nav>

        <div class="shrink-0 pb-6 px-4">
            <div class="bg-black/20 rounded-lg p-3 flex flex-col items-center text-center">
                <span class="text-[8px] uppercase tracking-widest text-gray-400 font-bold mb-1">Staff Member</span>
                <span id="userEmailDisplay" class="text-xs font-bold text-white truncate w-full mb-3"></span>
                <button onclick="logout()" class="w-full bg-red-500/20 hover:bg-red-500/40 text-red-200 text-[10px] font-black uppercase py-2 rounded transition border border-red-500/30">Log Out</button>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200">
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Session Overview</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
                
                <div class="lg:col-span-1 flex flex-col gap-6">
                    
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col flex-1 max-h-[400px]">
                        <span class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-3 block">Today's Key Meetings</span>
                        <div class="space-y-3 overflow-y-auto pr-2" id="meetingList">
                            <span class="text-xs font-bold text-gray-400 italic">Fetching daily schedule...</span>
                        </div>
                    </div>

                    <div class="bg-[#002e5d] rounded-xl shadow-md border border-[#001f3f] p-6 flex flex-col justify-center items-center text-center relative overflow-hidden shrink-0">
                        <div class="absolute -top-10 -right-10 w-32 h-32 bg-white opacity-5 rounded-full blur-2xl"></div>
                        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-orange-400 mb-2 z-10">Countdown to Sine Die</span>
                        <div class="text-5xl font-black text-white leading-none tracking-tighter z-10" id="countdownDays">--</div>
                        <span class="text-xs font-bold text-blue-200 mt-1 z-10">Days Remaining</span>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col justify-center shrink-0">
                        <span class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-4 block">Session Volume</span>
                        <div class="flex justify-around items-center">
                            <div class="text-center">
                                <div class="text-3xl font-black text-gray-800" id="houseCount">--</div>
                                <span class="text-[10px] font-bold uppercase text-gray-500">House Bills</span>
                            </div>
                            <div class="h-10 w-px bg-gray-200"></div>
                            <div class="text-center">
                                <div class="text-3xl font-black text-gray-800" id="senateCount">--</div>
                                <span class="text-[10px] font-bold uppercase text-gray-500">Senate Bills</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2 flex flex-col gap-6">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col flex-1 overflow-hidden h-full">
                        <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Tracked Bills Radar</span>
                            <a href="tracker.html" class="text-[10px] font-black uppercase text-[#002e5d] hover:text-blue-700 bg-blue-50 px-3 py-1.5 rounded transition border border-blue-100">Go to Workspace ➔</a>
                        </div>
                        <div class="p-6 overflow-y-auto flex-1">
                            <div class="flex flex-col gap-3" id="recentUpdatesGrid">
                                <div class="text-sm font-bold text-gray-400 italic">Loading workspace updates...</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

<script>
if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';
    document.getElementById('userEmailDisplay').innerText = localStorage.getItem('user_email') || 'Unknown';

    const workerBaseUrl = "https://misty-credit-9e6a.ewing-jacob.workers.dev";
    const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}` };

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    // Initial Load
    refreshDashboard();

    // Set auto-refresh for every 5 minutes (300,000 milliseconds)
    setInterval(refreshDashboard, 300000);

    function refreshDashboard() {
        console.log("Auto-refreshing legislative data...");
        calculateSineDie();
        fetchLegislativeStats();
        fetchWorkspaceUpdates();
        fetchMeetings();
    }

    function calculateSineDie() {
        const sineDieDate = new Date("2026-03-12T23:59:59");
        const now = new Date();
        const diffTime = sineDieDate - now;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
        const display = document.getElementById('countdownDays');
        if (diffDays < 0) {
            display.innerText = "0";
            display.classList.add("text-red-400");
        } else {
            display.innerText = diffDays;
            if (diffDays <= 5) display.classList.add("text-orange-400");
        }
    }

    async function fetchLegislativeStats() {
        try {
            const res = await fetch(`${workerBaseUrl}/session-stats`, { headers: authHeaders });
            if (!res.ok) throw new Error("API Error");
            const stats = await res.json();
            document.getElementById('houseCount').innerText = stats.house.toLocaleString();
            document.getElementById('senateCount').innerText = stats.senate.toLocaleString();
        } catch (e) {
            document.getElementById('houseCount').innerText = "Err";
            document.getElementById('senateCount').innerText = "Err";
        }
    }

    async function fetchWorkspaceUpdates() {
        try {
            const res = await fetch(`${workerBaseUrl}/my-workspace`, { headers: authHeaders });
            if (res.status === 401) return logout();
            const bills = await res.json();
            
            const grid = document.getElementById('recentUpdatesGrid');
            grid.innerHTML = '';

            if (bills.length === 0) {
                grid.innerHTML = '<div class="text-gray-400 font-bold text-sm italic">Your workspace is empty. Head to the workspace tab to track bills.</div>';
                return;
            }

            bills.forEach(item => {
                const isDead = item.status === 'Dead';
                grid.innerHTML += `
                    <div class="border ${isDead ? 'border-gray-200 bg-gray-50 grayscale' : 'border-blue-100 bg-white hover:border-[#002e5d]'} rounded-lg p-4 shadow-sm hover:shadow-md transition cursor-pointer flex flex-col sm:flex-row sm:items-center gap-4" onclick="window.location.href='tracker.html'">
                        <div class="w-24 shrink-0">
                            <span class="text-lg font-black text-[#002e5d] block leading-tight">${item.bill_number}</span>
                            <span class="text-[9px] font-black uppercase px-2 py-0.5 rounded ${isDead ? 'bg-gray-200 text-gray-600' : 'bg-orange-100 text-orange-800'} inline-block mt-1">${item.status}</span>
                        </div>
                        <div class="text-sm font-bold text-gray-600 line-clamp-2 flex-1">${item.short_desc}</div>
                    </div>
                `;
            });
        } catch (e) {
            document.getElementById('recentUpdatesGrid').innerHTML = '<div class="text-red-500 font-bold text-sm">Failed to load workspace updates.</div>';
        }
    }

    async function fetchMeetings() {
        const list = document.getElementById('meetingList');
        try {
            const res = await fetch(`${workerBaseUrl}/today-meetings`, { headers: authHeaders });
            const xmlText = await res.text();
            const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
            
            const allMeetings = Array.from(xmlDoc.getElementsByTagName("CommitteeMeeting"));
            list.innerHTML = '';

            if (allMeetings.length === 0) {
                list.innerHTML = '<div class="text-xs font-bold text-gray-400 italic">No Floor Sessions or Committee meetings found for today.</div>';
                return;
            }

            const seenIds = new Set();
            const uniqueMeetings = allMeetings.filter(m => {
                const id = m.getElementsByTagName("MtgId")[0]?.textContent || Math.random();
                if (seenIds.has(id)) return false;
                seenIds.add(id);
                return true;
            });

            uniqueMeetings.forEach(m => {
                const getTag = (tag) => {
                    const node = m.getElementsByTagNameNS("*", tag)[0] || m.getElementsByTagName(tag)[0];
                    return node ? node.textContent.trim() : "";
                };
                
                const agency = getTag("Agency") || "LEG";
                const name = getTag("Name") || getTag("LongName") || "Meeting";
                const dateRaw = getTag("Date"); 
                const room = getTag("Room") || "Location TBD";
                
                let timeStr = "Time TBD";
                if (dateRaw) {
                    const d = new Date(dateRaw);
                    timeStr = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }
                
                let color = "bg-gray-400";
                if (agency.toLowerCase().includes("senate")) color = "bg-red-500";
                if (agency.toLowerCase().includes("house")) color = "bg-green-500";
                
                list.innerHTML += `
                    <div class="flex items-center gap-3 py-2 border-b border-gray-50 last:border-0">
                        <div class="w-2 h-2 rounded-full ${color} shrink-0"></div>
                        <div class="flex-1 min-w-0">
                            <div class="text-[11px] font-black text-[#002e5d] truncate uppercase">${agency} ${name}</div>
                            <div class="text-[9px] font-bold text-gray-500 truncate mt-0.5">${timeStr} • ${room}</div>
                        </div>
                    </div>
                `;
            });
        } catch (e) {
            list.innerHTML = '<div class="text-xs font-bold text-red-400">Failed to load schedule.</div>';
        }
    }
</script>

</body>
