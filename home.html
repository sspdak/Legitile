<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

    <div id="sidebar-container" class="flex-shrink-0 w-full md:w-28 md:h-full z-50"></div>  

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Dashboard</h1>
                <p id="greeting" class="text-xs text-gray-500 font-bold mt-1">Welcome back.</p>
            </div>
            <div class="text-[10px] font-black uppercase text-gray-400 tracking-wider" id="currentDateDisplay"></div>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 h-full min-h-max">

                <div class="flex flex-col gap-6">

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden flex-1 min-h-[300px]">
                        <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Tracked Bills</span>
                            <a href="tracker.html" class="text-[9px] font-black uppercase text-[#002e5d] hover:text-blue-700 bg-blue-50 px-2 py-1 rounded transition border border-blue-100">Workspace ➔</a>
                        </div>
                        <div class="p-4 overflow-y-auto flex-1">
                            <div class="flex flex-col gap-3" id="recentUpdatesGrid">
                                <div class="text-sm font-bold text-gray-400 italic">Loading radar items...</div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden shrink-0 min-h-[220px]">
                        <div class="p-3 border-b border-gray-100 flex justify-between items-start bg-gray-50 shrink-0">
                            <div>
                                <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Overtime Log</span>
                                <a href="overtime.html" class="block text-[9px] font-bold uppercase text-blue-500 hover:text-blue-700 mt-0.5 transition">Full History &rarr;</a>
                            </div>
                            <div class="text-right">
                                <div class="text-xl font-black text-green-600 leading-none" id="dashOtTotal">-</div>
                                <div class="text-[8px] font-black uppercase tracking-widest text-gray-400 mt-1">Total Hrs</div>
                            </div>
                        </div>
                        <div class="p-2 border-b border-gray-100 shrink-0 bg-white">
                            <div class="flex gap-2">
                                <input type="date" id="dashOtDate" class="w-1/3 bg-gray-50 border border-gray-200 p-1.5 rounded text-[10px] font-bold text-gray-700 outline-none focus:border-[#002e5d] cursor-pointer">
                                <input type="number" step="0.25" min="0" id="dashOtHours" placeholder="Hrs" class="w-1/4 bg-gray-50 border border-gray-200 p-1.5 rounded text-[10px] font-bold text-gray-700 outline-none focus:border-[#002e5d]">
                                <input type="text" id="dashOtDesc" placeholder="Desc..." class="flex-1 bg-gray-50 border border-gray-200 p-1.5 rounded text-[10px] font-bold text-gray-700 outline-none focus:border-[#002e5d]" onkeypress="if(event.key === 'Enter') quickLogOvertime()">
                                <button onclick="quickLogOvertime()" class="bg-[#002e5d] hover:bg-[#001f3f] text-white text-[10px] font-black uppercase px-3 py-1.5 rounded transition">Log</button>
                            </div>
                        </div>
                        <div class="p-0 overflow-y-auto h-[100px]">
                            <table class="w-full text-left border-collapse">
                                <tbody id="dashOtRecent" class="text-sm divide-y divide-gray-50">
                                    <tr><td class="p-5 text-center text-gray-400 text-xs font-bold italic">Loading recent logs...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="bg-[#002e5d] rounded-xl shadow-md border border-[#001f3f] p-6 flex flex-col justify-center items-center text-center relative overflow-hidden shrink-0 group">

                        <button onclick="openCountdownSettings()" class="absolute top-3 right-3 text-white/50 hover:text-white opacity-0 group-hover:opacity-100 transition-opacity duration-200 focus:outline-none z-20" title="Countdown Settings">

                        </button>

                        <span id="countdownTitle" class="text-[10px] font-black uppercase tracking-[0.2em] text-orange-400 mb-2 z-10">Countdown to Sine Die</span>
                        <div class="text-5xl font-black text-white leading-none tracking-tighter z-10" id="countdownDays">--</div>
                        <span class="text-xs font-bold text-blue-200 mt-1 z-10">Days Remaining</span>
                    </div>

                </div>

                <div class="flex flex-col gap-6">
                    
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden flex-1 min-h-[300px]">
                        <div class="p-3 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Unscheduled Tasks</span>
                            <a href="todo.html" class="text-[9px] font-bold uppercase text-blue-500 hover:text-blue-700 transition">Manage All &rarr;</a>
                        </div>
                        <div class="p-3 overflow-y-auto flex-1 bg-gray-50/50" id="dashTodos">
                            <div class="text-center text-gray-400 text-xs font-bold italic py-8 animate-pulse">Loading tasks...</div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden flex-1 min-h-[300px]">
                        <div class="p-3 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Today's Schedule</span>
                            <span class="text-[9px] font-bold text-gray-400" id="scheduleDateLabel"></span>
                        </div>
                        <div class="flex-1 overflow-y-auto p-3 space-y-2 bg-gray-50/50" id="dashTimelineContainer">

    <div id="countdownForm" style="display: none;" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full border-t-8 border-[#002e5d]">
            <h2 class="text-2xl font-bold mb-4 text-[#002e5d] uppercase">Countdown Settings</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-1">Display Mode</label>
                    <select id="cdMode" class="w-full border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700">
                        <option value="sinedie">Countdown to Sine Die</option>
                        <option value="start">Countdown to Session Start</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-1">Target Date</label>
                    <input type="date" id="cdDate" class="w-full border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700">
                </div>

                <div class="flex gap-2 pt-4">
                    <button onclick="saveCountdownSettings(this)" class="bg-[#002e5d] text-white font-bold px-6 py-3 rounded-lg flex-1 uppercase hover:bg-[#001f3f] transition">Save Settings</button>
                    <button onclick="closeModal('countdownForm')" class="bg-gray-200 py-3 px-4 rounded-lg font-bold uppercase text-gray-600 hover:bg-gray-300 transition">Cancel</button>
                </div>
            </div>
        </div>
    </div>

<script>
    if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';

    const workerBaseUrl = "https://misty-credit-9e6a.ewing-jacob.workers.dev";
    const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`, 'Content-Type': 'application/json' };

    let currentCdMode = 'sinedie';
    let currentCdDate = '2026-03-12';
    let radarBills = []; 
    let dashSortables = [];
    let dashExpandedTasks = new Set();
    let lastFetchedTodos = [];

    const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('currentDateDisplay').innerText = new Date().toLocaleDateString('en-US', dateOptions);
    document.getElementById('scheduleDateLabel').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    async function loadSidebar() {
        try {
            const response = await fetch('sidebar.html');
            if (!response.ok) throw new Error("Sidebar failed to load.");
            const html = await response.text();
            document.getElementById('sidebar-container').innerHTML = html;
            updateNavHighlight();
        } catch (error) { console.error(error); }
    }

    function updateNavHighlight() {
        const path = window.location.pathname;
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            if (path.includes(item.getAttribute('href'))) {
                item.classList.add('bg-white/10', 'text-white');
                item.classList.remove('text-blue-200');
            }
        });
    }

    async function fetchUserProfile() {
        try {
            const resMe = await fetch(`${workerBaseUrl}/me`, { headers: authHeaders });
            if (resMe.ok) {
                const userData = await resMe.json();
                if (userData.name) {
                    const firstName = userData.name.split(' ')[0];
                    document.getElementById('greeting').innerText = `Welcome back, ${firstName}.`;
                } else if (userData.email) {
                    const emailFirst = userData.email.split('@')[0].split('.')[0];
                    const capEmail = emailFirst.charAt(0).toUpperCase() + emailFirst.slice(1);
                    document.getElementById('greeting').innerText = `Welcome back, ${capEmail}.`;
                }
            }
        } catch (e) { console.error("Could not fetch user profile.", e); }
    }
    
    let refreshTimer;

    window.onload = async () => {
        document.getElementById('dashOtDate').valueAsDate = new Date();
        buildDashboardTimeline();
        await loadSidebar(); 
        await fetchUserProfile();
        refreshDashboard();
        
        refreshTimer = setInterval(refreshDashboard, 300000);
    };

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
            clearInterval(refreshTimer);
            refreshDashboard();
            refreshTimer = setInterval(refreshDashboard, 300000);
        } else {
            clearInterval(refreshTimer);
        }
    });

    async function refreshDashboard() {
        await fetchPreferences();
        fetchRadar();
        fetchTodos();
        fetchOvertime();
    }

    async function fetchPreferences() {
        try {
            const res = await fetch(`${workerBaseUrl}/preferences`, { headers: authHeaders });
            if (res.ok) {
                const data = await res.json();
                currentCdMode = data.cd_mode || 'sinedie';
                currentCdDate = data.cd_date || '2026-03-12';
            }
        } catch(e) { console.warn("Could not load preferences, using defaults"); }
        calculateCountdown();
    }

    function calculateCountdown() {
        const displayTitle = document.getElementById('countdownTitle');
        const displayDays = document.getElementById('countdownDays');

        displayTitle.innerText = currentCdMode === 'sinedie' ? 'Countdown to Sine Die' : 'Countdown to Session Start';

        const targetDate = new Date(`${currentCdDate}T23:59:59`).getTime();
        const now = new Date().getTime();
        const diffDays = Math.ceil((targetDate - now) / (1000 * 60 * 60 * 24)); 
        
        displayDays.innerText = diffDays < 0 ? "0" : diffDays;
    }

    function openCountdownSettings() {
        document.getElementById('cdMode').value = currentCdMode;
        document.getElementById('cdDate').value = currentCdDate;
        document.getElementById('countdownForm').style.display = 'flex';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    async function saveCountdownSettings(btn) {
        const originalText = btn.innerText;
        btn.innerText = "Saving...";
        btn.disabled = true;

        currentCdMode = document.getElementById('cdMode').value;
        currentCdDate = document.getElementById('cdDate').value;

        try {
            await fetch(`${workerBaseUrl}/preferences`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({ cd_mode: currentCdMode, cd_date: currentCdDate })
            });
        } catch(e) { alert("Failed to save settings to database."); }

        btn.innerText = originalText;
        btn.disabled = false;
        closeModal('countdownForm');
        calculateCountdown();
    }

    function safeJSONParse(str, fallback) {
        if (!str) return fallback;
        try { return JSON.parse(str); } catch(e) { return fallback; }
    }

    // --- TRACKED BILLS RADAR LOGIC ---

    async function fetchRadar() {
        try {
            const res = await fetch(`${workerBaseUrl}/my-workspace`, { headers: authHeaders });
            const bills = await res.json();
            const grid = document.getElementById('recentUpdatesGrid');
            grid.innerHTML = '';

            if (bills.length === 0) {
                grid.innerHTML = '<div class="text-gray-400 text-xs italic">Workspace is empty.</div>';
                radarBills = [];
                return;
            }

            const alertedBills = bills.filter(b => safeJSONParse(b.task_progress, {})._sys_alert_unread);

            if (alertedBills.length === 0) {
                grid.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-10 opacity-60">
                        <span class="text-3xl mb-3">🎉</span>
                        <span class="text-[12px] font-black uppercase tracking-widest text-gray-500">You're all caught up!</span>
                        <span class="text-[10px] font-bold text-gray-400 mt-1">No unread updates on your tracked bills.</span>
                    </div>`;
                radarBills = [];
                return;
            }

            grid.innerHTML += `<div class="text-[10px] font-black uppercase tracking-widest text-red-500 mb-3 animate-pulse flex items-center gap-2"><span>🔴</span> Unread Updates</div>`;

            alertedBills.forEach(item => {
                const isDead = item.status === 'Dead';
                const parsedTasks = safeJSONParse(item.task_progress, {});
                const alertMsg = parsedTasks._sys_alert;

                const content = `<span class="text-xs font-black text-red-500 block mb-1 uppercase tracking-wider">${alertMsg}</span><span class="text-sm font-bold text-gray-500 line-clamp-1">${item.short_desc}</span>`;
                const dot = `<div class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white animate-pulse"></div>`;

                grid.innerHTML += `
                    <div class="relative border border-red-200 bg-red-50 rounded-lg p-3 shadow-sm hover:shadow-md transition cursor-pointer flex flex-col group" onclick="goToTracker(event, ${item.id})">
                        ${dot}
                        
                        <button onclick="dismissAlert(event, ${item.id})" class="absolute top-2 right-2 text-red-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition focus:outline-none z-10" title="Dismiss Alert">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>

                        <div class="flex justify-between items-start mb-2">
                            <span class="text-base font-black text-[#002e5d] leading-tight">${item.bill_number}</span>
                            <span class="text-[9px] font-black uppercase px-2 py-0.5 rounded ${isDead ? 'bg-gray-200 text-gray-600' : 'bg-orange-100 text-orange-800'}">${item.status}</span>
                        </div>
                        <div class="pr-4">${content}</div>
                    </div>`;
            });
            
            radarBills = alertedBills; 

        } catch (e) {}
    }

    async function dismissAlert(event, id) {
        event.stopPropagation();
        const item = radarBills.find(b => b.id === id);
        if (!item) return;

        const card = event.target.closest('.relative.border-red-200');
        if (card) {
            card.style.opacity = '0.4';
            card.style.pointerEvents = 'none';
        }

        try {
            let tasks = safeJSONParse(item.task_progress, {});
            delete tasks._sys_alert_unread;
            item.task_progress = JSON.stringify(tasks);

            await fetch(`${workerBaseUrl}/update-bill`, { 
                method: 'POST', 
                headers: authHeaders, 
                body: JSON.stringify(item) 
            });
            
            fetchRadar(); 
        } catch(e) { console.error("Failed to dismiss alert"); }
    }

    function goToTracker(event, id) {
        const item = radarBills.find(b => b.id === id);
        if (item) {
            let tasks = safeJSONParse(item.task_progress, {});
            if (tasks._sys_alert_unread) {
                delete tasks._sys_alert_unread;
                item.task_progress = JSON.stringify(tasks);
                
                fetch(`${workerBaseUrl}/update-bill`, { 
                    method: 'POST', 
                    headers: authHeaders, 
                    body: JSON.stringify(item) 
                });
            }
            window.location.href = `tracker.html?autosearch=${item.bill_number.replace(/\D/g, '')}`;
        } else {
            window.location.href = 'tracker.html';
        }
    }

    // --- TIMELINE & TASKS DASHBOARD LOGIC ---

    function buildDashboardTimeline() {
        const timeline = document.getElementById('dashTimelineContainer');
        timeline.innerHTML = '';

        for(let hour = 7; hour <= 18; hour++) {
            const displayHour = hour > 12 ? hour - 12 : hour;
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const timeStr = `${displayHour} ${ampm}`;
            const timeKey = `${hour.toString().padStart(2, '0')}:00`;

            timeline.innerHTML += `
                <div class="flex border border-gray-200 rounded flex-col sm:flex-row bg-white overflow-hidden shadow-sm">
                    <div class="bg-gray-100 sm:w-16 flex-shrink-0 flex items-center justify-center border-b sm:border-b-0 sm:border-r border-gray-200 text-[10px] font-black text-gray-500 uppercase tracking-wider py-1 sm:py-0">
                        ${timeStr}
                    </div>
                    <div class="flex-1 p-1 dash-time-block-zone space-y-1 bg-white transition-colors" data-time="${timeKey}" id="dash-block-${timeKey}">
                    </div>
                </div>
            `;
        }
    }

    function toggleDashSubtaskList(taskId, event) {
        if(event) event.stopPropagation();
        if (dashExpandedTasks.has(taskId)) dashExpandedTasks.delete(taskId);
        else dashExpandedTasks.add(taskId);
        renderTodosWidget(lastFetchedTodos);
    }

    async function fetchTodos() {
        try {
            const res = await fetch(`${workerBaseUrl}/todos`, { headers: authHeaders });
            if (!res.ok) throw new Error();
            lastFetchedTodos = await res.json();
            renderTodosWidget(lastFetchedTodos);
        } catch (e) {
            document.getElementById('dashTodos').innerHTML = '<div class="text-center text-red-400 text-xs font-bold py-5">Failed to load tasks.</div>';
        }
    }

    function renderTodosWidget(rawTodos) {
        const todos = rawTodos.map(t => ({
            ...t,
            subtasks: typeof t.subtasks === 'string' ? JSON.parse(t.subtasks) : (t.subtasks || [])
        }));

        const container = document.getElementById('dashTodos');
        const todayStr = new Date().toISOString().split('T')[0];
        let schedule = JSON.parse(localStorage.getItem('legitile_schedule') || '{}');
        let todaySchedule = schedule[todayStr] || {};

        document.querySelectorAll('.dash-time-block-zone').forEach(zone => zone.innerHTML = '');
        container.innerHTML = '';

        const pendingTodos = todos.filter(t => !t.completed);

        if (pendingTodos.length === 0) {
            container.innerHTML = `<div class="text-center text-gray-400 text-xs font-bold italic py-8">You're all caught up!</div>`;
            return;
        }

        let unscheduledCount = 0;

        pendingTodos.forEach(task => {
            const isTaskScheduled = !!todaySchedule[task.id];
            const blockElement = document.getElementById(`dash-block-${todaySchedule[task.id]}`);
            const isExpanded = dashExpandedTasks.has(task.id);

            const scheduledSubtasks = [];
            const unscheduledSubtasks = [];

            if (task.subtasks) {
                task.subtasks.forEach(sub => {
                    if (todaySchedule[sub.id] && !sub.completed && document.getElementById(`dash-block-${todaySchedule[sub.id]}`)) {
                        scheduledSubtasks.push(sub);
                    } else if (!sub.completed) {
                        unscheduledSubtasks.push(sub);
                    }
                });
            }

            let dueBadge = '';
            if (task.due_date) {
                const isOverdue = new Date(task.due_date) < new Date(new Date().setHours(0,0,0,0));
                dueBadge = `<span class="text-[9px] font-black uppercase px-1.5 py-0.5 rounded ${isOverdue ? 'bg-red-50 text-red-600' : 'bg-gray-100 text-gray-500'}">${task.due_date}</span>`;
            }

            let subtaskToggleHtml = '';
            if (unscheduledSubtasks.length > 0) {
                subtaskToggleHtml = `
                    <button onclick="toggleDashSubtaskList('${task.id}', event)" class="mt-1.5 text-[9px] font-black uppercase text-gray-500 hover:text-[#002e5d] transition bg-gray-50 px-1.5 py-0.5 rounded border border-gray-200 flex items-center gap-1 focus:outline-none">
                        ${unscheduledSubtasks.length} Subtasks <span class="text-[7px]">${isExpanded ? '▲' : '▼'}</span>
                    </button>
                `;
            }

            let subtasksHtml = `<div class="${isExpanded ? 'block' : 'hidden'} space-y-1 mt-2 w-full pl-6 subtask-list-zone min-h-[10px]" data-parent-id="${task.id}">`;
            if (unscheduledSubtasks.length > 0) {
                subtasksHtml += unscheduledSubtasks.map(sub => `
                    <div class="flex items-center gap-2 group bg-white border border-gray-100 p-1.5 rounded shadow-sm" data-id="${sub.id}" data-is-subtask="true" data-parent-id="${task.id}">
                        <div class="drag-handle cursor-grab text-gray-300 hover:text-gray-500 shrink-0"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 16 16"><path d="M4 4h2v2H4zm0 5h2v2H4zm0 5h2v2H4zm5-10h2v2H9zm0 5h2v2H9zm0 5h2v2H9z"/></svg></div>
                        <input type="checkbox" onchange="toggleDashSubtask('${task.id}', '${sub.id}')" class="h-3 w-3 text-[#002e5d] rounded cursor-pointer shrink-0">
                        <span class="text-[11px] font-bold text-gray-600 truncate">${sub.text}</span>
                    </div>
                `).join('');
            }
            subtasksHtml += `</div>`;

            // Main Task Element
            const taskDiv = document.createElement('div');
            taskDiv.setAttribute('data-id', task.id);
            taskDiv.setAttribute('data-is-subtask', 'false');
            taskDiv.className = `flex flex-col p-2 bg-white border border-gray-200 rounded shadow-sm mb-2`;
            
            taskDiv.innerHTML = `
                <div class="flex items-start gap-2 group">
                    <div class="drag-handle cursor-grab text-gray-300 hover:text-[#002e5d] pt-0.5 shrink-0">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 16 16"><path d="M4 4h2v2H4zm0 5h2v2H4zm0 5h2v2H4zm5-10h2v2H9zm0 5h2v2H9zm0 5h2v2H9z"/></svg>
                    </div>
                    <input type="checkbox" onchange="toggleTodo('${task.id}', this.checked)" class="mt-0.5 w-3.5 h-3.5 cursor-pointer accent-[#002e5d] shrink-0">
                    <div class="flex-1 min-w-0">
                        <div class="text-[13px] font-bold text-gray-700 leading-tight">${task.text}</div>
                        <div class="flex items-center gap-2 mt-0.5">
                            ${dueBadge}
                            ${subtaskToggleHtml}
                        </div>
                    </div>
                </div>
                ${subtasksHtml}
            `;

            // Route to timeline or main unscheduled list
            if (isTaskScheduled && blockElement) {
                blockElement.appendChild(taskDiv);
            } else {
                if (unscheduledCount < 15) { 
                    container.appendChild(taskDiv);
                    unscheduledCount++;
                }
            }

            // Render Scheduled Subtasks
            scheduledSubtasks.forEach(sub => {
                const subDiv = document.createElement('div');
                subDiv.setAttribute('data-id', sub.id);
                subDiv.setAttribute('data-is-subtask', 'true');
                subDiv.setAttribute('data-parent-id', task.id);
                subDiv.className = `flex items-center gap-2 group bg-white border border-gray-200 p-1.5 rounded shadow-sm border-l-4 border-l-[#002e5d]`;
                
                subDiv.innerHTML = `
                    <div class="drag-handle cursor-grab text-gray-300 hover:text-[#002e5d] shrink-0">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 16 16"><path d="M4 4h2v2H4zm0 5h2v2H4zm0 5h2v2H4zm5-10h2v2H9zm0 5h2v2H9zm0 5h2v2H9z"/></svg>
                    </div>
                    <input type="checkbox" onchange="toggleDashSubtask('${task.id}', '${sub.id}')" class="h-3 w-3 text-[#002e5d] rounded cursor-pointer shrink-0">
                    <div class="flex-1 flex flex-col min-w-0">
                        <span class="text-[8px] font-black uppercase text-gray-400 tracking-widest leading-none mb-0.5 truncate">Sub: ${task.text.substring(0,20)}</span>
                        <span class="text-[11px] font-bold text-gray-800 leading-tight truncate">${sub.text}</span>
                    </div>
                `;
                document.getElementById(`dash-block-${todaySchedule[sub.id]}`).appendChild(subDiv);
            });
        });

        initDashSortable();
    }

    function initDashSortable() {
        dashSortables.forEach(s => s.destroy());
        dashSortables = [];

        const commonOptions = {
            animation: 150,
            ghostClass: 'opacity-50',
            handle: '.drag-handle',
            onEnd: function (evt) {
                const el = evt.item;
                const toEl = evt.to;
                const id = el.getAttribute('data-id');

                const todayStr = new Date().toISOString().split('T')[0];
                let schedule = JSON.parse(localStorage.getItem('legitile_schedule') || '{}');
                if (!schedule[todayStr]) schedule[todayStr] = {};

                if (toEl.classList.contains('dash-time-block-zone')) {
                    schedule[todayStr][id] = toEl.getAttribute('data-time');
                } else {
                    if (schedule[todayStr][id]) delete schedule[todayStr][id];
                }
                
                localStorage.setItem('legitile_schedule', JSON.stringify(schedule));
                renderTodosWidget(lastFetchedTodos); 
            }
        };

        const mainList = document.getElementById('dashTodos');
        if (mainList) {
            dashSortables.push(new Sortable(mainList, {
                ...commonOptions,
                group: { name: 'tasks', put: (to, from, dragEl) => dragEl.getAttribute('data-is-subtask') === 'false' }
            }));
        }

        document.querySelectorAll('.dash-time-block-zone').forEach(zone => {
            dashSortables.push(new Sortable(zone, {
                ...commonOptions,
                group: { name: 'timeline', put: true }
            }));
        });

        document.querySelectorAll('.subtask-list-zone').forEach(zone => {
            dashSortables.push(new Sortable(zone, {
                ...commonOptions,
                group: { 
                    name: 'subtasks', 
                    put: (to, from, dragEl) => dragEl.getAttribute('data-is-subtask') === 'true' && dragEl.getAttribute('data-parent-id') === to.el.getAttribute('data-parent-id')
                }
            }));
        });
    }

    async function toggleTodo(id, isCompleted) {
        if (isCompleted) {
            const todayStr = new Date().toISOString().split('T')[0];
            let schedule = JSON.parse(localStorage.getItem('legitile_schedule') || '{}');
            if (schedule[todayStr] && schedule[todayStr][id]) {
                delete schedule[todayStr][id];
                localStorage.setItem('legitile_schedule', JSON.stringify(schedule));
            }
        }
        await fetch(`${workerBaseUrl}/todos`, {
            method: 'POST',
            headers: authHeaders,
            body: JSON.stringify({ action: 'toggle', id: id, completed: isCompleted })
        });
        fetchTodos(); 
    }

    async function toggleDashSubtask(taskId, subtaskId) {
        const task = lastFetchedTodos.find(t => t.id === taskId);
        
        let parsedSubtasks = typeof task.subtasks === 'string' ? JSON.parse(task.subtasks) : task.subtasks;
        const subtask = parsedSubtasks.find(s => s.id === subtaskId);
        subtask.completed = !subtask.completed;
        
        if (subtask.completed) {
            const todayStr = new Date().toISOString().split('T')[0];
            let schedule = JSON.parse(localStorage.getItem('legitile_schedule') || '{}');
            if (schedule[todayStr] && schedule[todayStr][subtaskId]) {
                delete schedule[todayStr][subtaskId];
                localStorage.setItem('legitile_schedule', JSON.stringify(schedule));
            }
        }

        dashExpandedTasks.add(taskId);
        
        await fetch(`${workerBaseUrl}/todos`, {
            method: 'POST',
            headers: authHeaders,
            body: JSON.stringify({ action: 'update_subtasks', id: taskId, subtasks: parsedSubtasks })
        });
        fetchTodos();
    }

    // --- OVERTIME DASHBOARD LOGIC ---

    async function fetchOvertime() {
        try {
            const today = new Date();
            const currentSession = today.getMonth() >= 9 ? today.getFullYear() + 1 : today.getFullYear();
            
            const res = await fetch(`${workerBaseUrl}/overtime?session_year=${currentSession}`, { headers: authHeaders });
            if (!res.ok) throw new Error();
            
            const overtime = await res.json();
            
            let totalHrs = 0;
            overtime.forEach(r => totalHrs += parseFloat(r.hours || 0));
            document.getElementById('dashOtTotal').innerText = totalHrs.toFixed(2);

            const tbody = document.getElementById('dashOtRecent');
            if (overtime.length === 0) {
                tbody.innerHTML = `<tr><td class="p-5 text-center text-gray-400 text-xs font-bold italic">No recent logs.</td></tr>`;
                return;
            }

            const recentLogs = overtime.slice(0, 3);
            tbody.innerHTML = recentLogs.map(record => {
                let formattedDate = record.work_date;
                if (record.work_date) {
                    const dateParts = record.work_date.split('-');
                    const dateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]); 
                    formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                }
                return `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-2.5 w-14 text-[9px] font-bold text-gray-500 whitespace-nowrap border-b border-gray-50">${formattedDate}</td>
                        <td class="p-2.5 w-10 text-xs font-black text-[#002e5d] border-b border-gray-50">${parseFloat(record.hours).toFixed(2)}</td>
                        <td class="p-2.5 text-[10px] font-bold text-gray-600 truncate max-w-[100px] border-b border-gray-50">${record.description || '<span class="italic opacity-50">No desc</span>'}</td>
                    </tr>`;
            }).join('');
        } catch (e) {
            document.getElementById('dashOtRecent').innerHTML = `<tr><td class="p-5 text-center text-red-400 text-xs font-bold">Failed to load logs.</td></tr>`;
        }
    }

    async function quickLogOvertime() {
        const dateInput = document.getElementById('dashOtDate').value;
        const hoursInput = document.getElementById('dashOtHours').value;
        const descInput = document.getElementById('dashOtDesc').value.trim();
        
        if (!dateInput || !hoursInput || hoursInput <= 0) {
            alert("Please enter a valid date and hours.");
            return;
        }

        const btn = document.querySelector('button[onclick="quickLogOvertime()"]');
        const originalText = btn.innerText;
        btn.innerText = "...";
        btn.disabled = true;

        const recordId = Date.now().toString();

        await fetch(`${workerBaseUrl}/overtime`, {
            method: 'POST',
            headers: authHeaders,
            body: JSON.stringify({ 
                action: 'add', 
                id: recordId, 
                work_date: dateInput, 
                hours: hoursInput, 
                description: descInput, 
                created_at: new Date().toISOString() 
            })
        });

        document.getElementById('dashOtHours').value = '';
        document.getElementById('dashOtDesc').value = '';
        
        btn.innerText = originalText;
        btn.disabled = false;

        fetchOvertime();
    }
