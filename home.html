<html lang="en">

    <style>
        .leg-navy { background-color: #002e5d; }
        .live-border { border-left: 8px solid #002e5d; }
        .dead-border { border-left: 8px solid #64748b; opacity: 0.8; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }

<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

 <div id="sidebar-container" class="flex-shrink-0 w-full md:w-28 md:h-full z-50"></div>  

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200">
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Dashboard</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">

                <div class="lg:col-span-1 flex flex-col gap-6">

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col flex-1 max-h-[500px]">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Upcoming Meetings</span>
                            <span class="text-[9px] font-bold text-blue-500 animate-pulse">30-DAY WINDOW</span>
                        </div>
                        <div class="space-y-3 overflow-y-auto pr-2" id="meetingList">
                            <span class="text-xs font-bold text-gray-400 italic">Scanning biennium records...</span>
                        </div>
                    </div>

                    <div class="bg-[#002e5d] rounded-xl shadow-md border border-[#001f3f] p-6 flex flex-col justify-center items-center text-center relative overflow-hidden shrink-0 group">
                        <div class="absolute -top-10 -right-10 w-32 h-32 bg-white opacity-5 rounded-full blur-2xl"></div>
                        
                        <button onclick="openCountdownSettings()" class="absolute top-3 right-3 text-white/50 hover:text-white opacity-0 group-hover:opacity-100 transition-opacity duration-200 focus:opacity-100 z-20" title="Countdown Settings">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                        </button>

                        <span id="countdownTitle" class="text-[10px] font-black uppercase tracking-[0.2em] text-orange-400 mb-2 z-10">Countdown to Sine Die</span>
                        <div class="text-5xl font-black text-white leading-none tracking-tighter z-10" id="countdownDays">--</div>
                        <span class="text-xs font-bold text-blue-200 mt-1 z-10">Days Remaining</span>
                    </div>

                </div>

                <div class="lg:col-span-2 flex flex-col gap-6">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col flex-1 overflow-hidden h-full">
                        <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Tracked Bills Updates</span>
                            <a href="tracker.html" class="text-[10px] font-black uppercase text-[#002e5d] hover:text-blue-700 bg-blue-50 px-3 py-1.5 rounded transition border border-blue-100">Go to Workspace ➔</a>
                        </div>
                        <div class="p-6 overflow-y-auto flex-1">
                            <div class="flex flex-col gap-3" id="recentUpdatesGrid">
                                <div class="text-sm font-bold text-gray-400 italic">Loading radar items...</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="countdownForm" style="display: none;" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full border-t-8 border-[#002e5d]">
            <h2 class="text-2xl font-bold mb-4 text-[#002e5d] uppercase">Countdown Settings</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-1">Display Mode</label>
                    <select id="cdMode" class="w-full border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700">
                        <option value="sinedie">Countdown to Sine Die</option>
                        <option value="start">Countdown to Session Start</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-1">Target Date</label>
                    <input type="date" id="cdDate" class="w-full border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700">
                </div>

                <div class="flex gap-2 pt-4">
                    <button onclick="saveCountdownSettings(this)" class="bg-[#002e5d] text-white font-bold px-6 py-3 rounded-lg flex-1 uppercase hover:bg-[#001f3f] transition">Save Settings</button>
                    <button onclick="closeCountdownSettings()" class="bg-gray-200 py-3 px-4 rounded-lg font-bold uppercase text-gray-600 hover:bg-gray-300 transition">Cancel</button>
                </div>
            </div>
        </div>
    </div>

<script>
    if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';

    const workerBaseUrl = "https://misty-credit-9e6a.ewing-jacob.workers.dev";
    const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`, 'Content-Type': 'application/json' };

    let currentCdMode = 'sinedie';
    let currentCdDate = '2026-03-12';

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    async function loadSidebar() {
        try {
            const response = await fetch('sidebar.html');
            if (!response.ok) throw new Error("Sidebar failed to load.");
            
            const html = await response.text();
            document.getElementById('sidebar-container').innerHTML = html;

            document.getElementById('userEmailDisplay').innerText = localStorage.getItem('user_email') || 'Staff';
            updateNavHighlight();
        } catch (error) {
            console.error(error);
        }
    }

    function updateNavHighlight() {
        const path = window.location.pathname;
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            if (path.includes(item.getAttribute('href'))) {
                item.classList.add('bg-white/10', 'text-white');
                item.classList.remove('text-blue-200');
            }
        });
    }

    window.onload = async () => {
        await loadSidebar(); 
        refreshDashboard();
        setInterval(refreshDashboard, 300000);
    };

    async function refreshDashboard() {
        await fetchPreferences();
        fetchRadar();
        fetchMeetings();
    }

    async function fetchPreferences() {
        try {
            const res = await fetch(`${workerBaseUrl}/preferences`, { headers: authHeaders });
            if (res.ok) {
                const data = await res.json();
                currentCdMode = data.cd_mode || 'sinedie';
                currentCdDate = data.cd_date || '2026-03-12';
            }
        } catch(e) { console.warn("Could not load preferences, using defaults"); }
        calculateCountdown();
    }

    function calculateCountdown() {
        const displayTitle = document.getElementById('countdownTitle');
        const displayDays = document.getElementById('countdownDays');

        displayTitle.innerText = currentCdMode === 'sinedie' ? 'Countdown to Sine Die' : 'Countdown to Session Start';

        const targetDate = new Date(`${currentCdDate}T23:59:59`).getTime();
        const now = new Date().getTime();
        const diffDays = Math.ceil((targetDate - now) / (1000 * 60 * 60 * 24)); 
        
        displayDays.innerText = diffDays < 0 ? "0" : diffDays;
    }

    function openCountdownSettings() {
        document.getElementById('cdMode').value = currentCdMode;
        document.getElementById('cdDate').value = currentCdDate;
        document.getElementById('countdownForm').style.display = 'flex';
    }

    function closeCountdownSettings() {
        document.getElementById('countdownForm').style.display = 'none';
    }

    async function saveCountdownSettings(btn) {
        const originalText = btn.innerText;
        btn.innerText = "Saving...";
        btn.disabled = true;

        currentCdMode = document.getElementById('cdMode').value;
        currentCdDate = document.getElementById('cdDate').value;

        try {
            await fetch(`${workerBaseUrl}/preferences`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({ cd_mode: currentCdMode, cd_date: currentCdDate })
            });
        } catch(e) { 
            alert("Failed to save settings to database."); 
        }

        btn.innerText = originalText;
        btn.disabled = false;
        closeCountdownSettings();
        calculateCountdown();
    }

    function safeJSONParse(str, fallback) {
        if (!str) return fallback;
        try { return JSON.parse(str); } catch(e) { return fallback; }
    }

    async function fetchRadar() {
        try {
            const res = await fetch(`${workerBaseUrl}/my-workspace`, { headers: authHeaders });
            const bills = await res.json();
            const grid = document.getElementById('recentUpdatesGrid');
            grid.innerHTML = '';

            if (bills.length === 0) {
                grid.innerHTML = '<div class="text-gray-400 text-xs italic">Workspace is empty.</div>';
                return;
            }

            const alertedBills = bills.filter(b => safeJSONParse(b.task_progress, {})._sys_alert_unread);
            const standardBills = bills.filter(b => !safeJSONParse(b.task_progress, {})._sys_alert_unread).slice(0, 5);

            const itemsToDisplay = alertedBills.length > 0 ? alertedBills : standardBills;

            if (alertedBills.length > 0) {
                grid.innerHTML += `<div class="text-[10px] font-black uppercase tracking-widest text-red-500 mb-1 animate-pulse flex items-center gap-2"><span>🔴</span> Unread Updates</div>`;
            } else {
                grid.innerHTML += `<div class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-1">Recent Bills (No New Updates)</div>`;
            }

            itemsToDisplay.forEach(item => {
                const isDead = item.status === 'Dead';
                const parsedTasks = safeJSONParse(item.task_progress, {});
                const hasAlert = parsedTasks._sys_alert_unread;
                const alertMsg = parsedTasks._sys_alert;

                const content = hasAlert 
                    ? `<span class="text-xs font-black text-red-500 block mb-1 uppercase tracking-wider">${alertMsg}</span><span class="text-sm font-bold text-gray-500 line-clamp-1">${item.short_desc}</span>`
                    : `<div class="text-sm font-bold text-gray-600 line-clamp-2">${item.short_desc}</div>`;

                const dot = hasAlert ? `<div class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white animate-pulse"></div>` : '';

                grid.innerHTML += `
                    <div class="relative border ${hasAlert ? 'border-red-200 bg-red-50' : (isDead ? 'border-gray-200 bg-gray-50 grayscale' : 'border-blue-100 bg-white hover:border-[#002e5d]')} rounded-lg p-4 shadow-sm hover:shadow-md transition cursor-pointer flex flex-col sm:flex-row sm:items-center gap-4" onclick="window.location.href='tracker.html'">
                        ${dot}
                        <div class="w-24 shrink-0">
                            <span class="text-lg font-black text-[#002e5d] block leading-tight">${item.bill_number}</span>
                            <span class="text-[9px] font-black uppercase px-2 py-0.5 rounded ${isDead ? 'bg-gray-200 text-gray-600' : 'bg-orange-100 text-orange-800'} inline-block mt-1">${item.status}</span>
                        </div>
                        <div class="flex-1">${content}</div>
                    </div>`;
            });
        } catch (e) {}
    }

    async function fetchMeetings() {
        const list = document.getElementById('meetingList');
        const now = new Date();
        const fortyFiveDaysFromNow = new Date();
        fortyFiveDaysFromNow.setDate(now.getDate() + 45);

        try {
            const res = await fetch(`${workerBaseUrl}/upcoming-meetings`, { headers: authHeaders });
            const xmlText = await res.text();
            const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");

            const cm = Array.from(xmlDoc.querySelectorAll('CommitteeMeeting'));
            const fa = Array.from(xmlDoc.querySelectorAll('FloorAction'));
            const allItems = [...cm, ...fa];

            if (allItems.length === 0) {
                list.innerHTML = '<div class="text-xs font-bold text-gray-400 italic">No meetings scheduled.</div>';
                return;
            }

            const seen = new Set();
            const filteredItems = allItems.map(node => {
                const get = (t) => node.querySelector(t)?.textContent.trim() || "";
                return {
                    agency: get("Agency"),
                    name: get("Name") || get("LongName"),
                    date: new Date(get("Date")),
                    room: get("Room") || "Chamber Floor",
                    key: `${get("Agency")}-${get("Name")}-${get("Date")}`
                };
            }).filter(item => {
                const isUpcoming = item.date >= now && item.date <= fortyFiveDaysFromNow;
                if (!isUpcoming || seen.has(item.key)) return false;
                seen.add(item.key);
                return true;
            }).sort((a, b) => a.date - b.date);

            list.innerHTML = '';
            let lastDateLabel = "";

            filteredItems.forEach(item => {
                const dateLabel = item.date.toLocaleDateString([], { month: 'long', day: 'numeric' }).toUpperCase();
                if (dateLabel !== lastDateLabel) {
                    list.innerHTML += `<div class="text-[9px] font-black text-gray-400 tracking-widest mt-4 mb-2 border-b border-gray-100 pb-1">${dateLabel}</div>`;
                    lastDateLabel = dateLabel;
                }

                const timeStr = item.date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                let color = "bg-gray-400";
                const ag = item.agency.toLowerCase();
                const nm = item.name.toLowerCase();

                if (ag.includes("senate")) color = "bg-red-500";
                else if (ag.includes("house")) color = "bg-green-500";
                else if (ag.includes("joint") || nm.includes("jlarc")) color = "bg-blue-600";

                let displayName = item.name;
                if (displayName.includes("Convened")) displayName = "Floor Session";

                list.innerHTML += `
                    <div class="flex items-center gap-3 py-2">
                        <div class="w-2 h-2 rounded-full ${color} shrink-0"></div>
                        <div class="flex-1 min-w-0">
                            <div class="text-[11px] font-black text-[#002e5d] truncate uppercase">${item.agency} ${displayName}</div>
                            <div class="text-[9px] font-bold text-gray-500 truncate mt-0.5">${timeStr} • ${item.room}</div>
                        </div>
                    </div>`;
            });
        } catch (e) {
            list.innerHTML = '<div class="text-xs font-bold text-red-400">Failed to sync schedule.</div>';
        }
    }
</script>
</body>
</html>
