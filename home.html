<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegiTile | Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .leg-navy { background-color: #002e5d; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

    <div id="sidebar-container" class="flex-shrink-0 w-full md:w-28 md:h-full z-50"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Dashboard</h1>
                <p id="greeting" class="text-xs text-gray-500 font-bold mt-1">Welcome back.</p>
            </div>
            <div class="text-[10px] font-black uppercase text-gray-400 tracking-wider" id="currentDateDisplay"></div>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
            <div class="max-w-6xl mx-auto space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex items-center justify-between">
                        <div>
                            <div class="text-[10px] font-black uppercase text-gray-400 tracking-wider mb-1">Active Bills</div>
                            <div id="statBills" class="text-3xl font-black text-[#002e5d]">-</div>
                        </div>
                        <div class="text-4xl opacity-20">📑</div>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex items-center justify-between">
                        <div>
                            <div class="text-[10px] font-black uppercase text-gray-400 tracking-wider mb-1">Pending Tasks</div>
                            <div id="statTasks" class="text-3xl font-black text-orange-500">-</div>
                        </div>
                        <div class="text-4xl opacity-20">✅</div>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex items-center justify-between">
                        <div>
                            <div class="text-[10px] font-black uppercase text-gray-400 tracking-wider mb-1">Overtime Logged</div>
                            <div id="statOvertime" class="text-3xl font-black text-green-600">- <span class="text-sm text-gray-400">hrs</span></div>
                        </div>
                        <div class="text-4xl opacity-20">⏱️</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
                    
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-[450px]">
                        <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 shrink-0">
                            <h2 class="text-sm font-black uppercase tracking-wider text-gray-700">Priority Tasks</h2>
                            <a href="todo.html" class="text-[10px] font-bold uppercase text-blue-500 hover:text-blue-700 transition">View All &rarr;</a>
                        </div>
                        <div class="p-5 overflow-y-auto flex-1" id="dashTodos">
                            <div class="text-center text-gray-400 text-sm font-bold italic py-10 animate-pulse">Loading tasks...</div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-[450px]">
                        <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 shrink-0">
                            <h2 class="text-sm font-black uppercase tracking-wider text-gray-700">Quick Log Overtime</h2>
                            <a href="overtime.html" class="text-[10px] font-bold uppercase text-blue-500 hover:text-blue-700 transition">Full Log &rarr;</a>
                        </div>
                        <div class="p-5 border-b border-gray-100 shrink-0 bg-white">
                            <div class="flex gap-2 mb-2">
                                <input type="date" id="dashOtDate" class="w-1/2 bg-gray-50 border border-gray-200 p-2 rounded-lg text-xs font-bold text-gray-700 outline-none focus:border-[#002e5d]">
                                <input type="number" step="0.25" min="0" id="dashOtHours" placeholder="Hours" class="w-1/2 bg-gray-50 border border-gray-200 p-2 rounded-lg text-xs font-bold text-gray-700 outline-none focus:border-[#002e5d]">
                            </div>
                            <div class="flex gap-2">
                                <input type="text" id="dashOtDesc" placeholder="Description..." class="flex-1 bg-gray-50 border border-gray-200 p-2 rounded-lg text-xs font-bold text-gray-700 outline-none focus:border-[#002e5d]" onkeypress="if(event.key === 'Enter') quickLogOvertime()">
                                <button onclick="quickLogOvertime()" class="bg-[#002e5d] hover:bg-[#001f3f] text-white text-[10px] font-black uppercase px-4 py-2 rounded-lg transition">Log</button>
                            </div>
                        </div>
                        <div class="p-0 overflow-y-auto flex-1">
                            <table class="w-full text-left border-collapse">
                                <tbody id="dashOtRecent" class="text-sm divide-y divide-gray-50">
                                    <tr><td class="p-5 text-center text-gray-400 text-xs font-bold italic">Loading recent logs...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

<script>
    if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';

    const workerBaseUrl = "https://misty-credit-9e6a.ewing-jacob.workers.dev";
    const authHeaders = { 
        'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`, 
        'Content-Type': 'application/json' 
    };

    // Set greeting and date
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('currentDateDisplay').innerText = new Date().toLocaleDateString('en-US', options);
    
    // Default OT date
    document.getElementById('dashOtDate').valueAsDate = new Date();

    async function loadSidebar() {
        try {
            const response = await fetch('sidebar.html');
            if (response.ok) {
                document.getElementById('sidebar-container').innerHTML = await response.text();
                
                const userEmail = localStorage.getItem('user_email') || '';
                if (userEmail) {
                    document.getElementById('userEmailDisplay').innerText = userEmail;
                    document.getElementById('greeting').innerText = `Welcome back, ${userEmail.split('@')[0]}.`;
                }

                const path = window.location.pathname;
                document.querySelectorAll('.nav-item').forEach(item => {
                    if (path.includes(item.getAttribute('href'))) {
                        item.classList.add('bg-white/10', 'text-white');
                        item.classList.remove('text-blue-200');
                    }
                });
            }
        } catch (error) { console.error("Sidebar failed to load."); }
    }

    async function fetchDashboardData() {
        try {
            // Fetch all data in parallel for speed
            const [billsRes, todosRes, otRes] = await Promise.all([
                fetch(`${workerBaseUrl}/my-workspace`, { headers: authHeaders }),
                fetch(`${workerBaseUrl}/todos`, { headers: authHeaders }),
                fetch(`${workerBaseUrl}/overtime`, { headers: authHeaders })
            ]);

            const bills = billsRes.ok ? await billsRes.json() : [];
            const todos = todosRes.ok ? await todosRes.json() : [];
            const overtime = otRes.ok ? await otRes.json() : [];

            // 1. Process Bills
            document.getElementById('statBills').innerText = bills.length;

            // 2. Process Todos
            const pendingTodos = todos.filter(t => !t.completed);
            document.getElementById('statTasks').innerText = pendingTodos.length;
            renderTodosWidget(pendingTodos);

            // 3. Process Overtime
            let totalHrs = 0;
            overtime.forEach(r => totalHrs += parseFloat(r.hours || 0));
            document.getElementById('statOvertime').innerHTML = `${totalHrs.toFixed(2)} <span class="text-sm text-gray-400">hrs</span>`;
            renderOvertimeWidget(overtime);

        } catch (error) {
            console.error("Error loading dashboard data:", error);
        }
    }

    function renderTodosWidget(pendingTodos) {
        const container = document.getElementById('dashTodos');
        
        if (pendingTodos.length === 0) {
            container.innerHTML = `<div class="text-center text-gray-400 text-sm font-bold italic py-10">You're all caught up!</div>`;
            return;
        }

        // Show only top 5 pending
        const displayTodos = pendingTodos.slice(0, 5);
        
        container.innerHTML = displayTodos.map(todo => {
            let dueBadge = '';
            if (todo.due_date) {
                const isOverdue = new Date(todo.due_date) < new Date(new Date().setHours(0,0,0,0));
                dueBadge = `<span class="text-[9px] font-black uppercase px-2 py-0.5 rounded ${isOverdue ? 'bg-red-50 text-red-600' : 'bg-gray-100 text-gray-500'}">${todo.due_date}</span>`;
            }

            return `
                <div class="flex items-start gap-3 p-3 hover:bg-gray-50 rounded-lg transition border border-transparent hover:border-gray-100 mb-2 group">
                    <input type="checkbox" onchange="toggleTodo('${todo.id}', this.checked)" class="mt-1 w-4 h-4 cursor-pointer accent-[#002e5d]">
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-bold text-gray-700 leading-tight">${todo.text}</div>
                        ${dueBadge ? `<div class="mt-1">${dueBadge}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    async function toggleTodo(id, isCompleted) {
        // Optimistically update UI by hiding it immediately on dashboard
        fetchDashboardData(); 
        
        await fetch(`${workerBaseUrl}/todos`, {
            method: 'POST',
            headers: authHeaders,
            body: JSON.stringify({ action: 'toggle', id: id, completed: isCompleted })
        });
    }

    function renderOvertimeWidget(overtime) {
        const tbody = document.getElementById('dashOtRecent');
        
        if (overtime.length === 0) {
            tbody.innerHTML = `<tr><td class="p-5 text-center text-gray-400 text-xs font-bold italic">No recent logs.</td></tr>`;
            return;
        }

        // Show only 4 most recent
        const recentLogs = overtime.slice(0, 4);
        
        tbody.innerHTML = recentLogs.map(record => {
            let formattedDate = record.work_date;
            if (record.work_date) {
                const dateParts = record.work_date.split('-');
                const dateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]); 
                formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }

            return `
                <tr class="hover:bg-gray-50 transition">
                    <td class="p-4 w-24 text-xs font-bold text-gray-500">${formattedDate}</td>
                    <td class="p-4 w-16 text-sm font-black text-[#002e5d]">${parseFloat(record.hours).toFixed(2)}</td>
                    <td class="p-4 text-xs text-gray-600 truncate max-w-[150px]">${record.description || '<span class="italic opacity-50">No description</span>'}</td>
                </tr>
            `;
        }).join('');
    }

    async function quickLogOvertime() {
        const dateInput = document.getElementById('dashOtDate').value;
        const hoursInput = document.getElementById('dashOtHours').value;
        const descInput = document.getElementById('dashOtDesc').value.trim();
        
        if (!dateInput || !hoursInput || hoursInput <= 0) {
            alert("Please enter a valid date and hours.");
            return;
        }

        const btn = document.querySelector('button[onclick="quickLogOvertime()"]');
        const originalText = btn.innerText;
        btn.innerText = "...";
        btn.disabled = true;

        const recordId = Date.now().toString();

        await fetch(`${workerBaseUrl}/overtime`, {
            method: 'POST',
            headers: authHeaders,
            body: JSON.stringify({ 
                action: 'add', 
                id: recordId, 
                work_date: dateInput, 
                hours: hoursInput, 
                description: descInput, 
                created_at: new Date().toISOString() 
            })
        });

        // Clear inputs
        document.getElementById('dashOtHours').value = '';
        document.getElementById('dashOtDesc').value = '';
        
        btn.innerText = originalText;
        btn.disabled = false;

        // Refresh dashboard data
        fetchDashboardData();
    }

    window.onload = () => {
        loadSidebar();
        fetchDashboardData();
    };
</script>
</body>
</html>
