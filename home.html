        .leg-navy { background-color: #002e5d; }
        .live-border { border-left: 8px solid #002e5d; }
        .dead-border { border-left: 8px solid #64748b; opacity: 0.8; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }

<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

    <aside class="leg-navy text-white w-full md:w-28 flex-shrink-0 flex flex-col shadow-2xl z-50 md:h-full no-print">
        <div class="py-6 flex flex-col items-center border-b border-white/10 shrink-0">
            <div class="text-5xl font-serif italic font-black text-transparent bg-clip-text bg-gradient-to-br from-orange-400 to-white drop-shadow-2xl leading-none">L</div>
            <div class="text-[8px] uppercase tracking-[0.2em] text-blue-200 font-bold mt-2 opacity-80">LegiTile</div>
        </div>

        <nav id="mainNav" class="flex-1 px-2 py-6 space-y-3 flex flex-col items-center">
            <a href="home.html" class="nav-item flex flex-col items-center gap-1 w-full py-2 text-blue-200 hover:bg-white/5 hover:text-white rounded-lg transition font-black text-[9px] uppercase tracking-wider text-center">
                <span class="text-lg">🏠</span> Dashboard
            </a>
            <a href="tracker.html" class="nav-item flex flex-col items-center gap-1 w-full py-2 text-blue-200 hover:bg-white/5 hover:text-white rounded-lg transition font-black text-[9px] uppercase tracking-wider text-center">
                <span class="text-lg">📑</span> Bill Tracker
            </a>
        </nav>

        <div class="shrink-0 pb-4 px-2 flex flex-col items-center">
            <div id="sessionTimer" class="flex flex-col items-center mb-4">
                <span class="text-[8px] uppercase tracking-widest text-orange-300/80 font-bold mb-1">Sine Die</span>
                <div class="flex flex-col items-center leading-none">
                    <span id="daysLeft" class="text-2xl font-mono font-black text-white">--</span>
                    <span class="text-[9px] font-bold text-gray-400 uppercase">Days</span>
                </div>
            </div>

            <div class="bg-black/20 rounded-lg p-2 flex flex-col items-center text-center w-full">
                <span id="userEmailDisplay" class="text-[9px] font-bold text-white truncate w-full mb-2"></span>
                <button onclick="logout()" class="w-full bg-red-500/20 hover:bg-red-500/40 text-red-200 text-[9px] font-black uppercase py-1.5 rounded transition border border-red-500/30">Log Out</button>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200">
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Session Overview</h1>
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Dashboard</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">

                <div class="lg:col-span-1 flex flex-col gap-6">

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col flex-1 max-h-[500px]">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Upcoming Meetings</span>
                            <span class="text-[9px] font-bold text-blue-500 animate-pulse">30-DAY WINDOW</span>
                        </div>
                        <div class="space-y-3 overflow-y-auto pr-2" id="meetingList">
                            <span class="text-xs font-bold text-gray-400 italic">Scanning biennium records...</span>
                        </div>
                    </div>

                    <div class="bg-[#002e5d] rounded-xl shadow-md border border-[#001f3f] p-6 flex flex-col justify-center items-center text-center relative overflow-hidden shrink-0">
                        <div class="absolute -top-10 -right-10 w-32 h-32 bg-white opacity-5 rounded-full blur-2xl"></div>
                        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-orange-400 mb-2 z-10">Countdown to Sine Die</span>
                        <div class="text-5xl font-black text-white leading-none tracking-tighter z-10" id="countdownDays">--</div>
                        <span class="text-xs font-bold text-blue-200 mt-1 z-10">Days Remaining</span>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col justify-center shrink-0">
                        <span class="text-[10px] font-black uppercase text-gray-400 mb-4 block">Biennium Bill Volume</span>
                        <div class="flex justify-around items-center">
                            <div class="text-center">
                                <div class="text-3xl font-black text-gray-800" id="houseCount">--</div>
                                <span class="text-[10px] font-bold uppercase text-gray-500">House</span>
                            </div>
                            <div class="h-10 w-px bg-gray-200"></div>
                            <div class="text-center">
                                <div class="text-3xl font-black text-gray-800" id="senateCount">--</div>
                                <span class="text-[10px] font-bold uppercase text-gray-500">Senate</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2 flex flex-col gap-6">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col flex-1 overflow-hidden h-full">
                        <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Tracked Bills Radar</span>
                            <a href="tracker.html" class="text-[10px] font-black uppercase text-[#002e5d] hover:text-blue-700 bg-blue-50 px-3 py-1.5 rounded transition border border-blue-100">Go to Workspace ➔</a>
                        </div>
                        <div class="p-6 overflow-y-auto flex-1">
                            <div class="flex flex-col gap-3" id="recentUpdatesGrid">
                                <div class="text-sm font-bold text-gray-400 italic">Loading radar items...</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

<script>
    if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';
    document.getElementById('userEmailDisplay').innerText = localStorage.getItem('user_email') || 'Staff';

    const workerBaseUrl = "https://misty-credit-9e6a.ewing-jacob.workers.dev";
    const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}` };

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    // Dynamic Navigation Highlighting
    function updateNavHighlight() {
        const path = window.location.pathname;
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            if (path.includes(item.getAttribute('href'))) {
                item.classList.add('bg-white/10', 'text-white');
                item.classList.remove('text-blue-200');
            }
        });
    }

    // Refresh Dashboard every 5 minutes
    updateNavHighlight();
    refreshDashboard();
    setInterval(refreshDashboard, 300000);

    function refreshDashboard() {
        calculateSineDie();
        fetchStats();
        fetchRadar();
        fetchMeetings();
    }

    function calculateSineDie() {
        const sineDieDate = new Date("2026-03-12T23:59:59").getTime();
        const now = new Date().getTime();
        const diffDays = Math.ceil((sineDieDate - now) / (1000 * 60 * 60 * 24)); 
        const display = document.getElementById('countdownDays');
        display.innerText = diffDays < 0 ? "0" : diffDays;
    }

    async function fetchStats() {
        try {
            const res = await fetch(`${workerBaseUrl}/session-stats`, { headers: authHeaders });
            const data = await res.json();
            document.getElementById('houseCount').innerText = data.house.toLocaleString();
            document.getElementById('senateCount').innerText = data.senate.toLocaleString();
        } catch (e) {}
    }

    async function fetchRadar() {
        try {
            const res = await fetch(`${workerBaseUrl}/my-workspace`, { headers: authHeaders });
            const bills = await res.json();
            const grid = document.getElementById('recentUpdatesGrid');
            grid.innerHTML = '';

            if (bills.length === 0) {
                grid.innerHTML = '<div class="text-gray-400 text-xs italic">Workspace is empty.</div>';
                return;
            }

            bills.forEach(item => {
                const isDead = item.status === 'Dead';
                grid.innerHTML += `
                    <div class="border ${isDead ? 'border-gray-200 bg-gray-50 grayscale' : 'border-blue-100 bg-white hover:border-[#002e5d]'} rounded-lg p-4 shadow-sm hover:shadow-md transition cursor-pointer flex flex-col sm:flex-row sm:items-center gap-4" onclick="window.location.href='tracker.html'">
                        <div class="w-24 shrink-0">
                            <span class="text-lg font-black text-[#002e5d] block leading-tight">${item.bill_number}</span>
                            <span class="text-[9px] font-black uppercase px-2 py-0.5 rounded ${isDead ? 'bg-gray-200 text-gray-600' : 'bg-orange-100 text-orange-800'} inline-block mt-1">${item.status}</span>
                        </div>
                        <div class="text-sm font-bold text-gray-600 line-clamp-2 flex-1">${item.short_desc}</div>
                    </div>`;
            });
        } catch (e) {}
    }

    async function fetchMeetings() {
        const list = document.getElementById('meetingList');
        const now = new Date();
        const fortyFiveDaysFromNow = new Date();
        fortyFiveDaysFromNow.setDate(now.getDate() + 45);

        try {
            const res = await fetch(`${workerBaseUrl}/upcoming-meetings`, { headers: authHeaders });
            const xmlText = await res.text();
            const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");

            // BULLETPROOF: Use querySelectorAll to ignore namespaces
            const cm = Array.from(xmlDoc.querySelectorAll('CommitteeMeeting'));
            const fa = Array.from(xmlDoc.querySelectorAll('FloorAction'));
            const allItems = [...cm, ...fa];

            if (allItems.length === 0) {
                list.innerHTML = '<div class="text-xs font-bold text-gray-400 italic">No meetings scheduled.</div>';
                return;
            }

            const seen = new Set();
            const filteredItems = allItems.map(node => {
                const get = (t) => node.querySelector(t)?.textContent.trim() || "";
                return {
                    agency: get("Agency"),
                    name: get("Name") || get("LongName"),
                    date: new Date(get("Date")),
                    room: get("Room") || "Chamber Floor",
                    key: `${get("Agency")}-${get("Name")}-${get("Date")}`
                };
            }).filter(item => {
                const isUpcoming = item.date >= now && item.date <= fortyFiveDaysFromNow;
                if (!isUpcoming || seen.has(item.key)) return false;
                seen.add(item.key);
                return true;
            }).sort((a, b) => a.date - b.date);

            list.innerHTML = '';
            let lastDateLabel = "";

            filteredItems.forEach(item => {
                const dateLabel = item.date.toLocaleDateString([], { month: 'long', day: 'numeric' }).toUpperCase();
                if (dateLabel !== lastDateLabel) {
                    list.innerHTML += `<div class="text-[9px] font-black text-gray-400 tracking-widest mt-4 mb-2 border-b border-gray-100 pb-1">${dateLabel}</div>`;
                    lastDateLabel = dateLabel;
                }

                const timeStr = item.date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                let color = "bg-gray-400";
                const ag = item.agency.toLowerCase();
                const nm = item.name.toLowerCase();

                if (ag.includes("senate")) color = "bg-red-500";
                else if (ag.includes("house")) color = "bg-green-500";
                else if (ag.includes("joint") || nm.includes("jlarc")) color = "bg-blue-600";

                let displayName = item.name;
                if (displayName.includes("Convened")) displayName = "Floor Session";

                list.innerHTML += `
                    <div class="flex items-center gap-3 py-2">
                        <div class="w-2 h-2 rounded-full ${color} shrink-0"></div>
                        <div class="flex-1 min-w-0">
                            <div class="text-[11px] font-black text-[#002e5d] truncate uppercase">${item.agency} ${displayName}</div>
                            <div class="text-[9px] font-bold text-gray-500 truncate mt-0.5">${timeStr} • ${item.room}</div>
                        </div>
                    </div>`;
            });
        } catch (e) {
            list.innerHTML = '<div class="text-xs font-bold text-red-400">Failed to sync schedule.</div>';
        }
    }
</script>
</body>
</html>
