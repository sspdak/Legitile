name: Update Washington State Bills

on:
  schedule:
    # Runs at 10:00 UTC (roughly 2:00 AM PST) every day
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  sync_database:
    runs-on: ubuntu-latest
    # This suppresses the Node.js 20 deprecation warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          # pip install wa-leg-api  <-- Uncomment if using the wrapper

      - name: Run ingestion script
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: python update_bills.py
