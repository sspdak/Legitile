    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        .leg-navy { background-color: #002e5d; }
        .sortable-ghost { opacity: 0.4; background-color: #eff6ff; border: 2px dashed #93c5fd; }

<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

    <div id="sidebar-container" class="flex-shrink-0 w-full md:w-28 md:h-full z-50"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200">
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Tasks</h1>
            <p class="text-xs text-gray-500 font-bold mt-1">General action items and daily planning.</p>
        </header>

        <main class="flex-1 overflow-y-auto xl:overflow-hidden p-4 md:p-6 lg:p-10">
            <div class="flex flex-col xl:flex-row gap-6 xl:gap-8 max-w-[1600px] mx-auto min-h-max xl:h-full">
                
                <div class="w-full xl:w-1/2 flex flex-col h-[600px] xl:h-full bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden shrink-0">
                    <div class="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center shrink-0">
                        <h2 class="text-[10px] font-black uppercase tracking-widest text-gray-400">Today's Schedule</h2>
                        <span class="text-xs font-bold text-[#002e5d]" id="scheduleDateLabel"></span>
                    </div>
                    <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50" id="timelineContainer">
                        </div>
                </div>

                <div class="w-full xl:w-1/2 flex flex-col h-[700px] xl:h-full shrink-0">
                    
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-6 shrink-0 flex flex-col sm:flex-row gap-3">
                        <input 
                            type="text" 
                            id="taskInput" 
                            placeholder="What needs to be done?" 
                            class="flex-1 bg-gray-50 border border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] transition font-bold text-gray-700"
                        >
                        <div class="flex gap-3">
                            <input 
                                type="date" 
                                id="dueDateInput" 
                                class="bg-gray-50 border border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] transition text-sm text-gray-600 font-bold cursor-pointer"
                                title="Optional Due Date"
                            >
                            <button 
                                onclick="addTask()" 
                                class="bg-[#002e5d] hover:bg-[#001f3f] text-white text-[12px] font-black uppercase px-8 py-3 rounded-lg shadow-sm transition"
                            >
                                Add
                            </button>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden flex-1 mb-6">
                        <div class="p-4 border-b border-gray-100 bg-gray-50 shrink-0">
                            <h2 class="text-[10px] font-black uppercase tracking-widest text-gray-400">Unscheduled Tasks</h2>
                        </div>
                        <div class="flex-1 overflow-y-auto p-4">
                            <div id="taskList" class="space-y-4 min-h-[100px] pb-10">
                                <div class="text-center text-gray-400 text-sm font-bold italic py-10 animate-pulse">Loading tasks from database...</div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden shrink-0">
                        <button onclick="toggleCompletedTile()" class="p-4 bg-gray-50 flex justify-between items-center w-full focus:outline-none hover:bg-gray-100 transition">
                            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Completed Tasks</span>
                            <span id="completedTileIcon" class="text-[10px] font-bold text-gray-400 transition-transform duration-200">▼</span>
                        </button>
                        <div id="completedTileContent" class="hidden p-4 overflow-y-auto max-h-[300px] bg-gray-50/50 space-y-3 border-t border-gray-100">
                            </div>
                    </div>

                </div>

            </div>
        </main>
    </div>

    <script>
        if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';

        const workerBaseUrl = "https://misty-credit-9e6a.ewing-jacob.workers.dev";
        const authHeaders = { 
            'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`, 
            'Content-Type': 'application/json' 
        };
        
        let tasks = [];
        let sortables = [];
        let expandedTasks = new Set(); // Tracks which tasks have their subtasks expanded

        async function loadSidebar() {
            try {
                const response = await fetch('sidebar.html');
                if (response.ok) {
                    document.getElementById('sidebar-container').innerHTML = await response.text();
                    
                    const emailDisplay = document.getElementById('userEmailDisplay');
                    if (emailDisplay) {
                        emailDisplay.innerText = localStorage.getItem('user_email') || 'Unknown User';
                    }

                    const path = window.location.pathname;
                    document.querySelectorAll('.nav-item').forEach(item => {
                        if (path.includes(item.getAttribute('href'))) {
                            item.classList.add('bg-white/10', 'text-white');
                            item.classList.remove('text-blue-200');
                        }
                    });
                }
            } catch (error) { console.error("Sidebar failed to load."); }
        }

        function buildTimeline() {
            const timeline = document.getElementById('timelineContainer');
            document.getElementById('scheduleDateLabel').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            timeline.innerHTML = '';

            for(let hour = 7; hour <= 18; hour++) {
                const displayHour = hour > 12 ? hour - 12 : hour;
                const ampm = hour >= 12 ? 'PM' : 'AM';
                const timeStr = `${displayHour} ${ampm}`;
                const timeKey = `${hour.toString().padStart(2, '0')}:00`;

                timeline.innerHTML += `
                    <div class="flex border border-gray-200 rounded-lg bg-white overflow-hidden shadow-sm">
                        <div class="bg-gray-50 w-20 flex-shrink-0 flex items-center justify-center border-r border-gray-100 text-xs font-black text-gray-500 uppercase tracking-wider">
                            ${timeStr}
                        </div>
                        <div class="flex-1 p-2 time-block-zone space-y-2 bg-white transition-colors" data-time="${timeKey}" id="block-${timeKey}">
                            </div>
                    </div>
                `;
            }
        }

        function toggleCompletedTile() {
            const content = document.getElementById('completedTileContent');
            const icon = document.getElementById('completedTileIcon');
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                content.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        async function fetchTasks() {
            try {
                const res = await fetch(`${workerBaseUrl}/todos`, { headers: authHeaders });
                if (!res.ok) throw new Error("Failed to authenticate or fetch data.");
                const rawTasks = await res.json();
                
                tasks = rawTasks.map(t => ({
                    ...t,
                    subtasks: typeof t.subtasks === 'string' ? JSON.parse(t.subtasks) : (t.subtasks || [])
                }));
                
                renderTasks();
            } catch (e) {
                document.getElementById('taskList').innerHTML = `<div class="text-center text-red-500 text-sm font-bold py-10">Error loading tasks: ${e.message}</div>`;
            }
        }

        function toggleSubtaskList(taskId, event) {
            if(event) event.stopPropagation();
            if (expandedTasks.has(taskId)) {
                expandedTasks.delete(taskId);
            } else {
                expandedTasks.add(taskId);
            }
            renderTasks();
        }

        function renderTasks() {
            const pendingContainer = document.getElementById('taskList');
            const completedContainer = document.getElementById('completedTileContent');
            
            pendingContainer.innerHTML = '';
            completedContainer.innerHTML = '';
            document.querySelectorAll('.time-block-zone').forEach(zone => zone.innerHTML = '');

            const pendingTasks = tasks.filter(t => t.completed !== 1);
            const completedTasks = tasks.filter(t => t.completed === 1);

            if (pendingTasks.length === 0) {
                pendingContainer.innerHTML = `<div class="text-center text-gray-400 text-sm font-bold italic py-10">All caught up! No active tasks.</div>`;
            }

            if (completedTasks.length === 0) {
                completedContainer.innerHTML = `<div class="text-center text-gray-400 text-xs font-bold italic py-4">No completed tasks yet.</div>`;
            }

            const todayStr = new Date().toISOString().split('T')[0];
            let schedule = JSON.parse(localStorage.getItem('legitile_schedule') || '{}');
            let todaySchedule = schedule[todayStr] || {};

            tasks.forEach(task => {
                const isTaskScheduled = !!todaySchedule[task.id];
                const blockElement = document.getElementById(`block-${todaySchedule[task.id]}`);
                const isCompleted = task.completed === 1;
                const isExpanded = expandedTasks.has(task.id);
                
                const scheduledSubtasks = [];
                const unscheduledSubtasks = [];

                if (task.subtasks) {
                    task.subtasks.forEach(sub => {
                        if (todaySchedule[sub.id] && !sub.completed && document.getElementById(`block-${todaySchedule[sub.id]}`)) {
                            scheduledSubtasks.push(sub);
                        } else {
                            unscheduledSubtasks.push(sub);
                        }
                    });
                }

                const bgClass = isCompleted ? 'bg-gray-50 opacity-60' : 'bg-white';
                const textClass = isCompleted ? 'line-through text-gray-400' : 'text-gray-800';
                
                const dragHandleHtml = isCompleted ? `<div class="w-6 shrink-0"></div>` : `
                    <div class="drag-handle cursor-grab hover:text-[#002e5d] text-gray-300 pt-1.5 px-1 transition-colors">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M4 4h2v2H4zm0 5h2v2H4zm0 5h2v2H4zm5-10h2v2H9zm0 5h2v2H9zm0 5h2v2H9z"/>
                        </svg>
                    </div>
                `;
                
                let dueDateHtml = '';
                if (task.due_date) {
                    const dateParts = task.due_date.split('-');
                    const dateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]); 
                    const shortDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    const badgeColor = isCompleted ? 'bg-gray-200 text-gray-500' : 'bg-orange-100 text-orange-700 border border-orange-200';
                    dueDateHtml = `<span class="ml-3 text-[10px] font-black uppercase tracking-wide px-2 py-0.5 rounded ${badgeColor}">Due: ${shortDate}</span>`;
                }

                let subtaskToggleHtml = '';
                if (unscheduledSubtasks.length > 0) {
                    subtaskToggleHtml = `
                        <button onclick="toggleSubtaskList('${task.id}', event)" class="mt-2 text-[10px] font-black uppercase text-gray-500 hover:text-[#002e5d] transition bg-gray-50 hover:bg-gray-100 px-2 py-1 rounded border border-gray-200 flex items-center gap-1 focus:outline-none">
                            ${unscheduledSubtasks.length} Subtasks <span class="text-[8px]">${isExpanded ? '▲' : '▼'}</span>
                        </button>
                    `;
                }

                let subtasksHtml = `<div class="${isExpanded ? 'block' : 'hidden'} space-y-2 mt-3 w-full pl-12 subtask-list-zone min-h-[20px] pb-2" data-parent-id="${task.id}">`;
                if (unscheduledSubtasks.length > 0) {
                    subtasksHtml += unscheduledSubtasks.map(sub => `
                        <div class="flex items-center gap-3 group bg-white border border-gray-100 p-2 rounded shadow-sm" data-id="${sub.id}" data-is-subtask="true" data-parent-id="${task.id}">
                            ${sub.completed ? '<div class="w-4 shrink-0"></div>' : '<div class="drag-handle cursor-grab text-gray-300 hover:text-gray-500"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 16 16"><path d="M4 4h2v2H4zm0 5h2v2H4zm0 5h2v2H4zm5-10h2v2H9zm0 5h2v2H9zm0 5h2v2H9z"/></svg></div>'}
                            <input type="checkbox" ${sub.completed ? 'checked' : ''} onchange="toggleSubtask('${task.id}', '${sub.id}')" class="h-4 w-4 text-[#002e5d] rounded border-gray-300 cursor-pointer">
                            <span class="text-sm font-bold flex-1 ${sub.completed ? 'text-gray-400 line-through' : 'text-gray-600'}">${sub.text}</span>
                            <button onclick="deleteSubtask('${task.id}', '${sub.id}')" class="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition px-2">×</button>
                        </div>
                    `).join('');
                }
                subtasksHtml += `</div>`;

                const subtaskInputHtml = `
                    <div id="subtaskInputContainer_${task.id}" class="hidden pl-12 mt-1 pt-3 border-t border-gray-100 w-full">
                        <div class="flex gap-2 w-full">
                            <input type="text" id="subtaskInput_${task.id}" placeholder="Add subtask..." class="text-xs font-bold text-gray-600 p-2 border border-gray-200 rounded flex-1 outline-none focus:border-[#002e5d]" onkeypress="if(event.key === 'Enter') addSubtask('${task.id}')">
                            <button onclick="addSubtask('${task.id}')" class="bg-gray-100 hover:bg-gray-200 border border-gray-200 text-gray-600 px-4 py-1.5 rounded text-[10px] uppercase font-black transition outline-none">Add</button>
                        </div>
                    </div>
                `;

                const taskDiv = document.createElement('div');
                taskDiv.setAttribute('data-id', task.id);
                taskDiv.setAttribute('data-is-subtask', 'false');
                taskDiv.className = `flex flex-col p-4 border border-gray-200 rounded-xl shadow-sm transition-all duration-200 ${bgClass}`;
                if (isCompleted) taskDiv.classList.add('ignore-drag'); 
                
                taskDiv.innerHTML = `
                    <div class="flex items-start justify-between w-full">
                        <div class="flex items-start gap-3 flex-1">
                            ${dragHandleHtml}
                            <input 
                                type="checkbox" 
                                ${isCompleted ? 'checked' : ''} 
                                onchange="toggleTask('${task.id}', ${isCompleted})" 
                                class="mt-1.5 w-5 h-5 text-[#002e5d] bg-gray-100 border-gray-300 rounded cursor-pointer transition shrink-0"
                            >
                            <div class="flex-1 pt-0.5">
                                <div class="font-bold text-[15px] ${textClass}">
                                    ${task.text} ${dueDateHtml}
                                </div>
                                <div class="flex items-center gap-3">
                                    <div class="text-[10px] text-gray-400 font-bold mt-1">Created: ${task.created_at}</div>
                                </div>
                                ${subtaskToggleHtml}
                            </div>
                        </div>
                        <div class="flex items-center gap-1 ml-4 shrink-0">
                            <button onclick="toggleSubtaskInput('${task.id}')" class="text-[9px] font-black uppercase text-gray-400 hover:text-[#002e5d] bg-transparent hover:bg-blue-50 transition px-3 py-1.5 rounded border border-transparent hover:border-blue-100 focus:outline-none">
                                + Subtask
                            </button>
                            <button onclick="deleteTask('${task.id}')" class="text-gray-300 hover:text-red-500 p-1.5 rounded transition-colors focus:outline-none" title="Delete task">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                    ${subtasksHtml}
                    ${subtaskInputHtml}
                `;
                
                if (isCompleted) {
                    completedContainer.appendChild(taskDiv);
                } else if (isTaskScheduled && blockElement) {
                    blockElement.appendChild(taskDiv);
                } else {
                    pendingContainer.appendChild(taskDiv);
                }

                scheduledSubtasks.forEach(sub => {
                    const subDiv = document.createElement('div');
                    subDiv.setAttribute('data-id', sub.id);
                    subDiv.setAttribute('data-is-subtask', 'true');
                    subDiv.setAttribute('data-parent-id', task.id);
                    subDiv.className = `flex items-center gap-3 group bg-white border border-gray-200 p-2 rounded shadow-sm border-l-4 border-l-[#002e5d]`;
                    
                    subDiv.innerHTML = `
                        <div class="drag-handle cursor-grab text-gray-300 hover:text-[#002e5d]">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 16 16"><path d="M4 4h2v2H4zm0 5h2v2H4zm0 5h2v2H4zm5-10h2v2H9zm0 5h2v2H9zm0 5h2v2H9z"/></svg>
                        </div>
                        <input type="checkbox" onchange="toggleSubtask('${task.id}', '${sub.id}')" class="h-4 w-4 text-[#002e5d] rounded border-gray-300 cursor-pointer">
                        <div class="flex-1 flex flex-col">
                            <span class="text-[9px] font-black uppercase text-gray-400 tracking-widest leading-none mb-0.5">Subtask of: ${task.text.substring(0,25)}${task.text.length > 25 ? '...' : ''}</span>
                            <span class="text-sm font-bold text-gray-800 leading-tight">${sub.text}</span>
                        </div>
                        <button onclick="deleteSubtask('${task.id}', '${sub.id}')" class="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition px-2 focus:outline-none">×</button>
                    `;
                    document.getElementById(`block-${todaySchedule[sub.id]}`).appendChild(subDiv);
                });
            });

            initSortable();
        }

        function initSortable() {
            sortables.forEach(s => s.destroy());
            sortables = [];

            const commonOptions = {
                animation: 150,
                ghostClass: 'sortable-ghost',
                filter: '.ignore-drag',
                handle: '.drag-handle',
                onEnd: async function (evt) {
                    const el = evt.item;
                    const toEl = evt.to;
                    const id = el.getAttribute('data-id');
                    const isSubtask = el.getAttribute('data-is-subtask') === 'true';

                    const todayStr = new Date().toISOString().split('T')[0];
                    let schedule = JSON.parse(localStorage.getItem('legitile_schedule') || '{}');
                    if (!schedule[todayStr]) schedule[todayStr] = {};

                    if (toEl.classList.contains('time-block-zone')) {
                        schedule[todayStr][id] = toEl.getAttribute('data-time');
                        localStorage.setItem('legitile_schedule', JSON.stringify(schedule));
                    } else {
                        if (schedule[todayStr][id]) {
                            delete schedule[todayStr][id];
                            localStorage.setItem('legitile_schedule', JSON.stringify(schedule));
                        }

                        if (!isSubtask && toEl.id === 'taskList') {
                            const listItems = Array.from(toEl.children);
                            const newOrderIds = listItems.map(li => li.getAttribute('data-id')).filter(i => i !== null);
                            tasks.sort((a, b) => newOrderIds.indexOf(a.id) - newOrderIds.indexOf(b.id));

                            await fetch(`${workerBaseUrl}/todos`, {
                                method: 'POST',
                                headers: authHeaders,
                                body: JSON.stringify({ action: 'reorder', taskIds: newOrderIds })
                            });
                        }

                        if (isSubtask && toEl.classList.contains('subtask-list-zone')) {
                            const parentId = toEl.getAttribute('data-parent-id');
                            const parentTask = tasks.find(t => t.id === parentId);
                            const listItems = Array.from(toEl.children);
                            const newOrderIds = listItems.map(li => li.getAttribute('data-id')).filter(i => i !== null);
                            
                            parentTask.subtasks.sort((a, b) => newOrderIds.indexOf(a.id) - newOrderIds.indexOf(b.id));
                            await syncSubtasks(parentId);
                        }
                    }
                    renderTasks();
                }
            };

            const mainList = document.getElementById('taskList');
            if (mainList) {
                sortables.push(new Sortable(mainList, {
                    ...commonOptions,
                    group: { name: 'tasks', put: (to, from, dragEl) => dragEl.getAttribute('data-is-subtask') === 'false' }
                }));
            }

            document.querySelectorAll('.time-block-zone').forEach(zone => {
                sortables.push(new Sortable(zone, {
                    ...commonOptions,
                    group: { name: 'timeline', put: true }
                }));
            });

            document.querySelectorAll('.subtask-list-zone').forEach(zone => {
                sortables.push(new Sortable(zone, {
                    ...commonOptions,
                    group: { 
                        name: 'subtasks', 
                        put: (to, from, dragEl) => dragEl.getAttribute('data-is-subtask') === 'true' && dragEl.getAttribute('data-parent-id') === to.el.getAttribute('data-parent-id')
                    }
                }));
            });
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            const dateInput = document.getElementById('dueDateInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            const now = new Date();
            const formattedDate = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const taskId = Date.now().toString();

            tasks.unshift({
                id: taskId,
                text: text,
                due_date: dateInput.value,
                created_at: formattedDate,
                completed: 0,
                subtasks: []
            });
            renderTasks();

            input.value = '';
            dateInput.value = '';
            input.focus();

            await fetch(`${workerBaseUrl}/todos`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({ action: 'add', id: taskId, text: text, dueDate: dateInput.value, createdAt: formattedDate })
            });
        }

        async function toggleTask(id, currentStatus) {
            const newStatus = currentStatus ? 0 : 1;
            const taskIndex = tasks.findIndex(t => t.id === id);
            
            if (taskIndex > -1) {
                tasks[taskIndex].completed = newStatus;
                
                if (newStatus === 1) {
                    const todayStr = new Date().toISOString().split('T')[0];
                    let schedule = JSON.parse(localStorage.getItem('legitile_schedule') || '{}');
                    if (schedule[todayStr] && schedule[todayStr][id]) {
                        delete schedule[todayStr][id];
                        localStorage.setItem('legitile_schedule', JSON.stringify(schedule));
                    }
                }

                tasks.sort((a, b) => a.completed - b.completed || b.id - a.id);
                renderTasks();
            }

            await fetch(`${workerBaseUrl}/todos`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({ action: 'toggle', id: id, completed: newStatus === 1 })
            });
        }

        async function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            
            const todayStr = new Date().toISOString().split('T')[0];
            let schedule = JSON.parse(localStorage.getItem('legitile_schedule') || '{}');
            if (schedule[todayStr] && schedule[todayStr][id]) {
                delete schedule[todayStr][id];
                localStorage.setItem('legitile_schedule', JSON.stringify(schedule));
            }

            renderTasks();

            await fetch(`${workerBaseUrl}/todos`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({ action: 'delete', id: id })
            });
        }

        function toggleSubtaskInput(taskId) {
            const container = document.getElementById(`subtaskInputContainer_${taskId}`);
            const input = document.getElementById(`subtaskInput_${taskId}`);
            
            if (container.classList.contains('hidden')) {
                expandedTasks.add(taskId); // Auto-expand the list so they can see the input
                renderTasks(); // Re-render to show expansion
                // After re-render, grab the newly unhidden elements to focus
                document.getElementById(`subtaskInputContainer_${taskId}`).classList.remove('hidden');
                document.getElementById(`subtaskInput_${taskId}`).focus();
            } else {
                container.classList.add('hidden');
            }
        }

        async function addSubtask(taskId) {
            const input = document.getElementById(`subtaskInput_${taskId}`);
            const text = input.value.trim();
            if (!text) return;

            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            task.subtasks.push({
                id: Date.now().toString(),
                text: text,
                completed: false
            });
            
            task.subtasks.sort((a, b) => a.completed - b.completed);
            
            expandedTasks.add(taskId); // Ensure expanded when adding
            renderTasks();
            
            const container = document.getElementById(`subtaskInputContainer_${taskId}`);
            container.classList.remove('hidden');
            document.getElementById(`subtaskInput_${taskId}`).focus();
            
            await syncSubtasks(taskId);
        }

        async function toggleSubtask(taskId, subtaskId) {
            const task = tasks.find(t => t.id === taskId);
            const subtask = task.subtasks.find(s => s.id === subtaskId);
            subtask.completed = !subtask.completed;
            
            if (subtask.completed) {
                const todayStr = new Date().toISOString().split('T')[0];
                let schedule = JSON.parse(localStorage.getItem('legitile_schedule') || '{}');
                if (schedule[todayStr] && schedule[todayStr][subtaskId]) {
                    delete schedule[todayStr][subtaskId];
                    localStorage.setItem('legitile_schedule', JSON.stringify(schedule));
                }
            }

            task.subtasks.sort((a, b) => a.completed - b.completed);
            expandedTasks.add(taskId); // Keep it open if they are interacting with it
            renderTasks();
            await syncSubtasks(taskId);
        }

        async function deleteSubtask(taskId, subtaskId) {
            const task = tasks.find(t => t.id === taskId);
            task.subtasks = task.subtasks.filter(s => s.id !== subtaskId);
            
            const todayStr = new Date().toISOString().split('T')[0];
            let schedule = JSON.parse(localStorage.getItem('legitile_schedule') || '{}');
            if (schedule[todayStr] && schedule[todayStr][subtaskId]) {
                delete schedule[todayStr][subtaskId];
                localStorage.setItem('legitile_schedule', JSON.stringify(schedule));
            }

            expandedTasks.add(taskId); // Keep list open
            renderTasks();
            await syncSubtasks(taskId);
        }

        async function syncSubtasks(taskId) {
            const task = tasks.find(t => t.id === taskId);
            await fetch(`${workerBaseUrl}/todos`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({
                    action: 'update_subtasks',
                    id: taskId,
                    subtasks: task.subtasks
                })
            });
        }

        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });

        window.onload = () => {
            buildTimeline();
            loadSidebar();
            fetchTasks();
        };
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>
</body>
