<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legitile | Tasks</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIiBmaWxsPSIjMDAyZTVkIi8+PGRlZnM+PGxpbmVhckdyYWRpZW50IGlkPSJnIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj48c3RvcCBvZmZzZXQ9IjAlIiBzdG9wLWNvbG9yPSIjZmI5MjNjIi8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdG9wLWNvbG9yPSIjZmZmZmZmIi8+PC9saW5lYXJHcmFkaWVudD48L2RlZnM+PHRleHQgeD0iNTAiIHk9Ijc1IiBmb250LWZhbWlseT0ic2VyaWYiIGZvbnQtc3R5bGU9Iml0YWxpYyIgZm9udC13ZWlnaHQ9IjkwMCIgZm9udC1zaXplPSI3NSIgZmlsbD0idXJsKCNnKSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+TDwvdGV4dD48L3N2Zz4=">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        .leg-navy { background-color: #002e5d; }
        /* Styling for the task being dragged */
        .sortable-ghost { opacity: 0.4; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

    <div id="sidebar-container" class="flex-shrink-0 w-full md:w-28 md:h-full z-50"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200">
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Tasks</h1>
            <p class="text-xs text-gray-500 font-bold mt-1">General action items and reminders.</p>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
            <div class="max-w-4xl mx-auto">
                
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-8 flex flex-col sm:flex-row gap-3">
                    <input 
                        type="text" 
                        id="taskInput" 
                        placeholder="What needs to be done?" 
                        class="flex-1 bg-gray-50 border border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] transition font-bold text-gray-700"
                    >
                    <div class="flex gap-3">
                        <input 
                            type="date" 
                            id="dueDateInput" 
                            class="bg-gray-50 border border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] transition text-sm text-gray-600 font-bold cursor-pointer"
                            title="Optional Due Date"
                        >
                        <button 
                            onclick="addTask()" 
                            class="bg-[#002e5d] hover:bg-[#001f3f] text-white text-[12px] font-black uppercase px-8 py-3 rounded-lg shadow-sm transition"
                        >
                            Add
                        </button>
                    </div>
                </div>

                <ul id="taskList" class="space-y-4 pb-20">
                    <div class="text-center text-gray-400 text-sm font-bold italic py-10 animate-pulse">Loading tasks from database...</div>
                </ul>
            </div>
        </main>
    </div>

    <script>
        if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';

        const workerBaseUrl = "https://misty-credit-9e6a.ewing-jacob.workers.dev";
        const authHeaders = { 
            'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`, 
            'Content-Type': 'application/json' 
        };
        
        let tasks = [];
        let sortableInstance = null;

        async function loadSidebar() {
            try {
                const response = await fetch('sidebar.html');
                if (response.ok) {
                    document.getElementById('sidebar-container').innerHTML = await response.text();
                    
                    const emailDisplay = document.getElementById('userEmailDisplay');
                    if (emailDisplay) {
                        emailDisplay.innerText = localStorage.getItem('user_email') || 'Unknown User';
                    }

                    const path = window.location.pathname;
                    document.querySelectorAll('.nav-item').forEach(item => {
                        if (path.includes(item.getAttribute('href'))) {
                            item.classList.add('bg-white/10', 'text-white');
                            item.classList.remove('text-blue-200');
                        }
                    });
                }
            } catch (error) { console.error("Sidebar failed to load."); }
        }

        async function fetchTasks() {
            try {
                const res = await fetch(`${workerBaseUrl}/todos`, { headers: authHeaders });
                if (!res.ok) throw new Error("Failed to authenticate or fetch data.");
                const rawTasks = await res.json();
                
                tasks = rawTasks.map(t => ({
                    ...t,
                    subtasks: typeof t.subtasks === 'string' ? JSON.parse(t.subtasks) : (t.subtasks || [])
                }));
                
                renderTasks();
            } catch (e) {
                document.getElementById('taskList').innerHTML = `<div class="text-center text-red-500 text-sm font-bold py-10">Error loading tasks: ${e.message}</div>`;
            }
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            if (tasks.length === 0) {
                list.innerHTML = `<div class="text-center text-gray-400 text-sm font-bold italic py-10">All caught up! No active tasks.</div>`;
                return;
            }

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.setAttribute('data-id', task.id); // Crucial for drag and drop to know which task moved
                
                const isCompleted = task.completed === 1;
                
                const bgClass = isCompleted ? 'bg-gray-50 opacity-60' : 'bg-white';
                const textClass = isCompleted ? 'line-through text-gray-400' : 'text-gray-800';
                
                // Only show drag handle if task is NOT completed
                const dragHandleHtml = isCompleted ? `<div class="w-6 shrink-0"></div>` : `
                    <div class="drag-handle cursor-grab hover:text-[#002e5d] text-gray-300 pt-1.5 px-1 transition-colors">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M4 4h2v2H4zm0 5h2v2H4zm0 5h2v2H4zm5-10h2v2H9zm0 5h2v2H9zm0 5h2v2H9z"/>
                        </svg>
                    </div>
                `;
                
                let dueDateHtml = '';
                if (task.due_date) {
                    const dateParts = task.due_date.split('-');
                    const dateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]); 
                    const shortDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    const badgeColor = isCompleted ? 'bg-gray-200 text-gray-500' : 'bg-orange-100 text-orange-700 border border-orange-200';
                    dueDateHtml = `<span class="ml-3 text-[10px] font-black uppercase tracking-wide px-2 py-0.5 rounded ${badgeColor}">Due: ${shortDate}</span>`;
                }

                const createdHtml = `<div class="text-[10px] text-gray-400 font-bold mt-1">Created: ${task.created_at}</div>`;

                let subtasksHtml = '';
                if (task.subtasks && task.subtasks.length > 0) {
                    subtasksHtml = `<ul class="space-y-2 mt-3 w-full pl-12">` + task.subtasks.map(sub => `
                        <li class="flex items-center gap-3 group">
                            <input type="checkbox" ${sub.completed ? 'checked' : ''} onchange="toggleSubtask('${task.id}', '${sub.id}')" class="h-4 w-4 text-[#002e5d] rounded border-gray-300 cursor-pointer">
                            <span class="text-sm font-bold flex-1 ${sub.completed ? 'text-gray-400 line-through' : 'text-gray-600'}">${sub.text}</span>
                            <button onclick="deleteSubtask('${task.id}', '${sub.id}')" class="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition px-2">×</button>
                        </li>
                    `).join('') + `</ul>`;
                }

                const subtaskInputHtml = `
                    <div id="subtaskInputContainer_${task.id}" class="hidden pl-12 mt-3 pt-3 border-t border-gray-100 w-full">
                        <div class="flex gap-2 w-full">
                            <input type="text" id="subtaskInput_${task.id}" placeholder="Add subtask..." class="text-xs font-bold text-gray-600 p-2 border border-gray-200 rounded flex-1 outline-none focus:border-[#002e5d]" onkeypress="if(event.key === 'Enter') addSubtask('${task.id}')">
                            <button onclick="addSubtask('${task.id}')" class="bg-gray-100 hover:bg-gray-200 border border-gray-200 text-gray-600 px-4 py-1.5 rounded text-[10px] uppercase font-black transition outline-none">Add</button>
                        </div>
                    </div>
                `;

                li.className = `flex flex-col p-4 border border-gray-200 rounded-xl shadow-sm transition-all duration-200 ${bgClass}`;
                if (isCompleted) li.classList.add('ignore-drag'); // Tell SortableJS not to drag this
                
                li.innerHTML = `
                    <div class="flex items-start justify-between w-full">
                        <div class="flex items-start gap-3 flex-1">
                            ${dragHandleHtml}
                            <input 
                                type="checkbox" 
                                ${isCompleted ? 'checked' : ''} 
                                onchange="toggleTask('${task.id}', ${isCompleted})" 
                                class="mt-1.5 w-5 h-5 text-[#002e5d] bg-gray-100 border-gray-300 rounded cursor-pointer transition shrink-0"
                            >
                            <div class="flex-1 pt-0.5">
                                <div class="font-bold text-[15px] ${textClass}">
                                    ${task.text} ${dueDateHtml}
                                </div>
                                ${createdHtml}
                            </div>
                        </div>
                        <div class="flex items-center gap-1 ml-4 shrink-0">
                            <button onclick="toggleSubtaskInput('${task.id}')" class="text-[9px] font-black uppercase text-gray-400 hover:text-[#002e5d] bg-transparent hover:bg-blue-50 transition px-3 py-1.5 rounded border border-transparent hover:border-blue-100">
                                + Subtask
                            </button>
                            <button 
                                onclick="deleteTask('${task.id}')" 
                                class="text-gray-300 hover:text-red-500 p-1.5 rounded transition-colors"
                                title="Delete task"
                            >
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                    ${subtasksHtml}
                    ${subtaskInputHtml}
                `;
                list.appendChild(li);
            });

            // Re-initialize SortableJS after rendering
            initSortable();
        }

        function initSortable() {
            const list = document.getElementById('taskList');
            if (sortableInstance) {
                sortableInstance.destroy();
            }
            sortableInstance = new Sortable(list, {
                handle: '.drag-handle', // Only grab via the icon
                animation: 150,
                ghostClass: 'sortable-ghost',
                filter: '.ignore-drag', // Don't allow completed items to be dragged
                onEnd: async function () {
                    // Extract the new order of IDs from the DOM
                    const listItems = Array.from(list.children);
                    const newOrderIds = listItems.map(li => li.getAttribute('data-id')).filter(id => id !== null);

                    // Re-sort the local array silently
                    tasks.sort((a, b) => newOrderIds.indexOf(a.id) - newOrderIds.indexOf(b.id));

                    // Send the new sequence to the database
                    await fetch(`${workerBaseUrl}/todos`, {
                        method: 'POST',
                        headers: authHeaders,
                        body: JSON.stringify({ action: 'reorder', taskIds: newOrderIds })
                    });
                }
            });
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            const dateInput = document.getElementById('dueDateInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            const now = new Date();
            const formattedDate = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const taskId = Date.now().toString();

            tasks.unshift({
                id: taskId,
                text: text,
                due_date: dateInput.value,
                created_at: formattedDate,
                completed: 0,
                subtasks: []
            });
            renderTasks();

            input.value = '';
            dateInput.value = '';
            input.focus();

            await fetch(`${workerBaseUrl}/todos`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({ action: 'add', id: taskId, text: text, dueDate: dateInput.value, createdAt: formattedDate })
            });
        }

        async function toggleTask(id, currentStatus) {
            const newStatus = currentStatus ? 0 : 1;
            const taskIndex = tasks.findIndex(t => t.id === id);
            
            if (taskIndex > -1) {
                tasks[taskIndex].completed = newStatus;
                // Re-sort so completed items drop to the bottom naturally
                tasks.sort((a, b) => a.completed - b.completed || b.id - a.id);
                renderTasks();
            }

            await fetch(`${workerBaseUrl}/todos`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({ action: 'toggle', id: id, completed: newStatus === 1 })
            });
        }

        async function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            renderTasks();

            await fetch(`${workerBaseUrl}/todos`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({ action: 'delete', id: id })
            });
        }

        // --- SUBTASK FUNCTIONS ---

        function toggleSubtaskInput(taskId) {
            const container = document.getElementById(`subtaskInputContainer_${taskId}`);
            const input = document.getElementById(`subtaskInput_${taskId}`);
            
            if (container.classList.contains('hidden')) {
                container.classList.remove('hidden');
                input.focus();
            } else {
                container.classList.add('hidden');
            }
        }

        async function addSubtask(taskId) {
            const input = document.getElementById(`subtaskInput_${taskId}`);
            const text = input.value.trim();
            if (!text) return;

            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            task.subtasks.push({
                id: Date.now().toString(),
                text: text,
                completed: false
            });
            
            renderTasks();
            
            const container = document.getElementById(`subtaskInputContainer_${taskId}`);
            container.classList.remove('hidden');
            document.getElementById(`subtaskInput_${taskId}`).focus();
            
            await syncSubtasks(taskId);
        }

        async function toggleSubtask(taskId, subtaskId) {
            const task = tasks.find(t => t.id === taskId);
            const subtask = task.subtasks.find(s => s.id === subtaskId);
            subtask.completed = !subtask.completed;
            
            renderTasks();
            await syncSubtasks(taskId);
        }

        async function deleteSubtask(taskId, subtaskId) {
            const task = tasks.find(t => t.id === taskId);
            task.subtasks = task.subtasks.filter(s => s.id !== subtaskId);
            
            renderTasks();
            await syncSubtasks(taskId);
        }

        async function syncSubtasks(taskId) {
            const task = tasks.find(t => t.id === taskId);
            await fetch(`${workerBaseUrl}/todos`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({
                    action: 'update_subtasks',
                    id: taskId,
                    subtasks: task.subtasks
                })
            });
        }

        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });

        window.onload = () => {
            loadSidebar();
            fetchTasks();
        };
    </script>
</body>
</html>
