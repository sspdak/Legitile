<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced WA Bill Tracker</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 12px 24px; background: #0056b3; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .section-title { background: #e9ecef; padding: 8px 12px; font-weight: bold; margin-top: 20px; border-radius: 4px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 0; }
        .data-item { font-size: 0.9rem; }
        .label { font-weight: bold; color: #555; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 12px; background: #d4edda; color: #155724; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Legislative Bill Detail</h1>
    <div class="search-box">
        <input type="text" id="billNum" placeholder="Enter Bill Number (e.g. 1000)">
        <button onclick="fetchDetailedData()">Get All Data</button>
    </div>

    <div id="results"></div>
</div>

<script>
    async function fetchDetailedData() {
        const bill = document.getElementById('billNum').value;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "Fetching exhaustive data...";

        try {
            const response = await fetch(`https://misty-credit-9e6a.ewing-jacob.workers.dev/?bill=${bill}`);
            const xmlText = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");

            // Helper to get tag value
            const getVal = (tag) => xmlDoc.getElementsByTagName(tag)[0]?.textContent || "N/A";

            resultsDiv.innerHTML = `
                <h2>Bill ${getVal('BillNumber')} (${getVal('Biennium')})</h2>
                
                <div class="section-title">Core Information</div>
                <div class="data-grid">
                    <div class="data-item"><span class="label">Short Description:</span> ${getVal('ShortDescription')}</div>
                    <div class="data-item"><span class="label">Legal Title:</span> ${getVal('LongDescription')}</div>
                    <div class="data-item"><span class="label">Sponsors:</span> ${getVal('Sponsors')}</div>
                    <div class="data-item"><span class="label">Prime Sponsor:</span> ${getVal('PrimeSponsor')}</div>
                </div>

                <div class="section-title">Legislative Metadata</div>
                <table>
                    <tr><th>Attribute</th><th>Status</th></tr>
                    <tr><td>Appropriations</td><td>${getVal('Appropriations') === 'true' ? '✅ Yes' : '❌ No'}</td></tr>
                    <tr><td>Requested by Governor</td><td>${getVal('RequestedByGovernor') === 'true' ? '✅ Yes' : '❌ No'}</td></tr>
                    <tr><td>State Fiscal Note</td><td>${getVal('StateFiscalNote') === 'true' ? '✅ Yes' : '❌ No'}</td></tr>
                    <tr><td>Local Fiscal Note</td><td>${getVal('LocalFiscalNote') === 'true' ? '✅ Yes' : '❌ No'}</td></tr>
                    <tr><td>Requested by Budget Committee</td><td>${getVal('RequestedByBudgetCommittee') === 'true' ? '✅ Yes' : '❌ No'}</td></tr>
                </table>

                <div class="section-title">Technical IDs</div>
                <div class="data-grid">
                    <div class="data-item"><span class="label">Bill ID:</span> ${getVal('BillId')}</div>
                    <div class="data-item"><span class="label">Request Number:</span> ${getVal('OriginalRequestNumber')}</div>
                </div>
            `;
        } catch (err) {
            resultsDiv.innerHTML = `<p style="color:red">Error parsing data. Ensure bill number is correct for 2025-26.</p>`;
        }
    }
</script>

</body>
</html>
