<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced WA Bill Tracker</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 12px 24px; background: #0056b3; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .section-title { background: #e9ecef; padding: 8px 12px; font-weight: bold; margin-top: 20px; border-radius: 4px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 0; }
        .data-item { font-size: 0.9rem; }
        .label { font-weight: bold; color: #555; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 12px; background: #d4edda; color: #155724; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Legislative Bill Detail</h1>
    <div class="search-box">
        <input type="text" id="billNum" placeholder="Enter Bill Number (e.g. 1000)">
        <button onclick="fetchDetailedData()">Get All Data</button>
    </div>

    <div id="results"></div>
</div>

<script>
   async function fetchDetailedData() {
    const bill = document.getElementById('billNum').value;
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = "Fetching complete legislative package...";

    try {
        const response = await fetch(`https://misty-credit-9e6a.ewing-jacob.workers.dev/?bill=${bill}`);
        const xmlText = await response.text();
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, "text/xml");

        const getVal = (tag) => xmlDoc.getElementsByTagName(tag)[0]?.textContent || "N/A";

        // Extracting Sponsors
        const sponsorNodes = xmlDoc.getElementsByTagName("Sponsor");
        let sponsorList = [];
        let primeSponsor = "N/A";
        
        for (let s of sponsorNodes) {
            const name = s.getElementsByTagName("Name")[0]?.textContent;
            const type = s.getElementsByTagName("Type")[0]?.textContent;
            if (type === "Primary") primeSponsor = name;
            sponsorList.push(name);
        }

        // Extracting Companion
        const companionNum = xmlDoc.getElementsByTagName("CompanionBillNumber")[0]?.textContent || "None";

        resultsDiv.innerHTML = `
            <h2>Bill ${bill} Details</h2>
            <div class="section-title">Sponsorship</div>
            <p><strong>Prime Sponsor:</strong> ${primeSponsor}</p>
            <p><strong>All Sponsors:</strong> ${sponsorList.join(", ")}</p>

            <div class="section-title">Companion Bill</div>
            <p><strong>Companion:</strong> ${companionNum !== "None" ? 'HB/SB ' + companionNum : 'No companion bill found'}</p>

            <div class="section-title">Core Information</div>
            <p><strong>Short Title:</strong> ${getVal('ShortDescription')}</p>
            <p><strong>Long Title:</strong> ${getVal('LongDescription')}</p>
        `;
    } catch (err) {
        resultsDiv.innerHTML = "Error loading data.";
    }
}
</script>

</body>
</html>
