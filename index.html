<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Washington State Bill Tracker</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f4f7f6;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            width: 100%;
            max-width: 500px;
        }

        h1 { color: var(--primary); margin-top: 0; font-size: 1.5rem; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }

        .search-group { display: flex; gap: 10px; margin: 20px 0; }

        input { 
            flex: 1;
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            font-size: 1rem;
        }

        button { 
            padding: 12px 20px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold;
            cursor: pointer; 
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        #results { 
            margin-top: 20px; 
            padding: 15px; 
            background: #fafafa;
            border-radius: 6px;
            min-height: 50px;
            color: #444;
            line-height: 1.5;
        }

        .bill-title { font-weight: bold; color: var(--primary); display: block; margin-bottom: 8px; }
        .error { color: #e74c3c; }
        .loading { color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h1>WA Legislative Search</h1>
    <p>Enter a 4-digit bill number (e.g., 1000) to fetch current data from the WSL API.</p>
    
    <div class="search-group">
        <input type="text" id="billNum" placeholder="Bill Number..." maxlength="4">
        <button onclick="fetchBill()">Search</button>
    </div>

    <div id="results">Results will appear here...</div>
</div>

<script>
    async function fetchBill() {
        const bill = document.getElementById('billNum').value;
        const resultsDiv = document.getElementById('results');
        
        if (!bill) {
            resultsDiv.innerHTML = "Please enter a bill number.";
            return;
        }

        resultsDiv.innerHTML = '<span class="loading">Querying Washington State Legislature...</span>';

        try {
            // Your Cloudflare Worker URL
            const workerUrl = `https://misty-credit-9e6a.ewing-jacob.workers.dev/?bill=${bill}`;
            
            const response = await fetch(workerUrl);
            
            if (!response.ok) throw new Error("Network response was not ok");
            
            const xmlText = await response.text();
            
            // Parsing the SOAP XML response
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            
            // Extracting specific fields from the WSL XML schema
            const shortDesc = xmlDoc.getElementsByTagName("ShortDescription")[0]?.textContent;
            const longDesc = xmlDoc.getElementsByTagName("LongDescription")[0]?.textContent;

            if (shortDesc) {
                resultsDiv.innerHTML = `
                    <span class="bill-title">Bill ${bill}</span>
                    <strong>Short Title:</strong> ${shortDesc}<br><br>
                    <strong>Long Title:</strong> ${longDesc || 'N/A'}
                `;
            } else {
                resultsDiv.innerHTML = "No bill found with that number for the current biennium.";
            }

        } catch (err) {
            console.error(err);
            resultsDiv.innerHTML = `<span class="error">Error: Could not connect to the API. Ensure your Cloudflare Worker is deployed and CORS is enabled.</span>`;
        }
    }
</script>

</body>
</html>
