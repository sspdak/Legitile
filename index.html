<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegiTile | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body id="mainBody" class="bg-gray-100 h-screen font-sans text-gray-900 transition-colors duration-500 overflow-hidden flex flex-col md:flex-row">

    <input type="file" id="importFile" class="hidden" accept=".json" onchange="processImport(this)">

    <aside class="leg-navy text-white w-full md:w-28 flex-shrink-0 flex flex-col shadow-2xl z-50 md:h-full no-print">
        <div class="py-6 flex flex-col items-center border-b border-white/10 shrink-0">
            <div class="relative">
                <div class="text-6xl font-serif italic font-black text-transparent bg-clip-text bg-gradient-to-br from-orange-400 to-white drop-shadow-2xl leading-none">L</div>
            </div>
            <div class="text-[8px] uppercase tracking-[0.2em] text-blue-200 font-bold mt-1 opacity-60">LegiTile</div>
        </div>

        <nav class="flex-1 px-2 py-4 space-y-3 overflow-y-auto sidebar-scroll flex flex-col items-center">
             </nav>

        <div class="w-full shrink-0 flex flex-col items-center border-t border-white/10 bg-black/10 pb-4">
            
            <div class="w-full pt-4 px-2 mb-2">
                <button onclick="toggleSessionMenu()" class="w-full text-center py-2 text-[9px] font-bold text-blue-200 hover:text-white hover:bg-white/5 rounded transition flex flex-col items-center gap-1">
                    <span class="text-lg">⚙️</span>
                    <span class="uppercase tracking-wide">Session</span>
                </button>
                
                <div id="sessionMenu" class="hidden flex flex-col gap-1 mt-2 bg-black/20 rounded-lg p-1">
                    <button onclick="downloadBackup()" class="w-full text-center py-2 text-[9px] font-bold text-gray-300 hover:text-white hover:bg-white/5 rounded transition leading-tight">
                        Backup<br>(JSON)
                    </button>
                    <button onclick="document.getElementById('importFile').click()" class="w-full text-center py-2 text-[9px] font-bold text-gray-300 hover:text-white hover:bg-white/5 rounded transition leading-tight">
                        Restore<br>Data
                    </button>
                    <button onclick="toggleArchiveView()" id="btnViewArchive" class="w-full text-center py-2 text-[9px] font-bold text-gray-300 hover:text-white hover:bg-white/5 rounded transition leading-tight">
                        View<br>Archives
                    </button>
                    <button onclick="archiveCurrentSession()" class="w-full text-center py-2 text-[9px] font-bold text-red-300 hover:text-red-100 hover:bg-red-900/20 rounded transition leading-tight border-t border-white/5 mt-1">
                        End<br>Session
                    </button>
                </div>
            </div>

            <div id="sessionTimer" class="flex flex-col items-center px-1">
                <span class="text-[8px] uppercase tracking-widest text-orange-300/80 font-bold mb-1">Sine Die</span>
                <div class="flex flex-col items-center leading-none">
                    <span id="daysLeft" class="text-2xl font-mono font-black text-white">--</span>
                    <span class="text-[9px] font-bold text-gray-400 uppercase">Days</span>
                </div>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        
        <header class="shrink-0 pt-8 pb-2 px-6 md:px-10 z-40 flex flex-col md:flex-row justify-between items-center gap-4 bg-gray-100">
            <div class="relative w-full max-w-md group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400 group-focus-within:text-blue-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="searchInput" onkeyup="refreshGrid()" placeholder="Search bills, sponsors & notes..." 
                       class="w-full bg-white border border-gray-200 text-gray-900 font-bold rounded-lg py-2.5 pl-10 pr-10 text-sm focus:ring-2 focus:ring-blue-100 focus:border-blue-300 outline-none transition-all placeholder:text-gray-400 shadow-sm">
                 <button id="clearSearchBtn" onclick="clearSearch()" class="hidden absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-red-500 font-bold">
                    ✕
                 </button>
            </div>

            <div class="flex gap-3 w-full md:w-auto">
                <button onclick="showScreen('draftForm')" class="flex-1 md:flex-none bg-orange-500 hover:bg-orange-600 text-white text-[11px] font-black uppercase px-5 py-2.5 rounded-lg shadow-sm hover:shadow-md transition flex items-center justify-center gap-2">
                    <span>📝</span> New Draft
                </button>
                <button onclick="showScreen('existingForm')" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white text-[11px] font-black uppercase px-5 py-2.5 rounded-lg shadow-sm hover:shadow-md transition flex items-center justify-center gap-2">
                    <span>📑</span> Track Bill
                </button>
            </div>
        </header>

        <div id="archiveBanner" class="hidden bg-gray-800 text-gray-300 text-center py-1 text-[10px] font-black uppercase tracking-widest shrink-0 z-30 relative">
            Viewing Archived Session Data (Read Only Mode)
        </div>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth" id="scrollContainer">
            
            <div class="bg-white p-4 rounded-xl shadow-sm mb-8 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6 border border-gray-100">
                
                <div class="flex flex-wrap gap-3 w-full xl:w-auto items-center">
                    
                    <select onchange="setCommittee(this.value)" id="committeeSelect" class="bg-white border-2 border-gray-100 text-blue-900 font-black uppercase text-[10px] rounded-lg px-3 py-2 outline-none focus:border-blue-900 transition shadow-sm cursor-pointer h-10">
                        <option id="optAll" value="All">All Active (0)</option>
                        <option id="optHealth" value="Health Care">Health Care (0)</option>
                        <option id="optLocal" value="Local Government">Local Government (0)</option>
                        <option id="optDead" value="Dead" class="text-red-500">Archive / Dead (0)</option>
                    </select>

                    <select onchange="setType(this.value)" id="typeSelect" class="bg-gray-50 text-[10px] font-black uppercase rounded-lg px-3 py-2 border-none outline-none text-gray-600 focus:text-blue-900 cursor-pointer hover:bg-gray-100 transition h-10">
                        <option value="All">Show: All Types</option>
                        <option value="draft">Show: Drafts Only</option>
                        <option value="live">Show: Live Bills</option>
                    </select>

                    <select onchange="setStatusFilter(this.value)" id="statusFilter" class="bg-gray-50 text-[10px] font-black uppercase rounded-lg px-3 py-2 border-none outline-none text-gray-600 focus:text-blue-900 cursor-pointer hover:bg-gray-100 transition h-10">
                        <option value="All">Filter: All Steps</option>
                    </select>

                    <select onchange="setSort(this.value)" class="bg-gray-50 text-[10px] font-black uppercase rounded-lg px-3 py-2 border-none outline-none text-gray-600 focus:text-blue-900 cursor-pointer hover:bg-gray-100 transition h-10">
                        <option value="priority">Sort: Priority</option>
                        <option value="alpha">Sort: Bill #</option>
                    </select>
                </div>
                
                <div class="flex bg-gray-100 p-1 rounded-lg ml-auto">
                    <button onclick="setView('grid')" id="viewGrid" class="p-2 rounded-md shadow-sm bg-white text-blue-900" title="Grid View">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
                    </button>
                    <button onclick="setView('list')" id="viewList" class="p-2 rounded-md text-gray-500 hover:text-blue-900 transition" title="List View">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                </div>
            </div>

            <div id="billGrid" class="flex flex-col gap-4 pb-20"></div>
        </main>
    </div>

    <div id="staleModal" style="display: none;" class="fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-xl shadow-2xl max-w-xs w-full border-t-4 border-blue-900">
            <h3 class="font-black text-gray-800 uppercase text-xs mb-2">Stale Workspace Check-In</h3>
            <p class="text-xs text-gray-500 mb-4">Would you like to mark this bill as reviewed to clear the alert?</p>
            <button id="staleConfirmBtn" class="w-full bg-blue-900 text-white font-bold py-2 rounded uppercase text-[10px] mb-2">Nothing New to Report</button>
            <button onclick="hideAllModals()" class="w-full bg-gray-100 text-gray-500 font-bold py-2 rounded uppercase text-[10px]">Cancel</button>
        </div>
    </div>

    <div id="editModal" style="display: none;" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div id="editModalContent" class="bg-white p-8 rounded-xl shadow-2xl max-w-lg w-full border-t-8 border-blue-900">
            <h2 class="text-xl font-black text-gray-800 uppercase mb-4">Edit Workspace Details</h2>
            <div class="space-y-4">
                <div class="flex gap-4">
                    <input type="text" id="editTitle" placeholder="Bill Number" class="w-2/3 border-2 p-2 rounded-lg">
                    <input type="text" id="editCompanion" placeholder="Comp. (HB 1234)" class="w-1/3 border-2 p-2 rounded-lg">
                </div>
                <input type="text" id="editLongTitle" placeholder="Summary" class="w-full border-2 p-2 rounded-lg">
                <input type="text" id="editSponsor" placeholder="Sponsor" class="w-full border-2 p-2 rounded-lg">
                <input type="text" id="editUrl" placeholder="Bill Page URL" class="w-full border-2 p-2 rounded-lg">
                <select id="editCommittee" class="w-full border-2 p-2 rounded-lg font-bold">
                    <option value="Health Care">Health Care</option>
                    <option value="Local Government">Local Government</option>
                </select>
                <div class="flex gap-2 pt-2">
                    <button id="editSaveBtn" class="bg-blue-900 text-white font-bold py-3 px-4 rounded-lg flex-1 uppercase text-sm">Save Changes</button>
                    <button onclick="hideAllModals()" class="bg-gray-200 py-3 px-4 rounded-lg flex-1 uppercase text-sm font-bold text-gray-600">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="draftForm" style="display: none;" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-2xl w-full border-t-8 border-orange-500">
            <h2 class="text-2xl font-bold mb-4 text-orange-600 uppercase">New Draft</h2>
            <div class="space-y-4">
                <div class="flex gap-4">
                    <input type="text" id="draftTitle" placeholder="Concept Name" class="w-2/3 border-2 p-3 rounded-lg outline-none focus:border-orange-500">
                    <input type="text" id="draftCompanion" placeholder="Comp. (Optional)" class="w-1/3 border-2 p-3 rounded-lg outline-none focus:border-orange-500">
                </div>
                <select id="draftCommittee" class="w-full border-2 p-3 rounded-lg font-bold">
                    <option value="Health Care">Health Care</option>
                    <option value="Local Government">Local Government</option>
                </select>
                <textarea id="draftBlurb" placeholder="Initial policy notes..." class="w-full border-2 p-3 rounded-lg h-32 outline-none focus:border-orange-500"></textarea>
                <div class="flex gap-2">
                    <button onclick="createItem('draft')" class="bg-orange-500 text-white font-bold px-6 py-3 rounded-lg flex-1 uppercase">Create Workspace</button>
                    <button onclick="hideAllModals()" class="bg-gray-200 py-3 px-4 rounded-lg font-bold uppercase text-gray-600">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="existingForm" style="display: none;" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-2xl w-full border-t-8 border-blue-900">
            <h2 class="text-2xl font-bold mb-4 text-blue-900 uppercase">Track Bill</h2>
            <div class="space-y-4">
                <div class="flex gap-4">
                    <input type="text" id="existingNum" placeholder="Bill #" class="w-1/3 border-2 p-3 rounded-lg">
                    <input type="text" id="existingCompanion" placeholder="Comp. (HB 1234)" class="w-1/3 border-2 p-3 rounded-lg">
                    <input type="text" id="existingTitle" placeholder="Summary" class="w-1/3 border-2 p-3 rounded-lg">
                </div>
                <input type="text" id="existingSponsor" placeholder="Sponsor" class="w-full border-2 p-3 rounded-lg">
                <input type="text" id="existingUrl" placeholder="Bill Page URL" class="w-full border-2 p-3 rounded-lg">
                <select id="existingCommittee" class="w-full border-2 p-3 rounded-lg font-bold">
                    <option value="Health Care">Health Care</option>
                    <option value="Local Government">Local Government</option>
                </select>
                <div class="flex gap-2">
                    <button onclick="createItem('live')" class="bg-blue-900 text-white font-bold px-6 py-3 rounded-lg flex-1 uppercase">Add to Dashboard</button>
                    <button onclick="hideAllModals()" class="bg-gray-200 py-3 px-4 rounded-lg font-bold uppercase text-gray-600">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
