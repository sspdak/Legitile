<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced WA Bill Tracker</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 12px 24px; background: #0056b3; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .section-title { background: #e9ecef; padding: 8px 12px; font-weight: bold; margin-top: 20px; border-radius: 4px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 0; }
        .data-item { font-size: 0.9rem; }
        .label { font-weight: bold; color: #555; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 12px; background: #d4edda; color: #155724; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Legislative Bill Detail</h1>
    <div class="search-box">
        <input type="text" id="billNum" placeholder="Enter Bill Number (e.g. 1000)">
        <button onclick="fetchDetailedData()">Get All Data</button>
    </div>

    <div id="results"></div>
</div>

<script>
   async function fetchDetailedData() {
    const bill = document.getElementById('billNum').value;
    const resultsDiv = document.getElementById('results');
    
    if (!bill) return;
    resultsDiv.innerHTML = "Fetching...";

    try {
        const response = await fetch(`https://misty-credit-9e6a.ewing-jacob.workers.dev/?bill=${bill}`);
        const xmlText = await response.text();
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, "text/xml");

        // Helper to handle Namespaces
        const ns = "http://WSLWebServices.leg.wa.gov/";
        const getTag = (name) => xmlDoc.getElementsByTagNameNS(ns, name)[0]?.textContent || "N/A";

        // 1. Process Sponsors
        const sponsorNodes = xmlDoc.getElementsByTagNameNS(ns, "Sponsor");
        let sponsorNames = [];
        let primeSponsor = "None Listed";
        
        for (let s of sponsorNodes) {
            const name = s.getElementsByTagNameNS(ns, "Name")[0]?.textContent;
            const type = s.getElementsByTagNameNS(ns, "Type")[0]?.textContent;
            if (type === "Primary") primeSponsor = name;
            sponsorNames.push(name);
        }

        // 2. Process Companion
        const companionInfo = xmlDoc.getElementsByTagNameNS(ns, "CompanionLegislation")[0];
        const compNum = companionInfo?.getElementsByTagNameNS(ns, "BillNumber")[0]?.textContent || "None";

        // 3. Display
        resultsDiv.innerHTML = `
            <div class="section-title">Bill ${bill} Dashboard</div>
            <p><strong>Short Title:</strong> ${getTag('ShortDescription')}</p>
            <p><strong>Prime Sponsor:</strong> ${primeSponsor}</p>
            <p><strong>All Sponsors:</strong> ${sponsorNames.join(", ")}</p>
            <p><strong>Companion Bill:</strong> ${compNum !== "None" ? 'HB/SB ' + compNum : 'None'}</p>
            
            <div class="section-title">Status Flags</div>
            <ul>
                <li>Appropriations: ${getTag('Appropriations') === 'true' ? 'Yes' : 'No'}</li>
                <li>Governor Requested: ${getTag('RequestedByGovernor') === 'true' ? 'Yes' : 'No'}</li>
                <li>Fiscal Note: ${getTag('StateFiscalNote') === 'true' ? 'Yes' : 'No'}</li>
            </ul>

            <div class="section-title">Long Title</div>
            <p style="font-size: 0.85rem; color: #666;">${getTag('LongDescription')}</p>
        `;

    } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = "Error: " + err.message;
    }
}
</script>

</body>
</html>
