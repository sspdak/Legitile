<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegiTile | Account Settings</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIiBmaWxsPSIjMDAyZTVkIi8+PGRlZnM+PGxpbmVhckdyYWRpZW50IGlkPSJnIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj48c3RvcCBvZmZzZXQ9IjAlIiBzdG9wLWNvbG9yPSIjZmI5MjNjIi8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdG9wLWNvbG9yPSIjZmZmZmZmIi8+PC9saW5lYXJHcmFkaWVudD48L2RlZnM+PHRleHQgeD0iNTAiIHk9Ijc1IiBmb250LWZhbWlseT0ic2VyaWYiIGZvbnQtc3R5bGU9Iml0YWxpYyIgZm9udC13ZWlnaHQ9IjkwMCIgZm9udC1zaXplPSI3NSIgZmlsbD0idXJsKCNnKSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+TDwvdGV4dD48L3N2Zz4=">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .leg-navy { background-color: #002e5d; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 h-screen font-sans text-gray-900 overflow-hidden flex flex-col md:flex-row">

    <div id="sidebar-container" class="flex-shrink-0 w-full md:w-28 md:h-full z-50"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="shrink-0 pt-8 pb-4 px-6 md:px-10 z-40 bg-gray-100 border-b border-gray-200 flex justify-between items-center">
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Account Settings</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth custom-scroll">
            
            <div class="flex flex-col lg:flex-row gap-8 items-start w-full max-w-7xl">
                
                <div class="flex-1 w-full bg-white p-8 rounded-xl shadow-sm border border-gray-100">
                    <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-6 border-b border-gray-100 pb-2">Profile Information</h2>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-1 block">Work Email (Login ID)</label>
                            <input type="email" id="profileEmail" readonly disabled class="w-full border-2 border-gray-100 bg-gray-50 p-3 rounded-lg outline-none font-bold text-gray-500 cursor-not-allowed">
                        </div>

                        <div>
                            <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-1 block">Full Name</label>
                            <input type="text" id="profileName" placeholder="Your Name" class="w-full border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700 transition">
                        </div>

                        <div>
                            <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-1 block">Chamber</label>
                            <select id="profileChamber" onchange="populateCommittees()" class="w-full border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700 transition bg-white cursor-pointer">
                                <option value="House">House of Representatives</option>
                                <option value="Senate">Senate</option>
                            </select>
                        </div>

                        <div>
                            <div class="flex justify-between items-end mb-1">
                                <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest block">Tracked Committees</label>
                                <span class="text-[9px] font-bold text-gray-400 italic">Select all that apply</span>
                            </div>
                            <div id="committeeContainer" class="w-full border-2 border-gray-200 p-4 rounded-lg h-48 overflow-y-auto custom-scroll bg-gray-50 flex flex-col gap-2">
                                <span class="text-xs font-bold text-gray-400 italic">Loading committees...</span>
                            </div>
                        </div>

                        <div id="statusMsg" class="text-xs font-bold h-4"></div>

                        <div class="pt-4 border-t border-gray-100 flex justify-end gap-3">
                            <button onclick="saveProfile()" id="saveBtn" class="bg-[#002e5d] hover:bg-blue-900 text-white text-[12px] font-black uppercase px-8 py-3 rounded-lg shadow-sm hover:shadow-md transition">
                                Save Changes
                            </button>
                        </div>
                    </div>
                </div>

                <div class="flex-1 w-full bg-white p-8 rounded-xl shadow-sm border border-gray-100">
                    <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-6 border-b border-gray-100 pb-2">Workflow Templates</h2>
                    
                    <div class="flex flex-col md:flex-row gap-4 mb-6">
                        <div class="flex-1">
                            <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-1 block">Select Target</label>
                            <select id="templateCommitteeSelect" onchange="loadTemplateUI()" class="w-full border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700 bg-white cursor-pointer">
                                <option value="All">All Committees (Global)</option>
                            </select>
                        </div>
                        <div class="flex-1">
                            <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-1 block">Legislative Stage</label>
                            <select id="templateStageSelect" onchange="loadTemplateUI()" class="w-full border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-[#002e5d] font-bold text-gray-700 bg-white cursor-pointer">
                                </select>
                        </div>
                    </div>

                    <div class="bg-gray-50 border border-gray-200 rounded-lg p-6">
                        <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-3 block">Default Tasks</label>
                        <div id="templateTasksContainer" class="space-y-2 mb-4">
                            <span class="text-xs font-bold text-gray-400 italic">Select a stage to view tasks.</span>
                        </div>

                        <div class="flex gap-2 pt-4 border-t border-gray-200 mt-4">
                            <input type="text" id="newTemplateTask" placeholder="Add a new default task..." class="text-sm font-bold text-gray-700 p-3 border-2 border-gray-200 rounded flex-1 outline-none focus:border-[#002e5d]" onkeypress="if(event.key === 'Enter') addTemplateTask()">
                            <button onclick="addTemplateTask()" class="bg-[#002e5d] hover:bg-blue-900 text-white font-black px-6 py-2 rounded-lg transition uppercase text-[10px] tracking-wider">Add Rule</button>
                        </div>
                        <div id="templateStatusMsg" class="text-xs font-bold h-4 mt-2"></div>
                    </div>
                </div>

            </div> </main>
    </div>

<script>
    if (!localStorage.getItem('jwt_token')) window.location.href = 'index.html';

    const workerBaseUrl = "https://misty-credit-9e6a.ewing-jacob.workers.dev";
    const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`, 'Content-Type': 'application/json' };

    const waCommittees = {
        "House": [
            "Agriculture & Natural Resources", "Appropriations", "Capital Budget",
            "Civil Rights & Judiciary", "Community Safety", "Consumer Protection & Business",
            "Early Learning & Human Services", "Education", "Environment & Energy",
            "Finance", "Health Care & Wellness", "Housing", "Labor & Workplace Standards",
            "Local Government", "Postsecondary Education & Workforce", "Rules",
            "State Government & Tribal Relations", "Technology, Economic Development, & Veterans",
            "Transportation"
        ],
        "Senate": [
            "Agriculture & Natural Resources", "Business, Trade & Economic Development",
            "Early Learning & K-12 Education", "Environment, Energy & Technology",
            "Health & Long-Term Care", "Higher Education & Workforce Development",
            "Housing", "Human Services", "Labor & Commerce", "Law & Justice", "Local Government", "Rules",
            "State Government, Tribal Affairs & Elections", "Transportation", "Ways & Means"
        ]
    };

    const TEMPLATE_STAGES = ["Draft", "Introduced", "Public Hearing", "Executive Action", "Fiscal", "Rules", "Floor", "House", "Concurrence", "Passed", "Dead"];
    
    const DEFAULT_TASKS = {
        "Draft": ["Draft Approved", "Draft to CRO", "CRO Version Received", "Bill & Pink Sheet Sent"],
        "Introduced": ["Review bill", "Add summary to tracker", "Prep talking points"],
        "Public Hearing": ["Submit Bill Report", "Create Bill Presentation", "Submit Public Testimony"],
        "Executive Action": ["Briefing Notes", "Review Proposed Sub", "Update Bill Report"],
        "Fiscal": ["Review Fiscal Note", "Check In with Fiscal Staff"],
        "Rules": ["Review Bill Report", "Prep Floor Note"],
        "Floor": ["Submit Floor Note", "Review Floor Amendments"],
        "House": [], "Dead": [], "Default": ["Review Bill", "Monitor Testimony"]
    };

    let currentUserCommittees = [];
    let userTemplates = [];
    let activeTemplateTasks = [];

    async function loadSidebar() {
        try {
            const response = await fetch('sidebar.html');
            if (!response.ok) throw new Error("Sidebar failed to load.");
            const html = await response.text();
            document.getElementById('sidebar-container').innerHTML = html;
            const userEmail = localStorage.getItem('user_email');
            document.getElementById('userEmailDisplay').innerText = userEmail || 'Unknown';
            document.getElementById('profileEmail').value = userEmail; 

            const path = window.location.pathname;
            document.querySelectorAll('.nav-item').forEach(item => {
                if (path.includes(item.getAttribute('href'))) {
                    item.classList.add('bg-white/10', 'text-white');
                    item.classList.remove('text-blue-200');
                }
            });
        } catch (error) { console.error(error); }
    }

    window.onload = async () => {
        await loadSidebar();
        
        const stageSelect = document.getElementById('templateStageSelect');
        TEMPLATE_STAGES.forEach(stage => {
            const opt = document.createElement('option');
            opt.value = stage; opt.innerText = stage;
            stageSelect.appendChild(opt);
        });

        await loadProfile();
        await loadTemplates();
    };

    async function loadProfile() {
        try {
            const res = await fetch(`${workerBaseUrl}/me`, { headers: authHeaders });
            if (res.status === 401) return logout();
            
            if (res.ok) {
                const userData = await res.json();
                document.getElementById('profileName').value = userData.name || "";
                
                if (userData.chamber) document.getElementById('profileChamber').value = userData.chamber;
                
                currentUserCommittees = userData.committees || [];
                populateCommittees(currentUserCommittees);
                updateTemplateCommitteeDropdown();
            }
        } catch (e) { console.error("Failed to load profile data."); }
    }

    function populateCommittees(savedCommittees = []) {
        const chamber = document.getElementById('profileChamber').value;
        const container = document.getElementById('committeeContainer');
        container.innerHTML = ''; 

        if (!chamber || !waCommittees[chamber]) return;

        waCommittees[chamber].forEach(committee => {
            const isChecked = savedCommittees.includes(committee) ? "checked" : "";
            const label = document.createElement('label');
            label.className = "flex items-start gap-3 text-sm font-bold text-gray-700 cursor-pointer p-2 hover:bg-gray-100 rounded-lg transition border border-transparent hover:border-gray-200";
            label.innerHTML = `<input type="checkbox" value="${committee}" ${isChecked} class="mt-1 w-4 h-4 rounded text-[#002e5d] border-gray-300 outline-none"><span>${committee}</span>`;
            container.appendChild(label);
        });
    }

    async function saveProfile() {
        const btn = document.getElementById('saveBtn');
        const statusDiv = document.getElementById('statusMsg');
        const originalText = btn.innerText;
        btn.disabled = true; btn.innerText = "Saving...";
        statusDiv.className = "text-xs font-bold h-4 text-gray-500"; statusDiv.innerText = "";

        const name = document.getElementById('profileName').value.trim();
        const chamber = document.getElementById('profileChamber').value;
        const checkedBoxes = document.querySelectorAll('#committeeContainer input[type="checkbox"]:checked');
        const selectedCommittees = Array.from(checkedBoxes).map(cb => cb.value);

        const payload = { name, chamber, committees: selectedCommittees };

        try {
            const res = await fetch(`${workerBaseUrl}/update-profile`, { method: 'POST', headers: authHeaders, body: JSON.stringify(payload) });
            if (res.ok) {
                statusDiv.className = "text-xs font-bold h-4 text-green-600";
                statusDiv.innerText = "Profile updated successfully.";
                currentUserCommittees = selectedCommittees; 
                updateTemplateCommitteeDropdown();
            } else {
                statusDiv.className = "text-xs font-bold h-4 text-red-500";
                statusDiv.innerText = "Failed to update profile.";
            }
        } catch (e) {
            statusDiv.className = "text-xs font-bold h-4 text-red-500";
            statusDiv.innerText = "Network error. Please try again.";
        }

        btn.disabled = false; btn.innerText = originalText;
        setTimeout(() => { statusDiv.innerText = ""; }, 4000);
    }

    // --- TEMPLATE LOGIC ---
    
    function updateTemplateCommitteeDropdown() {
        const select = document.getElementById('templateCommitteeSelect');
        const currentSelection = select.value;
        select.innerHTML = '<option value="All">All Committees (Global)</option>';
        
        currentUserCommittees.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.innerText = c;
            select.appendChild(opt);
        });

        if (currentUserCommittees.includes(currentSelection) || currentSelection === 'All') {
            select.value = currentSelection;
        }
    }

    async function loadTemplates() {
        try {
            const res = await fetch(`${workerBaseUrl}/templates`, { headers: authHeaders });
            if (res.ok) {
                userTemplates = await res.json();
                loadTemplateUI();
            }
        } catch(e) { console.error("Could not fetch templates."); }
    }

    function loadTemplateUI() {
        const committee = document.getElementById('templateCommitteeSelect').value;
        const stage = document.getElementById('templateStageSelect').value;
        const container = document.getElementById('templateTasksContainer');

        let template = userTemplates.find(t => t.committee === committee && t.stage === stage);
        
        if (template && template.tasks) {
            try { activeTemplateTasks = JSON.parse(template.tasks); } catch(e) { activeTemplateTasks = []; }
        } else {
            activeTemplateTasks = [...(DEFAULT_TASKS[stage] || [])];
        }

        renderTemplateTasks();
    }

    function renderTemplateTasks() {
        const container = document.getElementById('templateTasksContainer');
        container.innerHTML = '';

        if (activeTemplateTasks.length === 0) {
            container.innerHTML = '<span class="text-xs font-bold text-gray-400 italic">No tasks assigned to this stage.</span>';
            return;
        }

        activeTemplateTasks.forEach((task, index) => {
            container.innerHTML += `
                <div class="flex items-center justify-between bg-white p-3 rounded border border-gray-200 shadow-sm group">
                    <span class="text-sm font-bold text-gray-700">${task}</span>
                    <button onclick="removeTemplateTask(${index})" class="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition px-2 focus:opacity-100" title="Remove Default">×</button>
                </div>
            `;
        });
    }

    async function addTemplateTask() {
        const input = document.getElementById('newTemplateTask');
        const task = input.value.trim();
        if (!task) return;

        if (!activeTemplateTasks.includes(task)) {
            activeTemplateTasks.push(task);
            await saveCurrentTemplate();
        }
        input.value = '';
    }

    async function removeTemplateTask(index) {
        activeTemplateTasks.splice(index, 1);
        await saveCurrentTemplate();
    }

    async function saveCurrentTemplate() {
        const committee = document.getElementById('templateCommitteeSelect').value;
        const stage = document.getElementById('templateStageSelect').value;
        const statusDiv = document.getElementById('templateStatusMsg');
        
        statusDiv.className = "text-xs font-bold h-4 text-gray-500";
        statusDiv.innerText = "Syncing rules...";

        try {
            const res = await fetch(`${workerBaseUrl}/save-template`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({ committee, stage, tasks: activeTemplateTasks })
            });

            if (res.ok) {
                let existingIndex = userTemplates.findIndex(t => t.committee === committee && t.stage === stage);
                if (existingIndex >= 0) {
                    userTemplates[existingIndex].tasks = JSON.stringify(activeTemplateTasks);
                } else {
                    userTemplates.push({ committee, stage, tasks: JSON.stringify(activeTemplateTasks) });
                }
                
                statusDiv.className = "text-xs font-bold h-4 text-green-600";
                statusDiv.innerText = "Rules saved.";
                renderTemplateTasks();
            }
        } catch (e) {
            statusDiv.className = "text-xs font-bold h-4 text-red-500";
            statusDiv.innerText = "Failed to sync rule.";
        }

        setTimeout(() => { statusDiv.innerText = ""; }, 3000);
    }

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }
</script>

</body>
</html>
